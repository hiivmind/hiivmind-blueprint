# hiivmind-blueprint-author-convert workflow
#
# Unified conversion skill that merges: analyze + convert + generate
# Analyzes prose SKILL.md → generates workflow.yaml + thin SKILL.md loader
#
# Subflow composition:
# - load-skill (inline) for skill loading
# - safe-write-files (inline) for output
# - Pattern references: skill-analysis.md, workflow-generation.md

name: hiivmind-blueprint-author-convert
version: 1.0.0
description: Convert prose SKILL.md to workflow.yaml format

definitions:
  source: "hiivmind/hiivmind-blueprint-lib"
  version: "v3.0.0"

start_node: check_prerequisites

initial_state:
  phase: "start"
  flags:
    verbose: false
    dry_run: false
    force: false
  input:
    skill_path: null
  loaded:
    skill_path: null
    skill_content: null
    frontmatter: null
    body: null
  analysis:
    phases: []
    actions: []
    conditionals: []
    state_variables: []
    user_interactions: []
    complexity: null
    complexity_score: 0
  generated:
    workflow_content: null
    skill_loader_content: null
  output:
    files_written: []
  prompts:
    mode: "interactive"

nodes:
  # --- Prerequisites (inline from subflows/prerequisites-check.yaml) ---
  check_prerequisites:
    type: conditional
    description: "Check if jq is available"
    condition:
      type: tool_check
      tool: jq
      capability: available
    branches:
      on_true: check_yq
      on_false: error_missing_jq

  check_yq:
    type: conditional
    description: "Check if yq is available"
    condition:
      type: tool_check
      tool: yq
      capability: available
    branches:
      on_true: parse_args
      on_false: error_missing_yq

  # --- Argument Parsing ---
  parse_args:
    type: action
    description: "Parse command arguments"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          args="${arguments:-}"
          # Check for flags
          echo "$args" | grep -qE '(-v|--verbose)' && echo "true" || echo "false"
        store_in: verbose_flag
      - type: run_command
        interpreter: bash
        command: |
          args="${arguments:-}"
          echo "$args" | grep -qE '--dry-run' && echo "true" || echo "false"
        store_in: dry_run_flag
      - type: run_command
        interpreter: bash
        command: |
          args="${arguments:-}"
          echo "$args" | grep -qE '--force' && echo "true" || echo "false"
        store_in: force_flag
      - type: run_command
        interpreter: bash
        command: |
          args="${arguments:-}"
          # Extract path (non-flag argument)
          echo "$args" | tr ' ' '\n' | grep -v '^-' | head -1
        store_in: path_arg
      - type: mutate_state
        operation: set
        field: flags.verbose
        value: "${verbose_flag == 'true'}"
      - type: mutate_state
        operation: set
        field: flags.dry_run
        value: "${dry_run_flag == 'true'}"
      - type: mutate_state
        operation: set
        field: flags.force
        value: "${force_flag == 'true'}"
      - type: mutate_state
        operation: set
        field: input.skill_path
        value: "${path_arg}"
    on_success: check_skill_path
    on_failure: check_skill_path

  # --- Load Skill (inline from subflows/load-skill.yaml) ---
  check_skill_path:
    type: conditional
    description: "Check if skill path was provided"
    condition:
      type: state_check
      field: input.skill_path
      operator: not_null
    branches:
      on_true: validate_skill_path
      on_false: search_for_skill

  validate_skill_path:
    type: conditional
    description: "Verify skill path exists"
    condition:
      type: path_check
      path: "${input.skill_path}"
      check: is_file
    branches:
      on_true: set_skill_path
      on_false: error_file_not_found

  set_skill_path:
    type: action
    description: "Set skill path from input"
    actions:
      - type: mutate_state
        operation: set
        field: loaded.skill_path
        value: "${input.skill_path}"
    on_success: read_skill_file
    on_failure: read_skill_file

  search_for_skill:
    type: action
    description: "Search for SKILL.md files"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          find . -name "SKILL.md" -type f 2>/dev/null | \
            grep -v "_deprecated" | grep -v "node_modules" | \
            grep -v ".hiivmind" | head -20
        store_in: found_skills
    on_success: check_search_results
    on_failure: prompt_for_path

  check_search_results:
    type: conditional
    description: "Check if skills were found"
    condition:
      type: evaluate_expression
      expression: "found_skills != '' && found_skills != null"
    branches:
      on_true: prompt_skill_selection
      on_false: prompt_for_path

  prompt_skill_selection:
    type: user_prompt
    description: "Ask user to select skill"
    prompt:
      question: "Which skill would you like to convert?"
      header: "Select"
      options_from_state: found_skills
      allow_other: true
      other_label: "Enter different path"
    on_response:
      selected:
        consequence:
          - type: mutate_state
            operation: set
            field: loaded.skill_path
            value: "${response.value}"
        next_node: read_skill_file
      other:
        next_node: prompt_for_path

  prompt_for_path:
    type: user_prompt
    description: "Ask user for skill path"
    prompt:
      question: "Please provide the path to the SKILL.md file:"
      header: "Path"
      mode: text_input
      placeholder: "path/to/SKILL.md"
    on_response:
      provided:
        consequence:
          - type: mutate_state
            operation: set
            field: loaded.skill_path
            value: "${response.text}"
        next_node: validate_skill_path

  read_skill_file:
    type: action
    description: "Read SKILL.md content"
    actions:
      - type: local_file_ops
        operation: read
        path: "${loaded.skill_path}"
        store_in: loaded.skill_content
      - type: mutate_state
        operation: set
        field: phase
        value: "analyzing"
    on_success: extract_frontmatter
    on_failure: error_read_failed

  extract_frontmatter:
    type: action
    description: "Extract YAML frontmatter"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          echo '${loaded.skill_content}' | sed -n '/^---$/,/^---$/p' | sed '1d;$d' | yq -o=json '.'
        store_in: frontmatter_json
      - type: mutate_state
        operation: set
        field: loaded.frontmatter
        value: "${frontmatter_json | fromjson}"
      - type: run_command
        interpreter: bash
        command: |
          echo '${loaded.skill_content}' | sed '1,/^---$/d' | sed '1,/^---$/d'
        store_in: loaded.body
    on_success: analyze_phases
    on_failure: error_invalid_frontmatter

  # --- Structural Analysis (from lib/patterns/skill-analysis.md) ---
  analyze_phases:
    type: action
    description: "Identify phases in skill content"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          # Extract phase headings (## Phase, ## Step, ### Step patterns)
          echo '${loaded.body}' | grep -nE '^#{2,3} (Phase|Step|Stage)' | \
            sed 's/:/ /' | jq -R -s 'split("\n") | map(select(length > 0)) |
            map(split(" ") | {line: .[0], title: .[1:] | join(" ")})'
        store_in: phases_json
      - type: mutate_state
        operation: set
        field: analysis.phases
        value: "${phases_json | fromjson}"
    on_success: analyze_conditionals
    on_failure: analyze_conditionals

  analyze_conditionals:
    type: action
    description: "Extract conditional logic"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          # Count conditionals
          echo '${loaded.body}' | grep -ciE '(^If |When |Based on |Depending on )' || echo "0"
        store_in: conditional_count
      - type: mutate_state
        operation: set
        field: analysis.conditionals
        value: "${conditional_count}"
    on_success: analyze_user_interactions
    on_failure: analyze_user_interactions

  analyze_user_interactions:
    type: action
    description: "Identify user prompts"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          echo '${loaded.body}' | grep -ciE '(AskUserQuestion|ask user|prompt user)' || echo "0"
        store_in: prompt_count
      - type: mutate_state
        operation: set
        field: analysis.user_interactions
        value: "${prompt_count}"
    on_success: calculate_complexity
    on_failure: calculate_complexity

  calculate_complexity:
    type: action
    description: "Calculate complexity score"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          phase_count=$(echo '${phases_json}' | jq 'length')
          conditional_count=${conditional_count:-0}
          prompt_count=${prompt_count:-0}

          # Weighted score
          score=$(echo "scale=2; ($phase_count * 0.3) + ($conditional_count * 0.4) + ($prompt_count * 0.3)" | bc)

          if (( $(echo "$score < 1.5" | bc -l) )); then
            echo "low"
          elif (( $(echo "$score < 2.5" | bc -l) )); then
            echo "medium"
          else
            echo "high"
          fi
        store_in: complexity
      - type: mutate_state
        operation: set
        field: analysis.complexity
        value: "${complexity}"
    on_success: show_analysis
    on_failure: show_analysis

  show_analysis:
    type: action
    description: "Display analysis results"
    actions:
      - type: display
        format: markdown
        content: |
          ## Analysis Complete: ${loaded.frontmatter.name}

          **Complexity:** ${analysis.complexity}

          | Metric | Count |
          |--------|-------|
          | Phases | ${analysis.phases | length} |
          | Conditionals | ${analysis.conditionals} |
          | User Prompts | ${analysis.user_interactions} |

          Proceeding to workflow generation...
    on_success: confirm_generation
    on_failure: confirm_generation

  confirm_generation:
    type: conditional
    description: "Check if force flag is set"
    condition:
      type: state_check
      field: flags.force
      operator: equals
      value: true
    branches:
      on_true: generate_workflow
      on_false: prompt_confirm_generation

  prompt_confirm_generation:
    type: user_prompt
    description: "Confirm workflow generation"
    prompt:
      question: "Generate workflow.yaml and SKILL.md loader?"
      header: "Confirm"
      options:
        - id: yes
          label: "Yes, generate"
          description: "Create workflow.yaml and update SKILL.md"
        - id: no
          label: "No, cancel"
          description: "Don't make any changes"
    on_response:
      yes:
        next_node: generate_workflow
      no:
        next_node: success_cancelled

  # --- Workflow Generation (from lib/patterns/workflow-generation.md) ---
  generate_workflow:
    type: action
    description: "Generate workflow.yaml content"
    actions:
      - type: mutate_state
        operation: set
        field: phase
        value: "generating"
      # Generate a basic workflow scaffold
      # In practice, this would use the full pattern from workflow-generation.md
      - type: run_command
        interpreter: bash
        command: |
          skill_name="${loaded.frontmatter.name}"
          description="${loaded.frontmatter.description}"

          cat << 'WORKFLOW'
          # ${skill_name} workflow
          # Auto-generated by hiivmind-blueprint-author-convert

          name: ${skill_name}
          version: 1.0.0
          description: >
            ${description}

          definitions:
            source: "hiivmind/hiivmind-blueprint-lib"
            version: "v3.0.0"

          start_node: check_prerequisites

          initial_state:
            phase: "start"
            flags: {}
            computed: {}
            prompts:
              mode: "interactive"

          nodes:
            check_prerequisites:
              type: conditional
              description: "Check required tools"
              condition:
                type: tool_check
                tool: jq
                capability: available
              branches:
                on_true: main_execution
                on_false: error_missing_prereqs

            main_execution:
              type: action
              description: "Main skill execution"
              actions:
                - type: display
                  format: text
                  content: "Executing ${skill_name}..."
              on_success: success
              on_failure: error_execution

          endings:
            success:
              type: success
              message: "${skill_name} completed successfully"

            error_missing_prereqs:
              type: error
              code: "MISSING_PREREQS"
              message: "Required tools not available"

            error_execution:
              type: error
              code: "EXECUTION_FAILED"
              message: "Skill execution failed"
          WORKFLOW
        store_in: generated.workflow_content
    on_success: generate_skill_loader
    on_failure: error_generation_failed

  generate_skill_loader:
    type: action
    description: "Generate thin SKILL.md loader"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          skill_name="${loaded.frontmatter.name}"
          description="${loaded.frontmatter.description}"
          allowed_tools="${loaded.frontmatter['allowed-tools']:-'Read, Write, Bash, AskUserQuestion'}"

          cat << 'SKILL'
          ---
          name: ${skill_name}
          description: >
            ${description}
          allowed-tools: ${allowed_tools}
          ---

          # ${skill_name}

          Execute this workflow deterministically. State persists in conversation context.

          ---

          ## Prerequisites

          | Tool | Required | Check | Install |
          |------|----------|-------|---------|
          | `jq` | **Mandatory** | `command -v jq` | `brew install jq` / `apt install jq` |
          | `yq` | **Mandatory** | `command -v yq` | `brew install yq` / [github.com/mikefarah/yq](https://github.com/mikefarah/yq) |

          ---

          ## Execution Protocol

          **See:** `.hiivmind/blueprint/engine_entrypoint.md` for full protocol.

          1. **Bootstrap:** Extract lib version from workflow.yaml
          2. **Fetch Semantics:** Load execution rules from blueprint-lib
          3. **Execute:** Run workflow per traversal semantics
          SKILL
        store_in: generated.skill_loader_content
    on_success: check_dry_run
    on_failure: error_generation_failed

  check_dry_run:
    type: conditional
    description: "Check if dry run"
    condition:
      type: state_check
      field: flags.dry_run
      operator: equals
      value: true
    branches:
      on_true: show_dry_run
      on_false: prepare_output_paths

  show_dry_run:
    type: action
    description: "Show what would be written (dry run)"
    actions:
      - type: display
        format: markdown
        content: |
          ## [DRY RUN] Would generate:

          ### workflow.yaml
          ```yaml
          ${generated.workflow_content}
          ```

          ### SKILL.md (loader)
          ```markdown
          ${generated.skill_loader_content}
          ```

          No files were written.
    on_success: success_dry_run
    on_failure: success_dry_run

  prepare_output_paths:
    type: action
    description: "Prepare output file paths"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          dirname "${loaded.skill_path}"
        store_in: skill_directory
    on_success: check_workflow_exists
    on_failure: error_generation_failed

  # --- Safe Write (inline from subflows/safe-write-files.yaml) ---
  check_workflow_exists:
    type: conditional
    description: "Check if workflow.yaml already exists"
    condition:
      type: path_check
      path: "${skill_directory}/workflow.yaml"
      check: exists
    branches:
      on_true: handle_existing_workflow
      on_false: write_workflow

  handle_existing_workflow:
    type: conditional
    description: "Check force flag for overwrite"
    condition:
      type: state_check
      field: flags.force
      operator: equals
      value: true
    branches:
      on_true: backup_and_write_workflow
      on_false: prompt_workflow_conflict

  prompt_workflow_conflict:
    type: user_prompt
    description: "Handle existing workflow.yaml"
    prompt:
      question: "workflow.yaml already exists. What should I do?"
      header: "Conflict"
      options:
        - id: backup
          label: "Backup + Replace"
          description: "Create .bak file and write new"
        - id: overwrite
          label: "Overwrite"
          description: "Replace without backup"
        - id: skip
          label: "Skip"
          description: "Keep existing workflow.yaml"
    on_response:
      backup:
        next_node: backup_and_write_workflow
      overwrite:
        next_node: write_workflow
      skip:
        next_node: check_skill_md_update

  backup_and_write_workflow:
    type: action
    description: "Backup existing workflow.yaml"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          cp "${skill_directory}/workflow.yaml" "${skill_directory}/workflow.yaml.bak.$(date +%Y%m%d_%H%M%S)"
        description: "Create backup"
    on_success: write_workflow
    on_failure: error_write_failed

  write_workflow:
    type: action
    description: "Write workflow.yaml"
    actions:
      - type: local_file_ops
        operation: write
        path: "${skill_directory}/workflow.yaml"
        content: "${generated.workflow_content}"
      - type: mutate_state
        operation: append
        field: output.files_written
        value: "${skill_directory}/workflow.yaml"
    on_success: check_skill_md_update
    on_failure: error_write_failed

  check_skill_md_update:
    type: user_prompt
    description: "Confirm SKILL.md update"
    prompt:
      question: "Replace SKILL.md with thin loader? (Original will be backed up)"
      header: "SKILL.md"
      options:
        - id: yes
          label: "Yes, replace"
          description: "Backup original and write loader"
        - id: no
          label: "No, keep original"
          description: "Don't modify SKILL.md"
    on_response:
      yes:
        next_node: backup_skill_md
      no:
        next_node: success_complete

  backup_skill_md:
    type: action
    description: "Backup original SKILL.md"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          cp "${loaded.skill_path}" "${loaded.skill_path}.original.$(date +%Y%m%d_%H%M%S)"
        description: "Backup original SKILL.md"
    on_success: write_skill_loader
    on_failure: error_write_failed

  write_skill_loader:
    type: action
    description: "Write thin SKILL.md loader"
    actions:
      - type: local_file_ops
        operation: write
        path: "${loaded.skill_path}"
        content: "${generated.skill_loader_content}"
      - type: mutate_state
        operation: append
        field: output.files_written
        value: "${loaded.skill_path}"
    on_success: success_complete
    on_failure: error_write_failed

endings:
  success_complete:
    type: success
    message: |
      ## Conversion Complete: ${loaded.frontmatter.name}

      ### Files Written
      ${output.files_written | join('\n- ')}

      ### Next Steps
      - Test the workflow: `/hiivmind-blueprint-author visualize ${skill_directory}/workflow.yaml`
      - Validate: `/hiivmind-blueprint-ops validate ${skill_directory}/workflow.yaml`

  success_dry_run:
    type: success
    message: "Dry run complete - no files were written"

  success_cancelled:
    type: success
    message: "Conversion cancelled by user"

  error_missing_jq:
    type: error
    code: "MISSING_JQ"
    message: |
      Required tool 'jq' is not installed.
      Install with: brew install jq (macOS) or apt install jq (Linux)

  error_missing_yq:
    type: error
    code: "MISSING_YQ"
    message: |
      Required tool 'yq' is not installed.
      Install with: brew install yq (macOS) or see https://github.com/mikefarah/yq

  error_file_not_found:
    type: error
    code: "FILE_NOT_FOUND"
    message: "SKILL.md not found: ${input.skill_path}"

  error_read_failed:
    type: error
    code: "READ_FAILED"
    message: "Failed to read SKILL.md: ${loaded.skill_path}"

  error_invalid_frontmatter:
    type: error
    code: "INVALID_FRONTMATTER"
    message: "Could not parse YAML frontmatter in SKILL.md"

  error_generation_failed:
    type: error
    code: "GENERATION_FAILED"
    message: "Failed to generate workflow content"

  error_write_failed:
    type: error
    code: "WRITE_FAILED"
    message: "Failed to write output files"
