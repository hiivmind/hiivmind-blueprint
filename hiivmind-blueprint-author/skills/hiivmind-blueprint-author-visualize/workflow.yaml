# hiivmind-blueprint-author-visualize workflow
#
# Generate Mermaid diagrams from workflow.yaml files.
# Uses load-workflow subflow for file loading.

name: hiivmind-blueprint-author-visualize
version: 1.0.0
description: Generate Mermaid diagrams from workflow.yaml

definitions:
  source: "hiivmind/hiivmind-blueprint-lib"
  version: "v3.0.0"

start_node: check_prerequisites

initial_state:
  phase: "start"
  flags:
    compact: false
    format: "md"  # mmd | md | md-linked | png | svg
  input:
    workflow_path: null
    output_path: null
  loaded:
    workflow_path: null
    workflow: null
  generated:
    mermaid: null
  prompts:
    mode: "interactive"

nodes:
  # --- Prerequisites ---
  check_prerequisites:
    type: conditional
    description: "Check if jq is available"
    condition:
      type: tool_check
      tool: jq
      capability: available
    branches:
      on_true: check_yq
      on_false: error_missing_jq

  check_yq:
    type: conditional
    description: "Check if yq is available"
    condition:
      type: tool_check
      tool: yq
      capability: available
    branches:
      on_true: parse_args
      on_false: error_missing_yq

  parse_args:
    type: action
    description: "Parse command arguments"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          args="${arguments:-}"
          echo "$args" | grep -qE '--compact' && echo "true" || echo "false"
        store_in: compact_flag
      - type: run_command
        interpreter: bash
        command: |
          args="${arguments:-}"
          # Extract --output value
          echo "$args" | grep -oE -- '--output [^ ]+' | cut -d' ' -f2 || echo ""
        store_in: output_arg
      - type: run_command
        interpreter: bash
        command: |
          args="${arguments:-}"
          # Extract --format value (mmd, md, md-linked, png, svg)
          format=$(echo "$args" | grep -oE -- '--format [^ ]+' | cut -d' ' -f2)
          echo "${format:-md}"
        store_in: format_arg
      - type: run_command
        interpreter: bash
        command: |
          args="${arguments:-}"
          # Extract non-flag argument (workflow path)
          echo "$args" | tr ' ' '\n' | grep -v '^-' | head -1
        store_in: path_arg
      - type: mutate_state
        operation: set
        field: flags.compact
        value: "${compact_flag == 'true'}"
      - type: mutate_state
        operation: set
        field: flags.format
        value: "${format_arg}"
      - type: mutate_state
        operation: set
        field: input.output_path
        value: "${output_arg}"
      - type: mutate_state
        operation: set
        field: input.workflow_path
        value: "${path_arg}"
    on_success: check_workflow_path
    on_failure: check_workflow_path

  # --- Load Workflow (inline from subflows/load-workflow.yaml) ---
  check_workflow_path:
    type: conditional
    description: "Check if workflow path was provided"
    condition:
      type: state_check
      field: input.workflow_path
      operator: not_null
    branches:
      on_true: validate_workflow_path
      on_false: search_for_workflow

  validate_workflow_path:
    type: conditional
    description: "Verify workflow path exists"
    condition:
      type: path_check
      path: "${input.workflow_path}"
      check: is_file
    branches:
      on_true: set_workflow_path
      on_false: error_file_not_found

  set_workflow_path:
    type: action
    description: "Set workflow path from input"
    actions:
      - type: mutate_state
        operation: set
        field: loaded.workflow_path
        value: "${input.workflow_path}"
    on_success: read_workflow
    on_failure: read_workflow

  search_for_workflow:
    type: action
    description: "Search for workflow.yaml files"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          find . -name "workflow.yaml" -type f 2>/dev/null | \
            grep -v "_deprecated" | grep -v "node_modules" | head -20
        store_in: found_workflows
    on_success: check_search_results
    on_failure: prompt_for_path

  check_search_results:
    type: conditional
    description: "Check if workflows were found"
    condition:
      type: evaluate_expression
      expression: "found_workflows != '' && found_workflows != null"
    branches:
      on_true: prompt_workflow_selection
      on_false: prompt_for_path

  prompt_workflow_selection:
    type: user_prompt
    description: "Ask user to select workflow"
    prompt:
      question: "Which workflow would you like to visualize?"
      header: "Select"
      options_from_state: found_workflows
      allow_other: true
    on_response:
      selected:
        consequence:
          - type: mutate_state
            operation: set
            field: loaded.workflow_path
            value: "${response.value}"
        next_node: read_workflow
      other:
        next_node: prompt_for_path

  prompt_for_path:
    type: user_prompt
    description: "Ask user for workflow path"
    prompt:
      question: "Please provide the path to workflow.yaml:"
      header: "Path"
      mode: text_input
      placeholder: "skills/my-skill/workflow.yaml"
    on_response:
      provided:
        consequence:
          - type: mutate_state
            operation: set
            field: loaded.workflow_path
            value: "${response.text}"
        next_node: validate_workflow_path

  read_workflow:
    type: action
    description: "Read and parse workflow.yaml"
    actions:
      - type: local_file_ops
        operation: read
        path: "${loaded.workflow_path}"
        store_in: workflow_content
      - type: run_command
        interpreter: bash
        command: |
          echo '${workflow_content}' | yq -o=json '.'
        store_in: workflow_json
      - type: mutate_state
        operation: set
        field: loaded.workflow
        value: "${workflow_json | fromjson}"
      - type: mutate_state
        operation: set
        field: phase
        value: "generating"
    on_success: generate_mermaid
    on_failure: error_invalid_yaml

  # --- Mermaid Generation ---
  generate_mermaid:
    type: action
    description: "Generate Mermaid flowchart from workflow"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          workflow='${loaded.workflow | tojson}'
          compact="${flags.compact:-false}"

          # Extract workflow info
          name=$(echo "$workflow" | jq -r '.name // "workflow"')
          start_node=$(echo "$workflow" | jq -r '.start_node // "start"')

          # Start mermaid diagram
          echo "flowchart TD"
          echo "    subgraph ${name}"

          # Process nodes
          echo "$workflow" | jq -r '.nodes | to_entries[] | .key' | while read node_id; do
            node=$(echo "$workflow" | jq ".nodes[\"$node_id\"]")
            node_type=$(echo "$node" | jq -r '.type // "action"')
            description=$(echo "$node" | jq -r '.description // "" | .[0:30]')

            # Determine node shape based on type
            case "$node_type" in
              "conditional")
                echo "    ${node_id}{\"${node_id}\"}"
                # Add branches
                on_true=$(echo "$node" | jq -r '.branches.on_true // empty')
                on_false=$(echo "$node" | jq -r '.branches.on_false // empty')
                [ -n "$on_true" ] && echo "    ${node_id} -->|true| ${on_true}"
                [ -n "$on_false" ] && echo "    ${node_id} -->|false| ${on_false}"
                ;;
              "user_prompt")
                echo "    ${node_id}[/\"${node_id}\"/]"
                # Add response transitions
                echo "$node" | jq -r '.on_response | keys[]' 2>/dev/null | while read resp; do
                  next=$(echo "$node" | jq -r ".on_response[\"$resp\"].next_node // empty")
                  [ -n "$next" ] && echo "    ${node_id} -->|${resp}| ${next}"
                done
                ;;
              "action")
                echo "    ${node_id}[\"${node_id}\"]"
                on_success=$(echo "$node" | jq -r '.on_success // empty')
                on_failure=$(echo "$node" | jq -r '.on_failure // empty')
                [ -n "$on_success" ] && echo "    ${node_id} --> ${on_success}"
                [ -n "$on_failure" ] && [ "$on_failure" != "$on_success" ] && echo "    ${node_id} -.->|error| ${on_failure}"
                ;;
              *)
                echo "    ${node_id}[\"${node_id}\"]"
                ;;
            esac
          done

          # Process endings
          echo "$workflow" | jq -r '.endings | to_entries[] | .key' | while read ending_id; do
            ending=$(echo "$workflow" | jq ".endings[\"$ending_id\"]")
            ending_type=$(echo "$ending" | jq -r '.type // "success"')

            if [ "$ending_type" = "success" ]; then
              echo "    ${ending_id}((\"✓ ${ending_id}\"))"
            else
              echo "    ${ending_id}((\"✗ ${ending_id}\"))"
            fi
          done

          echo "    end"

          # Mark start node
          echo "    style ${start_node} fill:#90EE90"
        store_in: generated.mermaid
    on_success: check_output_mode
    on_failure: error_generation_failed

  check_output_mode:
    type: conditional
    description: "Check if output to file requested"
    condition:
      type: state_check
      field: input.output_path
      operator: not_null
    branches:
      on_true: check_image_export
      on_false: display_diagram

  # --- Format Routing ---
  check_image_export:
    type: conditional
    description: "Check if image export requested (png, svg, or md-linked)"
    condition:
      type: evaluate_expression
      expression: "flags.format == 'png' || flags.format == 'svg' || flags.format == 'md-linked'"
    branches:
      on_true: check_mmdc_available
      on_false: check_mmd_format

  check_mmd_format:
    type: conditional
    description: "Check if pure mermaid format requested"
    condition:
      type: evaluate_expression
      expression: "flags.format == 'mmd'"
    branches:
      on_true: write_mmd_file
      on_false: write_to_file

  write_mmd_file:
    type: action
    description: "Write pure Mermaid file (no markdown wrapper)"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          output_base="${input.output_path%.*}"
          echo "${output_base}.mmd"
        store_in: mmd_output_path
      - type: local_file_ops
        operation: write
        path: "${mmd_output_path}"
        content: "${generated.mermaid}"
      - type: display
        format: text
        content: "Mermaid written to: ${mmd_output_path}"
    on_success: success_complete
    on_failure: error_write_failed

  check_mmdc_available:
    type: conditional
    description: "Check if mermaid-cli (mmdc) is available"
    condition:
      type: tool_check
      tool: mmdc
      capability: available
    branches:
      on_true: export_image
      on_false: fallback_to_markdown

  export_image:
    type: action
    description: "Export diagram as PNG/SVG using mermaid-cli"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          # Determine output path with correct extension
          # For md-linked, we generate PNG
          output_base="${input.output_path%.*}"
          format="${flags.format}"
          if [ "$format" = "md-linked" ]; then
            output_image="${output_base}.png"
          else
            output_image="${output_base}.${format}"
          fi
          echo "$output_image"
        store_in: output_image_path
      - type: run_command
        interpreter: bash
        command: |
          # Create temp mermaid file
          temp_mmd=$(mktemp --suffix=.mmd)
          echo '${generated.mermaid}' > "$temp_mmd"
          echo "$temp_mmd"
        store_in: temp_mmd_path
      - type: run_command
        interpreter: bash
        command: |
          # Export using mermaid-cli with puppeteer config for Linux compatibility
          mmdc -i "${temp_mmd_path}" -o "${output_image_path}" -b transparent \
            -p <(echo '{"args": ["--no-sandbox", "--disable-setuid-sandbox"]}')
          rm -f "${temp_mmd_path}"
      - type: display
        format: text
        content: "Exported: ${output_image_path}"
    on_success: check_md_linked
    on_failure: error_export_failed

  check_md_linked:
    type: conditional
    description: "Check if md-linked format (need to write md file too)"
    condition:
      type: evaluate_expression
      expression: "flags.format == 'md-linked'"
    branches:
      on_true: write_md_with_image_link
      on_false: success_complete

  write_md_with_image_link:
    type: action
    description: "Write markdown file with image link"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          output_base="${input.output_path%.*}"
          echo "${output_base}.md"
        store_in: md_output_path
      - type: run_command
        interpreter: bash
        command: |
          # Get just the filename for the relative link
          output_base="${input.output_path%.*}"
          basename "${output_base}.png"
        store_in: png_filename
      - type: local_file_ops
        operation: write
        path: "${md_output_path}"
        content: |
          # Workflow Diagram: ${loaded.workflow.name}

          ![${loaded.workflow.name}](./${png_filename})
      - type: display
        format: text
        content: "Exported: ${md_output_path} + ${output_image_path}"
    on_success: success_complete
    on_failure: error_write_failed

  fallback_to_markdown:
    type: action
    description: "Fallback to markdown when mermaid-cli not available"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          # Determine output path - ensure .md extension for fallback
          output_base="${input.output_path%.*}"
          echo "${output_base}.md"
        store_in: fallback_output_path
      - type: display
        format: text
        content: |
          Note: mermaid-cli (mmdc) is not installed. Falling back to embedded markdown output.
          To enable image export, install: npm install -g @mermaid-js/mermaid-cli
      - type: local_file_ops
        operation: write
        path: "${fallback_output_path}"
        content: |
          # Workflow Diagram: ${loaded.workflow.name}

          ```mermaid
          ${generated.mermaid}
          ```
      - type: display
        format: text
        content: "Diagram written to: ${fallback_output_path}"
    on_success: success_complete
    on_failure: error_write_failed

  write_to_file:
    type: action
    description: "Write Mermaid to file"
    actions:
      - type: local_file_ops
        operation: write
        path: "${input.output_path}"
        content: |
          # Workflow Diagram: ${loaded.workflow.name}

          ```mermaid
          ${generated.mermaid}
          ```
      - type: display
        format: text
        content: "Diagram written to: ${input.output_path}"
    on_success: success_complete
    on_failure: error_write_failed

  display_diagram:
    type: action
    description: "Display Mermaid diagram"
    actions:
      - type: display
        format: markdown
        content: |
          ## Workflow Diagram: ${loaded.workflow.name}

          ```mermaid
          ${generated.mermaid}
          ```

          **Nodes:** ${loaded.workflow.nodes | keys | length}
          **Endings:** ${loaded.workflow.endings | keys | length}
          **Start:** ${loaded.workflow.start_node}
    on_success: success_complete
    on_failure: success_complete

endings:
  success_complete:
    type: success
    message: "Visualization complete"

  error_missing_jq:
    type: error
    code: "MISSING_JQ"
    message: "Required tool 'jq' is not installed"

  error_missing_yq:
    type: error
    code: "MISSING_YQ"
    message: "Required tool 'yq' is not installed"

  error_file_not_found:
    type: error
    code: "FILE_NOT_FOUND"
    message: "workflow.yaml not found: ${input.workflow_path}"

  error_invalid_yaml:
    type: error
    code: "INVALID_YAML"
    message: "Could not parse workflow.yaml"

  error_generation_failed:
    type: error
    code: "GENERATION_FAILED"
    message: "Failed to generate Mermaid diagram"

  error_write_failed:
    type: error
    code: "WRITE_FAILED"
    message: "Failed to write diagram to file"

  error_export_failed:
    type: error
    code: "EXPORT_FAILED"
    message: "Failed to export image. Ensure mermaid-cli is installed: npm install -g @mermaid-js/mermaid-cli"
