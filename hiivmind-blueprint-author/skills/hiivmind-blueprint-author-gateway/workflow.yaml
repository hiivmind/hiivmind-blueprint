# hiivmind-blueprint-author-gateway workflow
#
# Generate gateway command files for multi-skill plugins.
# Uses discover-all-skills to find skills, then generates routing.

name: hiivmind-blueprint-author-gateway
version: 1.0.0
description: Generate gateway command for multi-skill plugins

definitions:
  source: "hiivmind/hiivmind-blueprint-lib"
  version: "v3.0.0"

start_node: check_prerequisites

initial_state:
  phase: "start"
  flags:
    force: false
  input:
    plugin_name: null
  discovered:
    skills: []
  generated:
    gateway_md: null
    workflow_yaml: null
    intent_mapping: null
  output:
    files_written: []
  prompts:
    mode: "interactive"

nodes:
  # --- Prerequisites ---
  check_prerequisites:
    type: conditional
    description: "Check if jq is available"
    condition:
      type: tool_check
      tool: jq
      capability: available
    branches:
      on_true: check_yq
      on_false: error_missing_jq

  check_yq:
    type: conditional
    description: "Check if yq is available"
    condition:
      type: tool_check
      tool: yq
      capability: available
    branches:
      on_true: detect_plugin_name
      on_false: error_missing_yq

  # --- Plugin Detection ---
  detect_plugin_name:
    type: action
    description: "Detect plugin name from manifest"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          if [ -f ".claude-plugin/plugin.json" ]; then
            jq -r '.name // empty' .claude-plugin/plugin.json
          else
            basename "$(pwd)"
          fi
        store_in: detected_name
    on_success: confirm_plugin_name
    on_failure: prompt_plugin_name

  confirm_plugin_name:
    type: conditional
    description: "Check if plugin name was detected"
    condition:
      type: evaluate_expression
      expression: "detected_name != '' && detected_name != null"
    branches:
      on_true: set_plugin_name
      on_false: prompt_plugin_name

  set_plugin_name:
    type: action
    description: "Set detected plugin name"
    actions:
      - type: mutate_state
        operation: set
        field: input.plugin_name
        value: "${detected_name}"
    on_success: discover_skills
    on_failure: discover_skills

  prompt_plugin_name:
    type: user_prompt
    description: "Ask for plugin name"
    prompt:
      question: "What should the gateway command be named?"
      header: "Name"
      mode: text_input
      placeholder: "my-plugin"
    on_response:
      provided:
        consequence:
          - type: mutate_state
            operation: set
            field: input.plugin_name
            value: "${response.text}"
        next_node: discover_skills

  # --- Skill Discovery ---
  discover_skills:
    type: action
    description: "Discover all skills in plugin"
    actions:
      - type: mutate_state
        operation: set
        field: phase
        value: "discovering"
      - type: run_command
        interpreter: bash
        command: |
          # Find all workflow-based skills (have workflow.yaml)
          skills='[]'
          for dir in skills/*/; do
            if [ -f "${dir}workflow.yaml" ] && [ -f "${dir}SKILL.md" ]; then
              name=$(yq -r '.name // "unnamed"' "${dir}workflow.yaml")
              desc=$(yq -r '.description // ""' "${dir}workflow.yaml")
              short_name=$(basename "$dir")
              skills=$(echo "$skills" | jq --arg name "$name" --arg desc "$desc" \
                --arg short "$short_name" --arg dir "$dir" \
                '. + [{"name": $name, "description": $desc, "short_name": $short, "directory": $dir}]')
            fi
          done
          echo "$skills"
        store_in: skills_json
      - type: mutate_state
        operation: set
        field: discovered.skills
        value: "${skills_json | fromjson}"
    on_success: check_has_skills
    on_failure: error_discovery_failed

  check_has_skills:
    type: conditional
    description: "Check if any skills were found"
    condition:
      type: evaluate_expression
      expression: "(discovered.skills | length) > 0"
    branches:
      on_true: show_skills_summary
      on_false: error_no_skills

  show_skills_summary:
    type: action
    description: "Show discovered skills"
    actions:
      - type: display
        format: markdown
        content: |
          ## Skills for Gateway: ${input.plugin_name}

          Found ${discovered.skills | length} workflow-based skills:

          | Skill | Description |
          |-------|-------------|
          ${discovered.skills | map("| " + .name + " | " + .description + " |") | join('\n')}
    on_success: confirm_generation
    on_failure: confirm_generation

  confirm_generation:
    type: user_prompt
    description: "Confirm gateway generation"
    prompt:
      question: "Generate gateway command for these skills?"
      header: "Confirm"
      options:
        - id: yes
          label: "Yes, generate"
          description: "Create gateway files in commands/${input.plugin_name}/"
        - id: no
          label: "Cancel"
          description: "Don't generate anything"
    on_response:
      yes:
        next_node: generate_gateway_md
      no:
        next_node: success_cancelled

  # --- File Generation ---
  generate_gateway_md:
    type: action
    description: "Generate gateway command markdown"
    actions:
      - type: mutate_state
        operation: set
        field: phase
        value: "generating"
      - type: run_command
        interpreter: bash
        command: |
          plugin_name="${input.plugin_name}"
          cat << 'GATEWAY'
          ---
          name: ${plugin_name}
          description: >
            Gateway command for ${plugin_name} plugin. Routes requests to appropriate skills
            based on intent detection.
          allowed-tools: Read, Glob, AskUserQuestion
          ---

          # ${plugin_name}

          Gateway command that routes to plugin skills based on detected intent.

          ## Usage

          \`\`\`
          /${plugin_name} [action] [arguments]
          /${plugin_name} help
          \`\`\`

          ## Available Actions

          Run \`/${plugin_name} help\` to see available commands.

          ## Execution Protocol

          See: \`.hiivmind/blueprint/engine_entrypoint.md\`
          GATEWAY
        store_in: generated.gateway_md
    on_success: generate_workflow_yaml
    on_failure: error_generation_failed

  generate_workflow_yaml:
    type: action
    description: "Generate gateway workflow"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          plugin_name="${input.plugin_name}"

          # Build menu options from skills
          menu_options=""
          response_handlers=""
          for skill in $(echo '${discovered.skills | tojson}' | jq -r '.[].short_name'); do
            name=$(echo '${discovered.skills | tojson}' | jq -r ".[] | select(.short_name == \"$skill\") | .name")
            desc=$(echo '${discovered.skills | tojson}' | jq -r ".[] | select(.short_name == \"$skill\") | .description" | head -c 50)
            menu_options="$menu_options
            - id: $skill
              label: \"${name##*-}\"
              description: \"$desc\""
            response_handlers="$response_handlers
              $skill:
                consequence:
                  - type: mutate_state
                    operation: set
                    field: computed.matched_skill
                    value: \"$name\"
                next_node: execute_skill"
          done

          cat << WORKFLOW
          name: ${plugin_name}-gateway
          version: 1.0.0
          description: Gateway workflow for ${plugin_name} plugin

          definitions:
            source: "hiivmind/hiivmind-blueprint-lib"
            version: "v3.0.0"

          start_node: route_by_intent

          initial_state:
            flags:
              help_requested: false
            computed:
              matched_action: null
              matched_skill: null
            prompts:
              mode: "interactive"

          nodes:
            route_by_intent:
              type: conditional
              description: "Route to skill based on detected intent"
              condition:
                type: state_check
                field: computed.matched_action
                operator: not_null
              branches:
                on_true: execute_skill
                on_false: show_menu

            show_menu:
              type: user_prompt
              description: "Display available skills menu"
              prompt:
                question: "What would you like to do?"
                header: "Action"
                options:
          $menu_options
              on_response:
          $response_handlers

            execute_skill:
              type: action
              description: "Execute the selected skill"
              actions:
                - type: invoke_skill
                  skill_path: "\${CLAUDE_PLUGIN_ROOT}/skills/\${computed.matched_skill}/SKILL.md"
              on_success: success_completed
              on_failure: error_skill_failed

          endings:
            success_completed:
              type: success
              message: "Operation completed successfully"

            error_skill_failed:
              type: error
              message: "Skill execution failed"
          WORKFLOW
        store_in: generated.workflow_yaml
    on_success: generate_intent_mapping
    on_failure: error_generation_failed

  generate_intent_mapping:
    type: action
    description: "Generate intent mapping"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          # Build intent mapping from skill descriptions
          flags=""
          rules=""
          for skill in $(echo '${discovered.skills | tojson}' | jq -r '.[].short_name'); do
            name=$(echo '${discovered.skills | tojson}' | jq -r ".[] | select(.short_name == \"$skill\") | .name")
            short="${skill##*-}"
            flags="$flags
            has_${short}:
              positive: [\"$short\", \"${short}s\"]
              negative: [\"don't $short\", \"no $short\"]"
            rules="$rules
            - name: ${short}_action
              conditions:
                has_${short}: T
              action: $short
              priority: 10"
          done

          cat << INTENT
          # Intent mapping for gateway routing
          # Generated by hiivmind-blueprint-author-gateway

          flags:
          $flags

          rules:
          $rules

          fallback:
            action: show_menu
          INTENT
        store_in: generated.intent_mapping
    on_success: write_files
    on_failure: error_generation_failed

  write_files:
    type: action
    description: "Write generated files"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          mkdir -p "commands/${input.plugin_name}"
        description: "Create commands directory"
      - type: local_file_ops
        operation: write
        path: "commands/${input.plugin_name}/${input.plugin_name}.md"
        content: "${generated.gateway_md}"
      - type: local_file_ops
        operation: write
        path: "commands/${input.plugin_name}/workflow.yaml"
        content: "${generated.workflow_yaml}"
      - type: local_file_ops
        operation: write
        path: "commands/${input.plugin_name}/intent-mapping.yaml"
        content: "${generated.intent_mapping}"
      - type: mutate_state
        operation: set
        field: output.files_written
        value:
          - "commands/${input.plugin_name}/${input.plugin_name}.md"
          - "commands/${input.plugin_name}/workflow.yaml"
          - "commands/${input.plugin_name}/intent-mapping.yaml"
    on_success: success_complete
    on_failure: error_write_failed

endings:
  success_complete:
    type: success
    message: |
      ## Gateway Generated: ${input.plugin_name}

      ### Files Created
      - commands/${input.plugin_name}/${input.plugin_name}.md
      - commands/${input.plugin_name}/workflow.yaml
      - commands/${input.plugin_name}/intent-mapping.yaml

      ### Next Steps
      - Test: `/${input.plugin_name} help`
      - Customize intent keywords in intent-mapping.yaml

  success_cancelled:
    type: success
    message: "Gateway generation cancelled"

  error_missing_jq:
    type: error
    code: "MISSING_JQ"
    message: "Required tool 'jq' is not installed"

  error_missing_yq:
    type: error
    code: "MISSING_YQ"
    message: "Required tool 'yq' is not installed"

  error_discovery_failed:
    type: error
    code: "DISCOVERY_FAILED"
    message: "Failed to discover skills"

  error_no_skills:
    type: error
    code: "NO_SKILLS"
    message: "No workflow-based skills found. Convert skills first with /hiivmind-blueprint-author convert"

  error_generation_failed:
    type: error
    code: "GENERATION_FAILED"
    message: "Failed to generate gateway files"

  error_write_failed:
    type: error
    code: "WRITE_FAILED"
    message: "Failed to write gateway files"
