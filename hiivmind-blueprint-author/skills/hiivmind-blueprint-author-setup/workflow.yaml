# hiivmind-blueprint-author-setup workflow
#
# Simplified init - creates infrastructure only (engine entrypoint, version file, directories).
# Does NOT create skill templates - use 'convert' for that.
#
# Subflow composition: Uses prerequisites-check inline
# Future: Will use `type: reference` when blueprint-lib supports it

name: hiivmind-blueprint-author-setup
version: 1.0.0
description: Set up plugin infrastructure for workflow support

definitions:
  source: "hiivmind/hiivmind-blueprint-lib"
  version: "v3.0.0"

start_node: check_prerequisites

initial_state:
  phase: "start"
  flags:
    is_plugin: false
    has_skills: false
    has_engine_entrypoint: false
    has_version_file: false
  computed:
    plugin_name: null
    created_files: []
  prompts:
    mode: "interactive"

nodes:
  # --- Prerequisites (inline from subflows/prerequisites-check.yaml) ---
  check_prerequisites:
    type: conditional
    description: "Check if jq is available"
    condition:
      type: tool_check
      tool: jq
      capability: available
    branches:
      on_true: check_yq
      on_false: error_missing_jq

  check_yq:
    type: conditional
    description: "Check if yq is available"
    condition:
      type: tool_check
      tool: yq
      capability: available
    branches:
      on_true: detect_context
      on_false: error_missing_yq

  # --- Context Detection ---
  detect_context:
    type: action
    description: "Detect current project context"
    actions:
      - type: mutate_state
        operation: set
        field: phase
        value: "detecting"
    on_success: check_plugin_manifest
    on_failure: check_plugin_manifest

  check_plugin_manifest:
    type: conditional
    description: "Check if .claude-plugin/plugin.json exists"
    condition:
      type: path_check
      path: ".claude-plugin/plugin.json"
      check: is_file
    branches:
      on_true: record_is_plugin
      on_false: check_skills_directory

  record_is_plugin:
    type: action
    description: "Record this is a plugin"
    actions:
      - type: mutate_state
        operation: set
        field: flags.is_plugin
        value: true
      - type: run_command
        interpreter: bash
        command: |
          jq -r '.name // "unnamed"' .claude-plugin/plugin.json
        store_in: plugin_name
      - type: mutate_state
        operation: set
        field: computed.plugin_name
        value: "${plugin_name}"
    on_success: check_skills_directory
    on_failure: check_skills_directory

  check_skills_directory:
    type: conditional
    description: "Check if skills/ directory exists"
    condition:
      type: path_check
      path: "skills"
      check: is_directory
    branches:
      on_true: record_has_skills
      on_false: check_engine_entrypoint

  record_has_skills:
    type: action
    description: "Record skills directory exists"
    actions:
      - type: mutate_state
        operation: set
        field: flags.has_skills
        value: true
    on_success: check_engine_entrypoint
    on_failure: check_engine_entrypoint

  check_engine_entrypoint:
    type: conditional
    description: "Check if engine entrypoint exists"
    condition:
      type: path_check
      path: ".hiivmind/blueprint/engine_entrypoint.md"
      check: is_file
    branches:
      on_true: record_has_entrypoint
      on_false: check_version_file

  record_has_entrypoint:
    type: action
    description: "Record engine entrypoint exists"
    actions:
      - type: mutate_state
        operation: set
        field: flags.has_engine_entrypoint
        value: true
    on_success: check_version_file
    on_failure: check_version_file

  check_version_file:
    type: conditional
    description: "Check if version file exists"
    condition:
      type: path_check
      path: "BLUEPRINT_LIB_VERSION.yaml"
      check: is_file
    branches:
      on_true: record_has_version_file
      on_false: evaluate_setup_needs

  record_has_version_file:
    type: action
    description: "Record version file exists"
    actions:
      - type: mutate_state
        operation: set
        field: flags.has_version_file
        value: true
    on_success: evaluate_setup_needs
    on_failure: evaluate_setup_needs

  # --- Evaluate and Confirm ---
  evaluate_setup_needs:
    type: conditional
    description: "Check if any setup is needed"
    condition:
      type: all_of
      conditions:
        - type: state_check
          field: flags.has_engine_entrypoint
          operator: equals
          value: true
        - type: state_check
          field: flags.has_version_file
          operator: equals
          value: true
        - type: state_check
          field: flags.has_skills
          operator: equals
          value: true
    branches:
      on_true: already_setup
      on_false: confirm_setup

  already_setup:
    type: user_prompt
    description: "Infrastructure already exists"
    prompt:
      question: "Blueprint infrastructure already exists. What would you like to do?"
      header: "Existing"
      options:
        - id: verify
          label: "Verify Setup"
          description: "Check all files are correctly configured"
        - id: update
          label: "Update Versions"
          description: "Update to latest blueprint-lib version"
        - id: exit
          label: "Exit"
          description: "No changes needed"
    on_response:
      verify:
        next_node: verify_setup
      update:
        next_node: create_version_file
      exit:
        next_node: success_no_changes

  confirm_setup:
    type: user_prompt
    description: "Confirm setup actions"
    prompt:
      question: "I'll create the following infrastructure. Proceed?"
      header: "Setup"
      options:
        - id: proceed
          label: "Yes, create infrastructure"
          description: "Create engine entrypoint, version file, and directories"
        - id: cancel
          label: "Cancel"
          description: "Don't make any changes"
    on_response:
      proceed:
        next_node: create_directories
      cancel:
        next_node: success_cancelled

  # --- Create Infrastructure ---
  create_directories:
    type: action
    description: "Create required directories"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          mkdir -p .hiivmind/blueprint
          mkdir -p skills
          echo "Created directories"
      - type: mutate_state
        operation: append
        field: computed.created_files
        value: ".hiivmind/blueprint/"
      - type: mutate_state
        operation: append
        field: computed.created_files
        value: "skills/"
    on_success: create_engine_entrypoint
    on_failure: error_create_failed

  create_engine_entrypoint:
    type: conditional
    description: "Check if engine entrypoint needs creation"
    condition:
      type: state_check
      field: flags.has_engine_entrypoint
      operator: equals
      value: false
    branches:
      on_true: write_engine_entrypoint
      on_false: create_version_file

  write_engine_entrypoint:
    type: action
    description: "Write engine entrypoint file"
    actions:
      - type: local_file_ops
        operation: write
        path: ".hiivmind/blueprint/engine_entrypoint.md"
        content: |
          # Blueprint Engine Entrypoint

          This document defines the execution protocol for workflow-based skills.

          ## Version Information

          - **Engine Version:** 1.0.0
          - **Blueprint Lib:** v3.0.0
          - **Source:** hiivmind/hiivmind-blueprint-lib

          ## Execution Protocol

          1. **Bootstrap Phase**
             - Extract lib version from workflow.yaml `definitions.source`
             - Fetch execution semantics from blueprint-lib
             - Validate workflow structure

          2. **Initialize Phase**
             - Set initial state from workflow.yaml `initial_state`
             - Check entry preconditions
             - Resolve start node

          3. **Execute Phase**
             - Traverse workflow graph from start_node
             - Execute nodes based on type (action, conditional, user_prompt, reference)
             - Handle transitions (on_success, on_failure, branches)

          4. **Complete Phase**
             - Reach ending node (success or error)
             - Output summary
             - Clean up state

          ## Reference

          Full semantics: https://github.com/hiivmind/hiivmind-blueprint-lib
      - type: mutate_state
        operation: append
        field: computed.created_files
        value: ".hiivmind/blueprint/engine_entrypoint.md"
    on_success: create_version_file
    on_failure: error_create_failed

  create_version_file:
    type: conditional
    description: "Check if version file needs creation"
    condition:
      type: state_check
      field: flags.has_version_file
      operator: equals
      value: false
    branches:
      on_true: write_version_file
      on_false: verify_setup

  write_version_file:
    type: action
    description: "Write version configuration file"
    actions:
      - type: local_file_ops
        operation: write
        path: "BLUEPRINT_LIB_VERSION.yaml"
        content: |
          # Blueprint Library Version Configuration
          #
          # This file tracks the version of hiivmind-blueprint-lib used by this plugin.
          # Update with: /hiivmind-blueprint-author lib-version

          lib_version: "v3.0.0"
          engine_version: "1.0.0"
          source: "hiivmind/hiivmind-blueprint-lib"

          # Last updated: auto-generated
      - type: mutate_state
        operation: append
        field: computed.created_files
        value: "BLUEPRINT_LIB_VERSION.yaml"
    on_success: verify_setup
    on_failure: error_create_failed

  # --- Verification ---
  verify_setup:
    type: conditional
    description: "Verify all required files exist"
    condition:
      type: all_of
      conditions:
        - type: path_check
          path: ".hiivmind/blueprint/engine_entrypoint.md"
          check: is_file
        - type: path_check
          path: "BLUEPRINT_LIB_VERSION.yaml"
          check: is_file
        - type: path_check
          path: "skills"
          check: is_directory
    audit:
      enabled: true
      output: computed.verification_errors
      messages:
        ".hiivmind/blueprint/engine_entrypoint.md": "Engine entrypoint missing"
        "BLUEPRINT_LIB_VERSION.yaml": "Version file missing"
        "skills": "Skills directory missing"
    branches:
      on_true: success_complete
      on_false: error_verification_failed

endings:
  success_complete:
    type: success
    message: |
      ## Blueprint Infrastructure Setup Complete

      ### Files Created
      ${computed.created_files | join('\n- ')}

      ### Next Steps
      1. Discover skills to convert: `/hiivmind-blueprint-author upgrade`
      2. Convert a single skill: `/hiivmind-blueprint-author convert [path]`
      3. Generate gateway (multi-skill): `/hiivmind-blueprint-author gateway`

  success_no_changes:
    type: success
    message: "No changes made - infrastructure already configured"

  success_cancelled:
    type: success
    message: "Setup cancelled by user"

  error_missing_jq:
    type: error
    code: "MISSING_JQ"
    message: |
      Required tool 'jq' is not installed.
      Install with: brew install jq (macOS) or apt install jq (Linux)

  error_missing_yq:
    type: error
    code: "MISSING_YQ"
    message: |
      Required tool 'yq' is not installed.
      Install with: brew install yq (macOS) or see https://github.com/mikefarah/yq

  error_create_failed:
    type: error
    code: "CREATE_FAILED"
    message: "Failed to create infrastructure files"
    recovery:
      suggestion: "Check file permissions and disk space"

  error_verification_failed:
    type: error
    code: "VERIFICATION_FAILED"
    message: |
      Infrastructure verification failed:
      ${computed.verification_errors | join('\n')}
