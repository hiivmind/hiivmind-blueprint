# validate-yaml-structure.yaml
# Layer 0: Atomic Subflow
#
# Parse YAML content and validate it has required sections.
# Used to validate workflow.yaml, intent-mapping.yaml, and other
# structured YAML files before processing.

name: validate-yaml-structure
version: 1.0.0
description: Parse YAML and validate required sections

# Interface declaration for subflow composition
input_schema:
  yaml_content:
    type: string
    required: true
    description: "YAML content to validate"
  yaml_path:
    type: string
    required: false
    description: "Path to file (for error messages)"
  required_fields:
    type: array
    items: string
    required: false
    default: []
    description: "Top-level fields that must be present (e.g., ['name', 'version', 'nodes'])"
  required_sections:
    type: array
    items: string
    required: false
    default: []
    description: "Sections that must exist (can be nested like 'nodes.start')"
  schema_type:
    type: string
    enum: ["workflow", "intent-mapping", "skill-frontmatter", "generic"]
    required: false
    default: "generic"
    description: "Pre-defined schema to validate against"

output_schema:
  valid:
    type: boolean
    description: "Whether validation passed"
  parsed:
    type: object
    description: "Parsed YAML as object (null if parse failed)"
  errors:
    type: array
    items: string
    description: "List of validation errors"
  warnings:
    type: array
    items: string
    description: "List of validation warnings"

definitions:
  source: "hiivmind/hiivmind-blueprint-lib"
  version: "v3.0.0"

start_node: parse_yaml

initial_state:
  valid: false
  parsed: null
  errors: []
  warnings: []

nodes:
  parse_yaml:
    type: action
    description: "Parse YAML content"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          echo '${input.yaml_content}' | yq -o=json '.' 2>&1
        store_in: parse_result
    on_success: check_parse_result
    on_failure: error_parse_failed

  check_parse_result:
    type: conditional
    description: "Check if parsing succeeded"
    condition:
      type: evaluate_expression
      expression: "parse_result != '' && !starts_with(parse_result, 'Error')"
    branches:
      on_true: store_parsed
      on_false: record_parse_error

  record_parse_error:
    type: action
    description: "Record YAML parse error"
    actions:
      - type: mutate_state
        operation: append
        field: errors
        value: "YAML parse error: ${parse_result}"
      - type: mutate_state
        operation: set
        field: valid
        value: false
    on_success: error_invalid_yaml
    on_failure: error_invalid_yaml

  store_parsed:
    type: action
    description: "Store parsed YAML"
    actions:
      - type: mutate_state
        operation: set
        field: parsed
        value: "${parse_result | fromjson}"
    on_success: route_validation
    on_failure: record_parse_error

  route_validation:
    type: conditional
    description: "Route to appropriate validation based on schema type"
    condition:
      type: state_check
      field: input.schema_type
      operator: equals
    branches:
      "workflow": validate_workflow
      "intent-mapping": validate_intent_mapping
      "skill-frontmatter": validate_skill_frontmatter
      default: validate_custom_fields

  validate_workflow:
    type: action
    description: "Validate workflow.yaml structure"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          # Check required workflow fields
          errors=""
          echo '${parse_result}' | jq -e '.name' > /dev/null 2>&1 || errors="$errors\nMissing required field: name"
          echo '${parse_result}' | jq -e '.version' > /dev/null 2>&1 || errors="$errors\nMissing required field: version"
          echo '${parse_result}' | jq -e '.start_node' > /dev/null 2>&1 || errors="$errors\nMissing required field: start_node"
          echo '${parse_result}' | jq -e '.nodes' > /dev/null 2>&1 || errors="$errors\nMissing required field: nodes"
          echo '${parse_result}' | jq -e '.endings' > /dev/null 2>&1 || errors="$errors\nMissing required field: endings"

          # Check start_node exists in nodes
          start_node=$(echo '${parse_result}' | jq -r '.start_node // empty')
          if [ -n "$start_node" ]; then
            echo '${parse_result}' | jq -e ".nodes[\"$start_node\"]" > /dev/null 2>&1 || \
              errors="$errors\nstart_node '$start_node' not found in nodes"
          fi

          echo -e "$errors"
        store_in: validation_errors
    on_success: collect_validation_results
    on_failure: error_validation_failed

  validate_intent_mapping:
    type: action
    description: "Validate intent-mapping.yaml structure"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          errors=""
          echo '${parse_result}' | jq -e '.flags' > /dev/null 2>&1 || errors="$errors\nMissing required field: flags"
          echo '${parse_result}' | jq -e '.rules' > /dev/null 2>&1 || errors="$errors\nMissing required field: rules"
          echo -e "$errors"
        store_in: validation_errors
    on_success: collect_validation_results
    on_failure: error_validation_failed

  validate_skill_frontmatter:
    type: action
    description: "Validate SKILL.md frontmatter structure"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          errors=""
          echo '${parse_result}' | jq -e '.name' > /dev/null 2>&1 || errors="$errors\nMissing required field: name"
          echo '${parse_result}' | jq -e '.description' > /dev/null 2>&1 || errors="$errors\nMissing required field: description"
          echo -e "$errors"
        store_in: validation_errors
    on_success: collect_validation_results
    on_failure: error_validation_failed

  validate_custom_fields:
    type: action
    description: "Validate custom required fields"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          errors=""
          # Check each required field from input
          for field in ${input.required_fields:-""}; do
            if [ -n "$field" ]; then
              echo '${parse_result}' | jq -e ".$field" > /dev/null 2>&1 || \
                errors="$errors\nMissing required field: $field"
            fi
          done
          echo -e "$errors"
        store_in: validation_errors
    on_success: collect_validation_results
    on_failure: error_validation_failed

  collect_validation_results:
    type: action
    description: "Collect and evaluate validation results"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          # Filter empty lines and return errors
          echo "${validation_errors}" | grep -v '^$' | grep -v '^[[:space:]]*$' || echo ""
        store_in: filtered_errors
    on_success: evaluate_validity
    on_failure: evaluate_validity

  evaluate_validity:
    type: conditional
    description: "Determine if validation passed"
    condition:
      type: evaluate_expression
      expression: "filtered_errors == '' || filtered_errors == null"
    branches:
      on_true: success_valid
      on_false: set_errors_and_fail

  set_errors_and_fail:
    type: action
    description: "Set errors and mark as invalid"
    actions:
      - type: mutate_state
        operation: set
        field: errors
        value: "${filtered_errors | split('\n') | compact}"
      - type: mutate_state
        operation: set
        field: valid
        value: false
    on_success: success_invalid
    on_failure: success_invalid

endings:
  success_valid:
    type: success
    message: "YAML validation passed"
    summary:
      valid: true
      parsed: "${parsed}"
      errors: []
      warnings: "${warnings}"

  success_invalid:
    type: success
    message: "YAML validation failed"
    summary:
      valid: false
      parsed: "${parsed}"
      errors: "${errors}"
      warnings: "${warnings}"

  error_parse_failed:
    type: error
    code: "PARSE_FAILED"
    message: "Failed to parse YAML"
    summary:
      valid: false
      errors: ["YAML parse failed"]

  error_invalid_yaml:
    type: error
    code: "INVALID_YAML"
    message: "Invalid YAML structure"
    summary:
      valid: false
      errors: "${errors}"

  error_validation_failed:
    type: error
    code: "VALIDATION_FAILED"
    message: "Validation process failed"
