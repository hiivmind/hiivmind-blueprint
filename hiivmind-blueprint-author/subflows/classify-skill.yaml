# classify-skill.yaml
# Layer 1: Composite Subflow
#
# Classify a skill based on its structure and conversion readiness.
# Determines whether a skill is:
# - "prose" - Traditional SKILL.md without workflow.yaml
# - "workflow" - Already converted with workflow.yaml
# - "hybrid" - Has both (needs review)
# - "incomplete" - Missing required files
#
# Also detects complexity indicators for conversion planning.

name: classify-skill
version: 1.0.0
description: Classify skill type and conversion status

# Interface declaration for subflow composition
input_schema:
  skill_directory:
    type: string
    required: true
    description: "Path to skill directory containing SKILL.md"

output_schema:
  classification:
    type: string
    enum: ["prose", "workflow", "hybrid", "incomplete"]
    description: "Skill classification"
  skill_name:
    type: string
    description: "Name extracted from frontmatter"
  has_skill_md:
    type: boolean
    description: "Whether SKILL.md exists"
  has_workflow:
    type: boolean
    description: "Whether workflow.yaml exists"
  has_intent_mapping:
    type: boolean
    description: "Whether intent-mapping.yaml exists"
  complexity_indicators:
    type: object
    properties:
      phase_count: integer
      conditional_count: integer
      user_prompt_count: integer
      estimated_complexity: string
    description: "Complexity indicators for conversion planning"
  conversion_ready:
    type: boolean
    description: "Whether skill is ready for conversion"
  conversion_notes:
    type: array
    items: string
    description: "Notes about conversion status"

definitions:
  source: "hiivmind/hiivmind-blueprint-lib"
  version: "v3.0.0"

start_node: check_skill_md

initial_state:
  classification: null
  skill_name: null
  has_skill_md: false
  has_workflow: false
  has_intent_mapping: false
  complexity_indicators:
    phase_count: 0
    conditional_count: 0
    user_prompt_count: 0
    estimated_complexity: "unknown"
  conversion_ready: false
  conversion_notes: []
  skill_content: null

nodes:
  check_skill_md:
    type: conditional
    description: "Check if SKILL.md exists"
    condition:
      type: path_check
      path: "${input.skill_directory}/SKILL.md"
      check: is_file
    branches:
      on_true: read_skill_md
      on_false: no_skill_md

  no_skill_md:
    type: action
    description: "Record missing SKILL.md"
    actions:
      - type: mutate_state
        operation: set
        field: has_skill_md
        value: false
      - type: mutate_state
        operation: append
        field: conversion_notes
        value: "Missing SKILL.md - cannot classify"
    on_success: check_workflow_yaml
    on_failure: check_workflow_yaml

  read_skill_md:
    type: action
    description: "Read and parse SKILL.md"
    actions:
      - type: local_file_ops
        operation: read
        path: "${input.skill_directory}/SKILL.md"
        store_in: skill_content
      - type: mutate_state
        operation: set
        field: has_skill_md
        value: true
    on_success: extract_name
    on_failure: check_workflow_yaml

  extract_name:
    type: action
    description: "Extract skill name from frontmatter"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          echo '${skill_content}' | sed -n '/^---$/,/^---$/p' | \
            sed '1d;$d' | yq -r '.name // "unnamed"'
        store_in: skill_name
    on_success: analyze_complexity
    on_failure: check_workflow_yaml

  analyze_complexity:
    type: action
    description: "Analyze skill content for complexity indicators"
    actions:
      # Count phases (## Phase, ## Step, ### Step patterns)
      - type: run_command
        interpreter: bash
        command: |
          echo '${skill_content}' | grep -cE '^#{2,3} (Phase|Step|Stage)' || echo "0"
        store_in: phase_count
      # Count conditionals (If, When, Based on patterns)
      - type: run_command
        interpreter: bash
        command: |
          echo '${skill_content}' | grep -ciE '(^If |When |Based on |Depending on )' || echo "0"
        store_in: conditional_count
      # Count user prompts (AskUserQuestion references)
      - type: run_command
        interpreter: bash
        command: |
          echo '${skill_content}' | grep -ciE '(AskUserQuestion|ask user|prompt user|user prompt)' || echo "0"
        store_in: user_prompt_count
    on_success: calculate_complexity
    on_failure: check_workflow_yaml

  calculate_complexity:
    type: action
    description: "Calculate estimated complexity"
    actions:
      - type: mutate_state
        operation: set
        field: complexity_indicators.phase_count
        value: "${phase_count}"
      - type: mutate_state
        operation: set
        field: complexity_indicators.conditional_count
        value: "${conditional_count}"
      - type: mutate_state
        operation: set
        field: complexity_indicators.user_prompt_count
        value: "${user_prompt_count}"
      - type: run_command
        interpreter: bash
        command: |
          # Simple complexity calculation
          total=$((${phase_count:-0} + ${conditional_count:-0} + ${user_prompt_count:-0}))
          if [ "$total" -le 5 ]; then
            echo "low"
          elif [ "$total" -le 12 ]; then
            echo "medium"
          else
            echo "high"
          fi
        store_in: estimated_complexity
      - type: mutate_state
        operation: set
        field: complexity_indicators.estimated_complexity
        value: "${estimated_complexity}"
    on_success: check_workflow_yaml
    on_failure: check_workflow_yaml

  check_workflow_yaml:
    type: conditional
    description: "Check if workflow.yaml exists"
    condition:
      type: path_check
      path: "${input.skill_directory}/workflow.yaml"
      check: is_file
    branches:
      on_true: record_has_workflow
      on_false: check_intent_mapping

  record_has_workflow:
    type: action
    description: "Record workflow.yaml exists"
    actions:
      - type: mutate_state
        operation: set
        field: has_workflow
        value: true
    on_success: check_intent_mapping
    on_failure: check_intent_mapping

  check_intent_mapping:
    type: conditional
    description: "Check if intent-mapping.yaml exists"
    condition:
      type: path_check
      path: "${input.skill_directory}/intent-mapping.yaml"
      check: is_file
    branches:
      on_true: record_has_intent
      on_false: determine_classification

  record_has_intent:
    type: action
    description: "Record intent-mapping.yaml exists"
    actions:
      - type: mutate_state
        operation: set
        field: has_intent_mapping
        value: true
    on_success: determine_classification
    on_failure: determine_classification

  determine_classification:
    type: conditional
    description: "Determine skill classification"
    condition:
      type: evaluate_expression
      expression: "has_skill_md && has_workflow"
    branches:
      on_true: classify_hybrid_or_workflow
      on_false: classify_prose_or_incomplete

  classify_hybrid_or_workflow:
    type: action
    description: "Classify as hybrid or workflow"
    actions:
      # Check if SKILL.md still has substantial prose (hybrid) vs thin loader (workflow)
      - type: run_command
        interpreter: bash
        command: |
          line_count=$(echo '${skill_content}' | wc -l)
          if [ "$line_count" -gt 100 ]; then
            echo "hybrid"
          else
            echo "workflow"
          fi
        store_in: classification
      - type: mutate_state
        operation: set
        field: conversion_ready
        value: false
    on_success: add_classification_notes
    on_failure: add_classification_notes

  classify_prose_or_incomplete:
    type: conditional
    description: "Classify as prose or incomplete"
    condition:
      type: state_check
      field: has_skill_md
      operator: equals
      value: true
    branches:
      on_true: classify_prose
      on_false: classify_incomplete

  classify_prose:
    type: action
    description: "Classify as prose (conversion candidate)"
    actions:
      - type: mutate_state
        operation: set
        field: classification
        value: "prose"
      - type: mutate_state
        operation: set
        field: conversion_ready
        value: true
    on_success: add_classification_notes
    on_failure: add_classification_notes

  classify_incomplete:
    type: action
    description: "Classify as incomplete"
    actions:
      - type: mutate_state
        operation: set
        field: classification
        value: "incomplete"
      - type: mutate_state
        operation: set
        field: conversion_ready
        value: false
      - type: mutate_state
        operation: append
        field: conversion_notes
        value: "Directory exists but missing SKILL.md"
    on_success: success
    on_failure: success

  add_classification_notes:
    type: action
    description: "Add notes based on classification"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          notes=""
          case "${classification}" in
            "prose")
              notes="Ready for conversion to workflow"
              ;;
            "workflow")
              notes="Already converted (thin SKILL.md loader)"
              ;;
            "hybrid")
              notes="Has both workflow.yaml and substantial prose - review needed"
              ;;
          esac
          echo "$notes"
        store_in: classification_note
      - type: mutate_state
        operation: append
        field: conversion_notes
        value: "${classification_note}"
    on_success: success
    on_failure: success

endings:
  success:
    type: success
    message: "Classified ${skill_name}: ${classification}"
    summary:
      skill_directory: "${input.skill_directory}"
      skill_name: "${skill_name}"
      classification: "${classification}"
      has_skill_md: "${has_skill_md}"
      has_workflow: "${has_workflow}"
      has_intent_mapping: "${has_intent_mapping}"
      complexity_indicators: "${complexity_indicators}"
      conversion_ready: "${conversion_ready}"
      conversion_notes: "${conversion_notes}"
