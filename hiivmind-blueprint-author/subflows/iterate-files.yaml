# iterate-files.yaml
# Layer 0: Atomic Subflow
#
# Find files matching a glob pattern and iterate over them.
# This subflow provides the scaffolding for batch operations,
# storing the file list for the parent workflow to process.
#
# Used by: discover-all-skills, batch upgrade operations

name: iterate-files
version: 1.0.0
description: Find files by glob pattern for iteration

# Interface declaration for subflow composition
input_schema:
  search_pattern:
    type: string
    required: true
    description: "Glob pattern to match files (e.g., '**/SKILL.md', 'skills/*/workflow.yaml')"
  search_root:
    type: string
    required: false
    default: "."
    description: "Root directory for search"
  exclude_patterns:
    type: array
    items: string
    required: false
    default: []
    description: "Patterns to exclude from results (e.g., ['*_deprecated*', 'node_modules/*'])"
  sort_by:
    type: string
    enum: ["name", "path", "mtime"]
    required: false
    default: "path"
    description: "How to sort results"
  limit:
    type: integer
    required: false
    default: 100
    description: "Maximum files to return"

output_schema:
  files:
    type: array
    items:
      type: object
      properties:
        path: string
        name: string
        directory: string
    description: "List of matched files with metadata"
  count:
    type: integer
    description: "Number of files found"
  truncated:
    type: boolean
    description: "True if results were limited"

definitions:
  source: "hiivmind/hiivmind-blueprint-lib"
  version: "v3.0.0"

start_node: execute_search

initial_state:
  files: []
  count: 0
  truncated: false
  raw_results: ""

nodes:
  execute_search:
    type: action
    description: "Execute glob search for files"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          # Build find command with exclusions
          find_cmd="find ${input.search_root:-"."} -type f -name '${input.search_pattern##*/}'"

          # Add path pattern if the pattern has directory components
          if [[ "${input.search_pattern}" == *"/"* ]]; then
            find_cmd="find ${input.search_root:-"."} -type f -path '${input.search_pattern}'"
          fi

          # Execute and limit results
          eval "$find_cmd" 2>/dev/null | head -${input.limit:-100}
        store_in: raw_results
    on_success: parse_results
    on_failure: error_search_failed

  parse_results:
    type: action
    description: "Parse search results into structured array"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          # Parse results into JSON array
          echo '[]' > /tmp/files_array.json
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              name=$(basename "$file")
              dir=$(dirname "$file")
              # Append to JSON array using jq
              jq --arg path "$file" --arg name "$name" --arg dir "$dir" \
                '. + [{"path": $path, "name": $name, "directory": $dir}]' \
                /tmp/files_array.json > /tmp/files_array_new.json
              mv /tmp/files_array_new.json /tmp/files_array.json
            fi
          done <<< "${raw_results}"
          cat /tmp/files_array.json
        store_in: files_json
    on_success: set_state
    on_failure: set_empty_results

  set_state:
    type: action
    description: "Set state from parsed results"
    actions:
      - type: mutate_state
        operation: set
        field: files
        value: "${files_json | fromjson}"
      - type: run_command
        interpreter: bash
        command: |
          echo "${files_json}" | jq 'length'
        store_in: count
      - type: run_command
        interpreter: bash
        command: |
          total=$(echo "${raw_results}" | wc -l)
          limit=${input.limit:-100}
          if [ "$total" -gt "$limit" ]; then
            echo "true"
          else
            echo "false"
          fi
        store_in: truncated_str
    on_success: check_results
    on_failure: set_empty_results

  set_empty_results:
    type: action
    description: "Set empty results on parse failure"
    actions:
      - type: mutate_state
        operation: set
        field: files
        value: []
      - type: mutate_state
        operation: set
        field: count
        value: 0
      - type: mutate_state
        operation: set
        field: truncated
        value: false
    on_success: check_results
    on_failure: check_results

  check_results:
    type: conditional
    description: "Check if any files were found"
    condition:
      type: evaluate_expression
      expression: "count > 0"
    branches:
      on_true: success_found
      on_false: success_empty

endings:
  success_found:
    type: success
    message: "Found ${count} files matching ${input.search_pattern}"
    summary:
      files: "${files}"
      count: "${count}"
      truncated: "${truncated}"

  success_empty:
    type: success
    message: "No files found matching ${input.search_pattern}"
    summary:
      files: []
      count: 0
      truncated: false

  error_search_failed:
    type: error
    code: "SEARCH_FAILED"
    message: "Failed to search for files: ${input.search_pattern}"
    recovery:
      suggestion: "Check the search pattern and permissions"
