# prerequisites-check.yaml
# Layer 0: Atomic Subflow
#
# Verify required CLI tools are available before workflow execution.
# This subflow is designed to be composed into any workflow that needs
# jq, yq, or gh as dependencies.
#
# Future: When hiivmind-blueprint-lib supports subflow composition,
# this will be callable via `type: reference` nodes.

name: prerequisites-check
version: 1.0.0
description: Verify required CLI tools are available

# Interface declaration for subflow composition
input_schema:
  required_tools:
    type: array
    items: string
    required: false
    default: ["jq", "yq"]
    description: "List of tools that must be available (workflow fails if missing)"
  optional_tools:
    type: array
    items: string
    required: false
    default: ["gh"]
    description: "List of tools to check but not require (logged as warnings)"

output_schema:
  tools_status:
    type: object
    description: "Map of tool name to availability status"
  missing_required:
    type: array
    description: "List of missing required tools (empty if all present)"
  missing_optional:
    type: array
    description: "List of missing optional tools (informational)"

definitions:
  source: "hiivmind/hiivmind-blueprint-lib"
  version: "v3.0.0"

start_node: init_check

initial_state:
  tools_status: {}
  missing_required: []
  missing_optional: []

nodes:
  init_check:
    type: action
    description: "Initialize tool availability check"
    actions:
      - type: mutate_state
        operation: set
        field: phase
        value: "checking_tools"
    on_success: check_jq
    on_failure: error_init

  check_jq:
    type: conditional
    description: "Check if jq is available"
    condition:
      type: tool_check
      tool: jq
      capability: available
    branches:
      on_true: record_jq_present
      on_false: record_jq_missing

  record_jq_present:
    type: action
    description: "Record jq as available"
    actions:
      - type: mutate_state
        operation: merge
        field: tools_status
        value:
          jq: true
    on_success: check_yq
    on_failure: check_yq

  record_jq_missing:
    type: action
    description: "Record jq as missing"
    actions:
      - type: mutate_state
        operation: merge
        field: tools_status
        value:
          jq: false
      - type: mutate_state
        operation: append
        field: missing_required
        value: "jq"
    on_success: check_yq
    on_failure: check_yq

  check_yq:
    type: conditional
    description: "Check if yq is available"
    condition:
      type: tool_check
      tool: yq
      capability: available
    branches:
      on_true: record_yq_present
      on_false: record_yq_missing

  record_yq_present:
    type: action
    description: "Record yq as available"
    actions:
      - type: mutate_state
        operation: merge
        field: tools_status
        value:
          yq: true
    on_success: check_gh
    on_failure: check_gh

  record_yq_missing:
    type: action
    description: "Record yq as missing"
    actions:
      - type: mutate_state
        operation: merge
        field: tools_status
        value:
          yq: false
      - type: mutate_state
        operation: append
        field: missing_required
        value: "yq"
    on_success: check_gh
    on_failure: check_gh

  check_gh:
    type: conditional
    description: "Check if gh CLI is available (optional)"
    condition:
      type: tool_check
      tool: gh
      capability: available
    branches:
      on_true: record_gh_present
      on_false: record_gh_missing

  record_gh_present:
    type: action
    description: "Record gh as available"
    actions:
      - type: mutate_state
        operation: merge
        field: tools_status
        value:
          gh: true
    on_success: evaluate_results
    on_failure: evaluate_results

  record_gh_missing:
    type: action
    description: "Record gh as missing (optional, non-blocking)"
    actions:
      - type: mutate_state
        operation: merge
        field: tools_status
        value:
          gh: false
      - type: mutate_state
        operation: append
        field: missing_optional
        value: "gh"
    on_success: evaluate_results
    on_failure: evaluate_results

  evaluate_results:
    type: conditional
    description: "Check if all required tools are present"
    condition:
      type: evaluate_expression
      expression: "len(missing_required) == 0"
    branches:
      on_true: success
      on_false: error_missing_tools

endings:
  success:
    type: success
    message: "All required tools available"
    summary:
      tools_status: "${tools_status}"
      missing_optional: "${missing_optional}"

  error_init:
    type: error
    code: "INIT_FAILED"
    message: "Failed to initialize prerequisites check"

  error_missing_tools:
    type: error
    code: "MISSING_REQUIRED_TOOLS"
    message: |
      Missing required tools: ${missing_required}

      Install with:
      - jq: brew install jq (macOS) or apt install jq (Linux)
      - yq: brew install yq (macOS) or see https://github.com/mikefarah/yq
    recovery:
      suggestion: "Install the missing tools and retry"
