# Gateway workflow for hiivmind-blueprint
# Generated by hiivmind-blueprint (self-dogfooding)

name: "hiivmind-blueprint-gateway"
version: "2.2.0"
description: >
  Gateway command for hiivmind-blueprint. Routes requests to appropriate skills
  using 3VL intent detection.

definitions:
  source: hiivmind/hiivmind-blueprint-lib@v2.0.0

entry_preconditions: []

initial_state:
  phase: "detect"
  arguments: null
  intent: null
  flags:
    has_arguments: false
  computed: {}

start_node: check_arguments

nodes:
  check_arguments:
    type: conditional
    description: "Check if user provided arguments"
    condition:
      type: state_not_null
      field: arguments
    branches:
      on_true: parse_intent
      on_false: show_main_menu

  parse_intent:
    type: action
    description: "Parse user input with 3VL flags"
    actions:
      - type: parse_intent_flags
        input: "${arguments}"
        flag_definitions: "${intent_flags}"
        store_as: computed.intent_flags
      - type: match_3vl_rules
        flags: "${computed.intent_flags}"
        rules: "${intent_rules}"
        store_as: computed.intent_matches
    on_success: check_clear_winner
    on_failure: show_main_menu

  check_clear_winner:
    type: conditional
    description: "Check if we have a clear intent match"
    condition:
      type: flag_set
      flag: computed.intent_matches.clear_winner
    branches:
      on_true: execute_matched_intent
      on_false: show_disambiguation

  execute_matched_intent:
    type: action
    description: "Execute the matched intent's action"
    actions:
      - type: dynamic_route
        action: "${computed.intent_matches.winner.action}"
    on_success: "${computed.dynamic_target}"
    on_failure: show_main_menu

  show_disambiguation:
    type: user_prompt
    description: "Ask user to clarify when multiple intents match"
    prompt:
      question: "I found multiple possible matches. Which did you mean?"
      header: "Clarify"
      options:
        - id: init
          label: "Initialize"
          description: "Set up blueprint project"
        - id: discover
          label: "Discover"
          description: "Find skills to convert"
        - id: analyze
          label: "Analyze"
          description: "Examine a skill"
        - id: validate
          label: "Validate"
          description: "Check workflow for issues"
        - id: upgrade
          label: "Upgrade"
          description: "Update skill workflows to latest schema"
        - id: upgrade_gateway
          label: "Upgrade Gateway"
          description: "Update gateway commands to latest schema"
    on_response:
      init:
        consequence:
          - type: set_state
            field: intent
            value: init
        next_node: delegate_init
      discover:
        consequence:
          - type: set_state
            field: intent
            value: discover
        next_node: delegate_discover
      analyze:
        consequence:
          - type: set_state
            field: intent
            value: analyze
        next_node: delegate_analyze
      validate:
        consequence:
          - type: set_state
            field: intent
            value: validate
        next_node: delegate_validate
      upgrade:
        consequence:
          - type: set_state
            field: intent
            value: upgrade
        next_node: delegate_upgrade
      upgrade_gateway:
        consequence:
          - type: set_state
            field: intent
            value: upgrade_gateway
        next_node: delegate_upgrade_gateway

  show_main_menu:
    type: user_prompt
    description: "Show main menu when no arguments or unclear intent"
    prompt:
      question: "What would you like to do with hiivmind-blueprint?"
      header: "Menu"
      options:
        - id: init
          label: "Initialize"
          description: "Set up a plugin for workflow conversion"
        - id: discover
          label: "Discover"
          description: "Find skills and show conversion status"
        - id: analyze
          label: "Analyze"
          description: "Deep analysis of a skill"
        - id: convert
          label: "Convert"
          description: "Transform skill to workflow.yaml"
        - id: validate
          label: "Validate"
          description: "Check workflow.yaml for issues"
        - id: visualize
          label: "Visualize"
          description: "Generate Mermaid diagram of workflow"
        - id: upgrade
          label: "Upgrade"
          description: "Update skill workflows to latest schema"
        - id: upgrade_gateway
          label: "Upgrade Gateway"
          description: "Update gateway commands to latest schema"
    on_response:
      init:
        consequence:
          - type: set_state
            field: intent
            value: init
        next_node: delegate_init
      discover:
        consequence:
          - type: set_state
            field: intent
            value: discover
        next_node: delegate_discover
      analyze:
        consequence:
          - type: set_state
            field: intent
            value: analyze
        next_node: delegate_analyze
      convert:
        consequence:
          - type: set_state
            field: intent
            value: convert
        next_node: delegate_convert
      validate:
        consequence:
          - type: set_state
            field: intent
            value: validate
        next_node: delegate_validate
      visualize:
        consequence:
          - type: set_state
            field: intent
            value: visualize
        next_node: delegate_visualize
      upgrade:
        consequence:
          - type: set_state
            field: intent
            value: upgrade
        next_node: delegate_upgrade
      upgrade_gateway:
        consequence:
          - type: set_state
            field: intent
            value: upgrade_gateway
        next_node: delegate_upgrade_gateway

  # Delegation nodes for each skill
  delegate_init:
    type: action
    description: "Delegate to hiivmind-blueprint-init"
    actions:
      - type: invoke_skill
        skill: "hiivmind-blueprint-init"
        args: "${arguments}"
    on_success: success
    on_failure: error_delegation

  delegate_discover:
    type: action
    description: "Delegate to hiivmind-blueprint-discover"
    actions:
      - type: invoke_skill
        skill: "hiivmind-blueprint-discover"
        args: "${arguments}"
    on_success: success
    on_failure: error_delegation

  delegate_analyze:
    type: action
    description: "Delegate to hiivmind-blueprint-analyze"
    actions:
      - type: invoke_skill
        skill: "hiivmind-blueprint-analyze"
        args: "${arguments}"
    on_success: success
    on_failure: error_delegation

  delegate_convert:
    type: action
    description: "Delegate to hiivmind-blueprint-convert"
    actions:
      - type: invoke_skill
        skill: "hiivmind-blueprint-convert"
        args: "${arguments}"
    on_success: success
    on_failure: error_delegation

  delegate_generate:
    type: action
    description: "Delegate to hiivmind-blueprint-generate"
    actions:
      - type: invoke_skill
        skill: "hiivmind-blueprint-generate"
        args: "${arguments}"
    on_success: success
    on_failure: error_delegation

  delegate_gateway:
    type: action
    description: "Delegate to hiivmind-blueprint-gateway"
    actions:
      - type: invoke_skill
        skill: "hiivmind-blueprint-gateway"
        args: "${arguments}"
    on_success: success
    on_failure: error_delegation

  delegate_upgrade:
    type: action
    description: "Delegate to hiivmind-blueprint-upgrade"
    actions:
      - type: invoke_skill
        skill: "hiivmind-blueprint-upgrade"
        args: "${arguments}"
    on_success: success
    on_failure: error_delegation

  delegate_visualize:
    type: action
    description: "Delegate to hiivmind-blueprint-visualize"
    actions:
      - type: invoke_skill
        skill: "hiivmind-blueprint-visualize"
        args: "${arguments}"
    on_success: success
    on_failure: error_delegation

  delegate_validate:
    type: action
    description: "Delegate to hiivmind-blueprint-validate"
    actions:
      - type: invoke_skill
        skill: "hiivmind-blueprint-validate"
        args: "${arguments}"
    on_success: success
    on_failure: error_delegation

  delegate_upgrade_gateway:
    type: action
    description: "Delegate to hiivmind-blueprint-upgrade-gateway"
    actions:
      - type: invoke_skill
        skill: "hiivmind-blueprint-upgrade-gateway"
        args: "${arguments}"
    on_success: success
    on_failure: error_delegation

  # Help display nodes
  show_full_help:
    type: action
    description: "Display full help with ASCII box"
    actions:
      - type: display
        content: |
          ```
          ═══════════════════════════════════════════════════════════
          HIIVMIND-BLUEPRINT - Workflow Conversion System
          ═══════════════════════════════════════════════════════════

          CONVERSION PIPELINE
            /hiivmind-blueprint init              Set up plugin for workflows
            /hiivmind-blueprint discover          Find skills to convert
            /hiivmind-blueprint analyze [skill]   Analyze skill structure
            /hiivmind-blueprint convert           Transform to workflow.yaml
            /hiivmind-blueprint generate          Write files to disk

          VALIDATION & VISUALIZATION
            /hiivmind-blueprint validate          Check workflow for issues
            /hiivmind-blueprint visualize         Generate Mermaid diagram

          PLUGIN OPERATIONS
            /hiivmind-blueprint gateway           Create gateway command
            /hiivmind-blueprint upgrade           Update skill workflows to latest schema
            /hiivmind-blueprint upgrade-gateway   Update gateway commands to latest schema

          RUNTIME FLAGS
            --verbose, -v    Show all node details and condition evaluations
            --quiet, -q      Only user prompts and final result
            --terse          Batch summaries only
            --debug          Full state dumps
            --log-level=X    Set logging (error/warn/info/debug/trace)
            --no-log         Disable logging

          HELP
            /hiivmind-blueprint --help            This help screen
            /hiivmind-blueprint help [skill]      Help for specific skill
            /hiivmind-blueprint help flags        Explain runtime flags

          EXAMPLES
            /hiivmind-blueprint init ../my-plugin
            /hiivmind-blueprint analyze my-skill
            /hiivmind-blueprint --verbose validate workflow.yaml

          ═══════════════════════════════════════════════════════════
          ```
    on_success: success_help
    on_failure: success_help

  show_flag_help:
    type: action
    description: "Display runtime flags help"
    actions:
      - type: display
        content: |
          ```
          ═══════════════════════════════════════════════════════════
          HIIVMIND-BLUEPRINT - Runtime Flags
          ═══════════════════════════════════════════════════════════

          DISPLAY FLAGS (control terminal output)
            --verbose, -v    Show all node details and condition evaluations
            --quiet, -q      Only user prompts and final result
            --terse          Batch summaries only (non-interactive nodes)
            --debug          Full state dumps after each node
            --no-display     Silent mode (no terminal output)

          LOGGING FLAGS (control file logging)
            --log-level=X    Set logging level:
                               error  - Errors only
                               warn   - Warnings and errors
                               info   - Info, warnings, errors (default)
                               debug  - Debug level detail
                               trace  - Full execution trace
            --log-format=X   Output format: json, yaml, pretty
            --log-dir=X      Override log directory
            --trace          Shorthand for --log-level=trace
            --no-log         Disable all file logging
            --ci             CI mode: structured output, no progress

          FLAG SCOPE
            Flags are per-invocation only. Example:
              /hiivmind-blueprint --verbose analyze   ← verbose
              /hiivmind-blueprint convert             ← normal (reset)

          CONFIGURATION HIERARCHY
            1. Runtime flags (highest priority)
            2. Workflow initial_state
            3. Plugin .hiivmind/blueprint/display.yaml
            4. Framework defaults (lowest priority)

          ═══════════════════════════════════════════════════════════
          ```
    on_success: success_help
    on_failure: success_help

  show_skill_help_init:
    type: action
    description: "Display init skill help"
    actions:
      - type: display
        content: |
          ## hiivmind-blueprint-init

          **Purpose:** Set up a plugin for deterministic workflow conversion.

          **Usage:**
          ```
          /hiivmind-blueprint init [target_plugin_path]
          /hiivmind-blueprint init --verbose
          ```

          **What it does:**
          1. Creates `.hiivmind/blueprint/` directory structure
          2. Initializes configuration files
          3. Sets up plugin for workflow-based skills

          **Examples:**
          ```
          /hiivmind-blueprint init ../my-plugin
          /hiivmind-blueprint init .
          ```
    on_success: success_help
    on_failure: success_help

  show_skill_help_discover:
    type: action
    description: "Display discover skill help"
    actions:
      - type: display
        content: |
          ## hiivmind-blueprint-discover

          **Purpose:** Find skills and report conversion status.

          **Usage:**
          ```
          /hiivmind-blueprint discover [plugin_path]
          ```

          **Output shows:**
          - ✅ Workflow-based skills (already converted)
          - 📝 Prose skills (ready to convert)
          - ⚠️ Complex skills (may need manual review)

          **Examples:**
          ```
          /hiivmind-blueprint discover
          /hiivmind-blueprint discover ../my-plugin
          ```
    on_success: success_help
    on_failure: success_help

  show_skill_help_analyze:
    type: action
    description: "Display analyze skill help"
    actions:
      - type: display
        content: |
          ## hiivmind-blueprint-analyze

          **Purpose:** Deep analysis of SKILL.md structure.

          **Usage:**
          ```
          /hiivmind-blueprint analyze [skill_path]
          /hiivmind-blueprint analyze my-skill
          ```

          **Extracts:**
          - Phases and execution order
          - Actions and tool calls
          - Conditionals and branching
          - State variables

          **Output:** Structured analysis ready for conversion.
    on_success: success_help
    on_failure: success_help

  show_skill_help_convert:
    type: action
    description: "Display convert skill help"
    actions:
      - type: display
        content: |
          ## hiivmind-blueprint-convert

          **Purpose:** Transform analyzed skill into workflow.yaml.

          **Usage:**
          ```
          /hiivmind-blueprint convert
          /hiivmind-blueprint convert --from-analysis
          ```

          **Input:** Analysis from `hiivmind-blueprint-analyze`
          **Output:** Deterministic workflow.yaml structure

          **Workflow includes:**
          - Phases with nodes
          - Preconditions and consequences
          - Branching and routing
    on_success: success_help
    on_failure: success_help

  show_skill_help_generate:
    type: action
    description: "Display generate skill help"
    actions:
      - type: display
        content: |
          ## hiivmind-blueprint-generate

          **Purpose:** Write workflow files to skill directory.

          **Usage:**
          ```
          /hiivmind-blueprint generate
          /hiivmind-blueprint generate --dry-run
          ```

          **Creates:**
          - `workflow.yaml` - Deterministic workflow
          - `SKILL.md` - Thin loader (references workflow)

          **Options:**
          - `--dry-run` - Preview without writing
    on_success: success_help
    on_failure: success_help

  show_skill_help_validate:
    type: action
    description: "Display validate skill help"
    actions:
      - type: display
        content: |
          ## hiivmind-blueprint-validate

          **Purpose:** Check workflow.yaml for correctness.

          **Usage:**
          ```
          /hiivmind-blueprint validate [workflow_path]
          /hiivmind-blueprint validate workflow.yaml
          ```

          **Checks:**
          - JSON Schema compliance
          - Node references exist
          - No orphan/dead-end nodes
          - Precondition/consequence validity

          **Output:** Validation report with issues and suggestions.
    on_success: success_help
    on_failure: success_help

  show_skill_help_visualize:
    type: action
    description: "Display visualize skill help"
    actions:
      - type: display
        content: |
          ## hiivmind-blueprint-visualize

          **Purpose:** Generate Mermaid diagram from workflow.

          **Usage:**
          ```
          /hiivmind-blueprint visualize [workflow_path]
          /hiivmind-blueprint visualize --format=flowchart
          ```

          **Output formats:**
          - `flowchart` - Standard flow diagram
          - `stateDiagram` - State machine view

          **Tip:** Copy output to mermaid.live for rendering.
    on_success: success_help
    on_failure: success_help

  show_skill_help_upgrade:
    type: action
    description: "Display upgrade skill help"
    actions:
      - type: display
        content: |
          ## hiivmind-blueprint-upgrade

          **Purpose:** Migrate workflows to latest schema version.

          **Usage:**
          ```
          /hiivmind-blueprint upgrade [workflow_path]
          /hiivmind-blueprint upgrade --check
          ```

          **Options:**
          - `--check` - Show what would change without modifying

          **Handles:**
          - Schema version updates
          - Deprecated field migration
          - New required fields
    on_success: success_help
    on_failure: success_help

  show_skill_help_gateway:
    type: action
    description: "Display gateway skill help"
    actions:
      - type: display
        content: |
          ## hiivmind-blueprint-gateway

          **Purpose:** Create unified gateway command for multi-skill plugins.

          **Usage:**
          ```
          /hiivmind-blueprint gateway [plugin_path]
          ```

          **Creates:**
          - Gateway command markdown
          - `workflow.yaml` for routing
          - `intent-mapping.yaml` for 3VL detection

          **Best for:** Plugins with 4+ skills that benefit from intelligent routing.
    on_success: success_help
    on_failure: success_help

  show_skill_help_upgrade_gateway:
    type: action
    description: "Display upgrade-gateway skill help"
    actions:
      - type: display
        content: |
          ## hiivmind-blueprint-upgrade-gateway

          **Purpose:** Migrate gateway command workflows to latest schema version.

          **Scope:** Gateway commands in `commands/` directory only. For skills, use `upgrade`.

          **Usage:**
          ```
          /hiivmind-blueprint upgrade-gateway [gateway_path]
          /hiivmind-blueprint upgrade-gateway --check
          ```

          **Options:**
          - `--check` - Show what would change without modifying

          **Handles:**
          - Schema version updates
          - Deprecated field migration
          - New required fields
          - Fat gateway loader normalization
    on_success: success_help
    on_failure: success_help

endings:
  success:
    type: success
    message: "Request handled by hiivmind-blueprint"

  success_help:
    type: success
    message: "Help displayed"

  error_delegation:
    type: error
    message: "Failed to delegate to skill"
    recovery:
      suggestion: "Check that the skill exists and has valid SKILL.md"
      related_skill: "hiivmind-blueprint-discover"

  error_safety:
    type: error
    category: safety
    message: "I can't help with that request."
    recovery:
      suggestion: "Try rephrasing your request or use /hiivmind-blueprint help to see available operations."
