# Intent mapping for hiivmind-blueprint gateway
# Generated by hiivmind-blueprint (self-dogfooding)

intent_flags:
  # Action type flags
  has_init:
    keywords:
      - "init"
      - "initialize"
      - "setup"
      - "prepare"
      - "copy libs"
      - "add workflow support"
    description: "User wants to initialize blueprint project"

  has_discover:
    keywords:
      - "discover"
      - "find"
      - "list"
      - "show"
      - "status"
      - "what skills"
      - "scan"
    negative_keywords:
      - "find file"
      - "show help"
    description: "User wants to discover skills"

  has_analyze:
    keywords:
      - "analyze"
      - "examine"
      - "inspect"
      - "understand"
      - "breakdown"
      - "look at"
    description: "User wants to analyze a skill"

  has_convert:
    keywords:
      - "convert"
      - "transform"
      - "translate"
      - "make workflow"
      - "to workflow"
      - "to yaml"
    description: "User wants to convert skill to workflow"

  has_generate:
    keywords:
      - "generate"
      - "write"
      - "output"
      - "save"
      - "create files"
      - "write files"
    negative_keywords:
      - "generate gateway"
    description: "User wants to generate workflow files"

  has_gateway:
    keywords:
      - "gateway"
      - "create command"
      - "intent detection"
      - "routing"
      - "unified entry"
      - "generate gateway"
    description: "User wants to create gateway command"

  has_upgrade:
    keywords:
      - "upgrade"
      - "migrate"
      - "update schema"
      - "fix deprecated"
      - "modernize"
      - "upgrade skill"
      - "upgrade workflow"
    negative_keywords:
      - "upgrade gateway"
      - "upgrade command"
    description: "User wants to upgrade skill workflows"

  has_upgrade_gateway:
    keywords:
      - "upgrade gateway"
      - "upgrade command"
      - "migrate gateway"
      - "modernize gateway"
      - "normalize gateway"
      - "thin gateway"
    description: "User wants to upgrade gateway commands"

  has_visualize:
    keywords:
      - "visualize"
      - "diagram"
      - "mermaid"
      - "show flow"
      - "graph"
      - "flowchart"
      - "render"
      - "draw"
      - "see workflow"
    description: "User wants to visualize a workflow"

  has_validate:
    keywords:
      - "validate"
      - "check"
      - "lint"
      - "verify"
      - "find issues"
      - "find problems"
      - "check workflow"
      - "validate workflow"
      - "schema check"
      - "dead ends"
      - "orphan nodes"
    negative_keywords:
      - "check status"
      - "check if"
    description: "User wants to validate a workflow"

  has_help:
    keywords:
      - "help"
      - "how do i"
      - "how to"
      - "?"
      - "explain"
      - "guide"
      - "what can"
      - "show commands"
    description: "User needs guidance"

  # Explicit help flags (highest priority)
  has_help_flag:
    keywords:
      - "--help"
      - "-h"
      - "-?"
    description: "Explicit help flag invoked"

  # Runtime flag help
  has_flags_help:
    keywords:
      - "flags"
      - "options"
      - "arguments"
      - "--verbose"
      - "--quiet"
      - "--terse"
      - "--debug"
      - "--log-level"
      - "runtime flags"
      - "what flags"
    description: "User wants to understand runtime flags"

intent_rules:
  # Help intents (highest priority - explicit flags always win)
  - name: "explicit_help_flag"
    conditions:
      has_help_flag: T
    action: show_full_help
    priority: 100
    description: "Explicit --help or -h flag"

  - name: "help_with_flags"
    conditions:
      has_flags_help: T
    action: show_flag_help
    priority: 95
    description: "User wants to understand runtime flags"

  - name: "help_with_skill_init"
    conditions:
      has_help: T
      has_init: T
    action: show_skill_help_init
    priority: 85
    description: "Help with initialization"

  - name: "help_with_skill_discover"
    conditions:
      has_help: T
      has_discover: T
    action: show_skill_help_discover
    priority: 85
    description: "Help with discovery"

  - name: "help_with_skill_analyze"
    conditions:
      has_help: T
      has_analyze: T
    action: show_skill_help_analyze
    priority: 85
    description: "Help with analysis"

  - name: "help_with_skill_convert"
    conditions:
      has_help: T
      has_convert: T
    action: show_skill_help_convert
    priority: 85
    description: "Help with conversion"

  - name: "help_with_skill_generate"
    conditions:
      has_help: T
      has_generate: T
    action: show_skill_help_generate
    priority: 85
    description: "Help with generation"

  - name: "help_with_skill_validate"
    conditions:
      has_help: T
      has_validate: T
    action: show_skill_help_validate
    priority: 85
    description: "Help with validation"

  - name: "help_with_skill_visualize"
    conditions:
      has_help: T
      has_visualize: T
    action: show_skill_help_visualize
    priority: 85
    description: "Help with visualization"

  - name: "help_with_skill_upgrade"
    conditions:
      has_help: T
      has_upgrade: T
    action: show_skill_help_upgrade
    priority: 85
    description: "Help with skill upgrade"

  - name: "help_with_skill_upgrade_gateway"
    conditions:
      has_help: T
      has_upgrade_gateway: T
    action: show_skill_help_upgrade_gateway
    priority: 85
    description: "Help with gateway upgrade"

  - name: "help_with_skill_gateway"
    conditions:
      has_help: T
      has_gateway: T
    action: show_skill_help_gateway
    priority: 85
    description: "Help with gateway generation"

  # Pure skill intents (highest priority)
  - name: "init_only"
    conditions:
      has_init: T
      has_analyze: F
      has_convert: F
    action: delegate_init
    priority: 90
    description: "Initialize blueprint project"

  - name: "discover_only"
    conditions:
      has_discover: T
      has_analyze: F
      has_convert: F
    action: delegate_discover
    priority: 90
    description: "Discover skills to convert"

  - name: "analyze_only"
    conditions:
      has_analyze: T
      has_convert: F
    action: delegate_analyze
    priority: 90
    description: "Analyze a skill"

  - name: "convert_only"
    conditions:
      has_convert: T
      has_generate: F
    action: delegate_convert
    priority: 85
    description: "Convert skill to workflow"

  - name: "generate_only"
    conditions:
      has_generate: T
      has_gateway: F
    action: delegate_generate
    priority: 85
    description: "Generate workflow files"

  - name: "gateway_only"
    conditions:
      has_gateway: T
    action: delegate_gateway
    priority: 90
    description: "Create gateway command"

  - name: "upgrade_only"
    conditions:
      has_upgrade: T
    action: delegate_upgrade
    priority: 90
    description: "Upgrade skill workflows"

  - name: "upgrade_gateway_only"
    conditions:
      has_upgrade_gateway: T
    action: delegate_upgrade_gateway
    priority: 90
    description: "Upgrade gateway commands"

  - name: "visualize_only"
    conditions:
      has_visualize: T
    action: delegate_visualize
    priority: 90
    description: "Visualize workflow as diagram"

  - name: "validate_only"
    conditions:
      has_validate: T
    action: delegate_validate
    priority: 90
    description: "Validate workflow for issues"

  # Compound intents
  - name: "analyze_and_convert"
    conditions:
      has_analyze: T
      has_convert: T
    action: delegate_analyze
    priority: 80
    description: "Analyze then convert (start with analyze)"

  - name: "convert_and_generate"
    conditions:
      has_convert: T
      has_generate: T
    action: delegate_convert
    priority: 80
    description: "Convert then generate (start with convert)"

  # General help (lower priority - catches "help" without specific skill)
  - name: "general_help"
    conditions:
      has_help: T
    action: show_full_help
    priority: 20
    description: "General help request"

  # Default fallback
  - name: "show_menu"
    conditions: {}
    action: show_main_menu
    priority: 10
    description: "No clear intent, show interactive menu"

# Action definitions
actions:
  delegate_init:
    type: invoke_skill
    skill: "hiivmind-blueprint-init"
    pass_arguments: true

  delegate_discover:
    type: invoke_skill
    skill: "hiivmind-blueprint-discover"
    pass_arguments: true

  delegate_analyze:
    type: invoke_skill
    skill: "hiivmind-blueprint-analyze"
    pass_arguments: true

  delegate_convert:
    type: invoke_skill
    skill: "hiivmind-blueprint-convert"
    pass_arguments: true

  delegate_generate:
    type: invoke_skill
    skill: "hiivmind-blueprint-generate"
    pass_arguments: true

  delegate_gateway:
    type: invoke_skill
    skill: "hiivmind-blueprint-gateway"
    pass_arguments: true

  delegate_upgrade:
    type: invoke_skill
    skill: "hiivmind-blueprint-upgrade"
    pass_arguments: true

  delegate_upgrade_gateway:
    type: invoke_skill
    skill: "hiivmind-blueprint-upgrade-gateway"
    pass_arguments: true

  delegate_visualize:
    type: invoke_skill
    skill: "hiivmind-blueprint-visualize"
    pass_arguments: true

  delegate_validate:
    type: invoke_skill
    skill: "hiivmind-blueprint-validate"
    pass_arguments: true

  show_main_menu:
    type: user_prompt
    prompt:
      question: "What would you like to do with hiivmind-blueprint?"
      header: "Menu"
      options:
        - id: init
          label: "Initialize"
          description: "Set up a plugin for workflow conversion"
        - id: discover
          label: "Discover"
          description: "Find skills and show conversion status"
        - id: analyze
          label: "Analyze"
          description: "Deep analysis of a skill"
        - id: convert
          label: "Convert"
          description: "Transform skill to workflow.yaml"
        - id: validate
          label: "Validate"
          description: "Check workflow.yaml for issues"
        - id: visualize
          label: "Visualize"
          description: "Generate Mermaid diagram of workflow"

  show_full_help:
    type: display
    content: |
      ```
      ═══════════════════════════════════════════════════════════
      HIIVMIND-BLUEPRINT - Workflow Conversion System
      ═══════════════════════════════════════════════════════════

      CONVERSION PIPELINE
        /hiivmind-blueprint init              Set up plugin for workflows
        /hiivmind-blueprint discover          Find skills to convert
        /hiivmind-blueprint analyze [skill]   Analyze skill structure
        /hiivmind-blueprint convert           Transform to workflow.yaml
        /hiivmind-blueprint generate          Write files to disk

      VALIDATION & VISUALIZATION
        /hiivmind-blueprint validate          Check workflow for issues
        /hiivmind-blueprint visualize         Generate Mermaid diagram

      PLUGIN OPERATIONS
        /hiivmind-blueprint gateway           Create gateway command
        /hiivmind-blueprint upgrade           Update skill workflows to latest schema
        /hiivmind-blueprint upgrade-gateway   Update gateway commands to latest schema

      RUNTIME FLAGS
        --verbose, -v    Show all node details and condition evaluations
        --quiet, -q      Only user prompts and final result
        --terse          Batch summaries only
        --debug          Full state dumps
        --log-level=X    Set logging (error/warn/info/debug/trace)
        --no-log         Disable logging

      HELP
        /hiivmind-blueprint --help            This help screen
        /hiivmind-blueprint help [skill]      Help for specific skill
        /hiivmind-blueprint help flags        Explain runtime flags

      EXAMPLES
        /hiivmind-blueprint init ../my-plugin
        /hiivmind-blueprint analyze my-skill
        /hiivmind-blueprint --verbose validate workflow.yaml

      ═══════════════════════════════════════════════════════════
      ```

  show_flag_help:
    type: display
    content: |
      ```
      ═══════════════════════════════════════════════════════════
      HIIVMIND-BLUEPRINT - Runtime Flags
      ═══════════════════════════════════════════════════════════

      DISPLAY FLAGS (control terminal output)
        --verbose, -v    Show all node details and condition evaluations
        --quiet, -q      Only user prompts and final result
        --terse          Batch summaries only (non-interactive nodes)
        --debug          Full state dumps after each node
        --no-display     Silent mode (no terminal output)

      LOGGING FLAGS (control file logging)
        --log-level=X    Set logging level:
                           error  - Errors only
                           warn   - Warnings and errors
                           info   - Info, warnings, errors (default)
                           debug  - Debug level detail
                           trace  - Full execution trace
        --log-format=X   Output format: json, yaml, pretty
        --log-dir=X      Override log directory
        --trace          Shorthand for --log-level=trace
        --no-log         Disable all file logging
        --ci             CI mode: structured output, no progress

      FLAG SCOPE
        Flags are per-invocation only. Example:
          /hiivmind-blueprint --verbose analyze   ← verbose
          /hiivmind-blueprint convert             ← normal (reset)

      CONFIGURATION HIERARCHY
        1. Runtime flags (highest priority)
        2. Workflow initial_state
        3. Plugin .hiivmind/blueprint/display.yaml
        4. Framework defaults (lowest priority)

      ═══════════════════════════════════════════════════════════
      ```

  show_skill_help_init:
    type: display
    content: |
      ## hiivmind-blueprint-init

      **Purpose:** Set up a plugin for deterministic workflow conversion.

      **Usage:**
      ```
      /hiivmind-blueprint init [target_plugin_path]
      /hiivmind-blueprint init --verbose
      ```

      **What it does:**
      1. Creates `.hiivmind/blueprint/` directory structure
      2. Initializes configuration files
      3. Sets up plugin for workflow-based skills

      **Examples:**
      ```
      /hiivmind-blueprint init ../my-plugin
      /hiivmind-blueprint init .
      ```

  show_skill_help_discover:
    type: display
    content: |
      ## hiivmind-blueprint-discover

      **Purpose:** Find skills and report conversion status.

      **Usage:**
      ```
      /hiivmind-blueprint discover [plugin_path]
      ```

      **Output shows:**
      - ✅ Workflow-based skills (already converted)
      - 📝 Prose skills (ready to convert)
      - ⚠️ Complex skills (may need manual review)

      **Examples:**
      ```
      /hiivmind-blueprint discover
      /hiivmind-blueprint discover ../my-plugin
      ```

  show_skill_help_analyze:
    type: display
    content: |
      ## hiivmind-blueprint-analyze

      **Purpose:** Deep analysis of SKILL.md structure.

      **Usage:**
      ```
      /hiivmind-blueprint analyze [skill_path]
      /hiivmind-blueprint analyze my-skill
      ```

      **Extracts:**
      - Phases and execution order
      - Actions and tool calls
      - Conditionals and branching
      - State variables

      **Output:** Structured analysis ready for conversion.

  show_skill_help_convert:
    type: display
    content: |
      ## hiivmind-blueprint-convert

      **Purpose:** Transform analyzed skill into workflow.yaml.

      **Usage:**
      ```
      /hiivmind-blueprint convert
      /hiivmind-blueprint convert --from-analysis
      ```

      **Input:** Analysis from `hiivmind-blueprint-analyze`
      **Output:** Deterministic workflow.yaml structure

      **Workflow includes:**
      - Phases with nodes
      - Preconditions and consequences
      - Branching and routing

  show_skill_help_generate:
    type: display
    content: |
      ## hiivmind-blueprint-generate

      **Purpose:** Write workflow files to skill directory.

      **Usage:**
      ```
      /hiivmind-blueprint generate
      /hiivmind-blueprint generate --dry-run
      ```

      **Creates:**
      - `workflow.yaml` - Deterministic workflow
      - `SKILL.md` - Thin loader (references workflow)

      **Options:**
      - `--dry-run` - Preview without writing

  show_skill_help_validate:
    type: display
    content: |
      ## hiivmind-blueprint-validate

      **Purpose:** Check workflow.yaml for correctness.

      **Usage:**
      ```
      /hiivmind-blueprint validate [workflow_path]
      /hiivmind-blueprint validate workflow.yaml
      ```

      **Checks:**
      - JSON Schema compliance
      - Node references exist
      - No orphan/dead-end nodes
      - Precondition/consequence validity

      **Output:** Validation report with issues and suggestions.

  show_skill_help_visualize:
    type: display
    content: |
      ## hiivmind-blueprint-visualize

      **Purpose:** Generate Mermaid diagram from workflow.

      **Usage:**
      ```
      /hiivmind-blueprint visualize [workflow_path]
      /hiivmind-blueprint visualize --format=flowchart
      ```

      **Output formats:**
      - `flowchart` - Standard flow diagram
      - `stateDiagram` - State machine view

      **Tip:** Copy output to mermaid.live for rendering.

  show_skill_help_upgrade:
    type: display
    content: |
      ## hiivmind-blueprint-upgrade

      **Purpose:** Migrate skill workflows to latest schema version.

      **Scope:** Skills in `skills/` directory only. For gateways, use `upgrade-gateway`.

      **Usage:**
      ```
      /hiivmind-blueprint upgrade [workflow_path]
      /hiivmind-blueprint upgrade --check
      ```

      **Options:**
      - `--check` - Show what would change without modifying

      **Handles:**
      - Schema version updates
      - Deprecated field migration
      - New required fields
      - Fat skill loader normalization

  show_skill_help_upgrade_gateway:
    type: display
    content: |
      ## hiivmind-blueprint-upgrade-gateway

      **Purpose:** Migrate gateway command workflows to latest schema version.

      **Scope:** Gateway commands in `commands/` directory only. For skills, use `upgrade`.

      **Usage:**
      ```
      /hiivmind-blueprint upgrade-gateway [gateway_path]
      /hiivmind-blueprint upgrade-gateway --check
      ```

      **Options:**
      - `--check` - Show what would change without modifying

      **Handles:**
      - Schema version updates
      - Deprecated field migration
      - New required fields
      - Fat gateway loader normalization

  show_skill_help_gateway:
    type: display
    content: |
      ## hiivmind-blueprint-gateway

      **Purpose:** Create unified gateway command for multi-skill plugins.

      **Usage:**
      ```
      /hiivmind-blueprint gateway [plugin_path]
      ```

      **Creates:**
      - Gateway command markdown
      - `workflow.yaml` for routing
      - `intent-mapping.yaml` for 3VL detection

      **Best for:** Plugins with 4+ skills that benefit from intelligent routing.
