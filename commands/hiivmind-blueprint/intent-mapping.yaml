# Intent mapping for hiivmind-blueprint gateway
# Generated by hiivmind-blueprint (self-dogfooding)

intent_flags:
  # Action type flags
  has_init:
    keywords:
      - "init"
      - "initialize"
      - "setup"
      - "prepare"
      - "copy libs"
      - "add workflow support"
    description: "User wants to initialize blueprint project"

  has_discover:
    keywords:
      - "discover"
      - "find"
      - "list"
      - "show"
      - "status"
      - "what skills"
      - "scan"
    negative_keywords:
      - "find file"
      - "show help"
    description: "User wants to discover skills"

  has_analyze:
    keywords:
      - "analyze"
      - "examine"
      - "inspect"
      - "understand"
      - "breakdown"
      - "look at"
    description: "User wants to analyze a skill"

  has_convert:
    keywords:
      - "convert"
      - "transform"
      - "translate"
      - "make workflow"
      - "to workflow"
      - "to yaml"
    description: "User wants to convert skill to workflow"

  has_generate:
    keywords:
      - "generate"
      - "write"
      - "output"
      - "save"
      - "create files"
      - "write files"
    negative_keywords:
      - "generate gateway"
    description: "User wants to generate workflow files"

  has_gateway:
    keywords:
      - "gateway"
      - "create command"
      - "intent detection"
      - "routing"
      - "unified entry"
      - "generate gateway"
    description: "User wants to create gateway command"

  has_upgrade:
    keywords:
      - "upgrade"
      - "migrate"
      - "update schema"
      - "fix deprecated"
      - "modernize"
    description: "User wants to upgrade workflows"

  has_visualize:
    keywords:
      - "visualize"
      - "diagram"
      - "mermaid"
      - "show flow"
      - "graph"
      - "flowchart"
      - "render"
      - "draw"
      - "see workflow"
    description: "User wants to visualize a workflow"

  has_validate:
    keywords:
      - "validate"
      - "check"
      - "lint"
      - "verify"
      - "find issues"
      - "find problems"
      - "check workflow"
      - "validate workflow"
      - "schema check"
      - "dead ends"
      - "orphan nodes"
    negative_keywords:
      - "check status"
      - "check if"
    description: "User wants to validate a workflow"

  has_help:
    keywords:
      - "help"
      - "how do i"
      - "how to"
      - "?"
      - "explain"
      - "guide"
    description: "User needs guidance"

intent_rules:
  # Pure skill intents (highest priority)
  - name: "init_only"
    conditions:
      has_init: T
      has_analyze: F
      has_convert: F
    action: delegate_init
    priority: 90
    description: "Initialize blueprint project"

  - name: "discover_only"
    conditions:
      has_discover: T
      has_analyze: F
      has_convert: F
    action: delegate_discover
    priority: 90
    description: "Discover skills to convert"

  - name: "analyze_only"
    conditions:
      has_analyze: T
      has_convert: F
    action: delegate_analyze
    priority: 90
    description: "Analyze a skill"

  - name: "convert_only"
    conditions:
      has_convert: T
      has_generate: F
    action: delegate_convert
    priority: 85
    description: "Convert skill to workflow"

  - name: "generate_only"
    conditions:
      has_generate: T
      has_gateway: F
    action: delegate_generate
    priority: 85
    description: "Generate workflow files"

  - name: "gateway_only"
    conditions:
      has_gateway: T
    action: delegate_gateway
    priority: 90
    description: "Create gateway command"

  - name: "upgrade_only"
    conditions:
      has_upgrade: T
    action: delegate_upgrade
    priority: 90
    description: "Upgrade workflows"

  - name: "visualize_only"
    conditions:
      has_visualize: T
    action: delegate_visualize
    priority: 90
    description: "Visualize workflow as diagram"

  - name: "validate_only"
    conditions:
      has_validate: T
    action: delegate_validate
    priority: 90
    description: "Validate workflow for issues"

  # Compound intents
  - name: "analyze_and_convert"
    conditions:
      has_analyze: T
      has_convert: T
    action: delegate_analyze
    priority: 80
    description: "Analyze then convert (start with analyze)"

  - name: "convert_and_generate"
    conditions:
      has_convert: T
      has_generate: T
    action: delegate_convert
    priority: 80
    description: "Convert then generate (start with convert)"

  # Help intents
  - name: "help_with_init"
    conditions:
      has_help: T
      has_init: T
    action: delegate_init
    priority: 75
    description: "Help with initialization"

  - name: "help_with_convert"
    conditions:
      has_help: T
      has_convert: T
    action: delegate_analyze
    priority: 75
    description: "Help with conversion (start with analyze)"

  - name: "general_help"
    conditions:
      has_help: T
    action: show_help
    priority: 20
    description: "General help request"

  # Default fallback
  - name: "show_menu"
    conditions: {}
    action: show_main_menu
    priority: 10
    description: "No clear intent, show interactive menu"

# Action definitions
actions:
  delegate_init:
    type: invoke_skill
    skill: "hiivmind-blueprint-init"
    pass_arguments: true

  delegate_discover:
    type: invoke_skill
    skill: "hiivmind-blueprint-discover"
    pass_arguments: true

  delegate_analyze:
    type: invoke_skill
    skill: "hiivmind-blueprint-analyze"
    pass_arguments: true

  delegate_convert:
    type: invoke_skill
    skill: "hiivmind-blueprint-convert"
    pass_arguments: true

  delegate_generate:
    type: invoke_skill
    skill: "hiivmind-blueprint-generate"
    pass_arguments: true

  delegate_gateway:
    type: invoke_skill
    skill: "hiivmind-blueprint-gateway"
    pass_arguments: true

  delegate_upgrade:
    type: invoke_skill
    skill: "hiivmind-blueprint-upgrade"
    pass_arguments: true

  delegate_visualize:
    type: invoke_skill
    skill: "hiivmind-blueprint-visualize"
    pass_arguments: true

  delegate_validate:
    type: invoke_skill
    skill: "hiivmind-blueprint-validate"
    pass_arguments: true

  show_main_menu:
    type: user_prompt
    prompt:
      question: "What would you like to do with hiivmind-blueprint?"
      header: "Menu"
      options:
        - id: init
          label: "Initialize"
          description: "Set up a plugin for workflow conversion"
        - id: discover
          label: "Discover"
          description: "Find skills and show conversion status"
        - id: analyze
          label: "Analyze"
          description: "Deep analysis of a skill"
        - id: convert
          label: "Convert"
          description: "Transform skill to workflow.yaml"
        - id: validate
          label: "Validate"
          description: "Check workflow.yaml for issues"
        - id: visualize
          label: "Visualize"
          description: "Generate Mermaid diagram of workflow"

  show_help:
    type: display
    content: |
      ## hiivmind-blueprint Help

      ### Workflow Conversion Pipeline

      1. **Initialize** - Copy workflow libraries to your plugin
      2. **Discover** - Find skills that need conversion
      3. **Analyze** - Understand skill structure
      4. **Convert** - Generate workflow.yaml
      5. **Generate** - Write files to disk

      ### Other Operations

      - **Gateway** - Create unified entry command for multi-skill plugins
      - **Upgrade** - Migrate workflows to latest schema

      ### Quick Start

      ```
      /hiivmind-blueprint init        # Set up project
      /hiivmind-blueprint discover    # Find skills
      /hiivmind-blueprint analyze X   # Analyze specific skill
      /hiivmind-blueprint convert     # Convert to workflow
      /hiivmind-blueprint generate    # Write files
      ```
