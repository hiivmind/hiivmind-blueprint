# Embedded Type Definitions Bundle
#
# This file provides fallback type definitions for offline/airgapped scenarios.
# It aggregates all consequence and precondition types from hiivmind-blueprint-types.
#
# For the authoritative source, see: https://github.com/hiivmind/hiivmind-blueprint-types
#
# Usage in workflow.yaml:
#   definitions:
#     source: hiivmind/hiivmind-blueprint-types@v1.0.0
#     fallback: embedded  # Falls back to this file if fetch fails
#
# Or for always-local:
#   definitions:
#     source: local
#     path: ${CLAUDE_PLUGIN_ROOT}/lib/types/bundle.yaml

schema_version: "1.1"
bundled_at: "2026-01-27T00:00:00Z"
source_repo: "https://github.com/hiivmind/hiivmind-blueprint-types"
version: "1.0.0"

# =============================================================================
# CONSEQUENCES (43 types)
# =============================================================================

consequences:
  # ---------------------------------------------------------------------------
  # Core: State Mutations (5)
  # ---------------------------------------------------------------------------
  set_flag:
    category: core/state
    description:
      brief: Set a boolean flag
      detail: Sets a boolean flag in the state.flags namespace for workflow routing.
    parameters:
      - name: flag
        type: string
        required: true
        description: Flag name
        pattern: "^[a-zA-Z_][a-zA-Z0-9_]*$"
      - name: value
        type: boolean
        required: true
        description: Boolean value
    payload:
      kind: state_mutation
      effect: "state.flags[flag] = value"
    since: "1.0.0"

  set_state:
    category: core/state
    description:
      brief: Set any state field
      detail: Sets a state field to a value with ${} interpolation support.
    parameters:
      - name: field
        type: string
        required: true
        description: Field path (dot notation)
      - name: value
        type: any
        required: true
        description: Value to set
        interpolatable: true
    payload:
      kind: state_mutation
      effect: "set_nested(state, field, interpolate(value))"
    since: "1.0.0"

  append_state:
    category: core/state
    description:
      brief: Append to array field
      detail: Appends a value to an array field, creating it if needed.
    parameters:
      - name: field
        type: string
        required: true
        description: Array field path
      - name: value
        type: any
        required: true
        description: Value to append
        interpolatable: true
    payload:
      kind: state_mutation
      effect: "get_or_create_array(field).push(interpolate(value))"
    since: "1.0.0"

  clear_state:
    category: core/state
    description:
      brief: Reset field to null
      detail: Resets a state field to null for retry or iteration reset.
    parameters:
      - name: field
        type: string
        required: true
        description: Field to clear
    payload:
      kind: state_mutation
      effect: "set_nested(state, field, null)"
    since: "1.0.0"

  merge_state:
    category: core/state
    description:
      brief: Merge object into field
      detail: Shallow merges an object into an existing state field.
    parameters:
      - name: field
        type: string
        required: true
        description: Object field to merge into
      - name: value
        type: object
        required: true
        description: Object to merge
        interpolatable: true
    payload:
      kind: state_mutation
      effect: "Object.assign(get_or_create(field, {}), interpolate(value))"
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Core: Evaluation (2)
  # ---------------------------------------------------------------------------
  evaluate:
    category: core/evaluation
    description:
      brief: Evaluate expression to flag
      detail: Evaluates a boolean expression and stores result as a flag.
    parameters:
      - name: expression
        type: string
        required: true
        description: Boolean expression
        interpolatable: true
      - name: set_flag
        type: string
        required: true
        description: Flag to set with result
    payload:
      kind: computation
      effect: "state.flags[set_flag] = evaluate_expression(expression, state)"
    since: "1.0.0"

  compute:
    category: core/evaluation
    description:
      brief: Compute and store value
      detail: Evaluates an expression and stores the result in computed.
    parameters:
      - name: expression
        type: string
        required: true
        description: Expression to evaluate
        interpolatable: true
      - name: store_as
        type: string
        required: true
        description: Field in computed to store result
    payload:
      kind: computation
      effect: "set_nested(state.computed, store_as, evaluate_expression(expression, state))"
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Core: Interaction (2)
  # ---------------------------------------------------------------------------
  display_message:
    category: core/interaction
    description:
      brief: Display message to user
      detail: Displays a message with ${} interpolation.
    parameters:
      - name: message
        type: string
        required: true
        description: Message to display
        interpolatable: true
    payload:
      kind: side_effect
      effect: "DISPLAY interpolate(message)"
    since: "1.0.0"

  display_table:
    category: core/interaction
    description:
      brief: Display data as table
      detail: Renders data as a formatted markdown table.
    parameters:
      - name: data
        type: array
        required: true
        description: Array of objects to display
        interpolatable: true
      - name: columns
        type: array
        required: true
        description: Column definitions
    payload:
      kind: side_effect
      effect: "DISPLAY render_table(interpolate(data), columns)"
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Core: Control Flow (3)
  # ---------------------------------------------------------------------------
  create_checkpoint:
    category: core/control
    description:
      brief: Snapshot state for rollback
      detail: Creates a named checkpoint of the current state for error recovery.
    parameters:
      - name: name
        type: string
        required: true
        description: Checkpoint name
    payload:
      kind: state_mutation
      effect: "state.checkpoints[name] = deep_copy(state)"
    since: "1.0.0"

  rollback_checkpoint:
    category: core/control
    description:
      brief: Restore to checkpoint
      detail: Restores state to a previously created checkpoint.
    parameters:
      - name: name
        type: string
        required: true
        description: Checkpoint name
    payload:
      kind: state_mutation
      effect: "restore_state_from(state.checkpoints[name])"
    since: "1.0.0"

  spawn_agent:
    category: core/control
    description:
      brief: Spawn background agent
      detail: Spawns an agent task for parallel execution.
    parameters:
      - name: agent_type
        type: string
        required: true
        description: Agent type to spawn
      - name: prompt
        type: string
        required: true
        description: Task prompt
        interpolatable: true
      - name: store_as
        type: string
        required: false
        description: Field to store result
    payload:
      kind: tool_call
      tool: Task
      effect: "Task(agent_type=agent_type, prompt=interpolate(prompt))"
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Core: Skill Invocation (2)
  # ---------------------------------------------------------------------------
  invoke_pattern:
    category: core/skill
    description:
      brief: Execute pattern with shared state
      detail: Loads and executes a reference document with shared state.
    parameters:
      - name: path
        type: string
        required: true
        description: Path to pattern document
      - name: section
        type: string
        required: false
        description: Section to execute
      - name: context
        type: object
        required: false
        description: Context variables
        interpolatable: true
    payload:
      kind: composite
      effect: "execute_document(read_file(path), section, interpolate(context), state)"
    since: "1.0.0"

  invoke_skill:
    category: core/skill
    description:
      brief: Execute skill with isolated state
      detail: Invokes another skill with state isolation.
    parameters:
      - name: skill
        type: string
        required: true
        description: Skill path or name
      - name: input
        type: object
        required: false
        description: Input parameters
        interpolatable: true
      - name: output_mapping
        type: array
        required: false
        description: Output field mappings
    payload:
      kind: composite
      effect: "execute_isolated_skill(skill, interpolate(input), output_mapping)"
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Core: Utility (2)
  # ---------------------------------------------------------------------------
  set_timestamp:
    category: core/utility
    description:
      brief: Set current timestamp
      detail: Stores the current ISO timestamp in a state field.
    parameters:
      - name: field
        type: string
        required: true
        description: Field to store timestamp
    payload:
      kind: state_mutation
      effect: "set_nested(state, field, now().toISOString())"
    since: "1.0.0"

  compute_hash:
    category: core/utility
    description:
      brief: Compute content hash
      detail: Computes SHA256 hash of a value.
    parameters:
      - name: value
        type: string
        required: true
        description: Value to hash
        interpolatable: true
      - name: store_as
        type: string
        required: true
        description: Field to store hash
    payload:
      kind: computation
      effect: "set_nested(state.computed, store_as, sha256(interpolate(value)))"
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Core: Intent Detection (4)
  # ---------------------------------------------------------------------------
  evaluate_keywords:
    category: core/intent
    description:
      brief: Check for keywords in text
      detail: Evaluates if text contains any of the specified keywords.
    parameters:
      - name: text
        type: string
        required: true
        description: Text to search
        interpolatable: true
      - name: keywords
        type: array
        required: true
        description: Keywords to find
      - name: set_flag
        type: string
        required: true
        description: Flag to set with result
    payload:
      kind: computation
      effect: "state.flags[set_flag] = any(kw in interpolate(text).lower() for kw in keywords)"
    since: "1.0.0"

  parse_intent_flags:
    category: core/intent
    description:
      brief: Extract intent flags from text
      detail: Parses text for structured intent indicators.
    parameters:
      - name: text
        type: string
        required: true
        description: Text to parse
        interpolatable: true
      - name: patterns
        type: object
        required: true
        description: Pattern to flag mappings
      - name: store_as
        type: string
        required: true
        description: Field to store results
    payload:
      kind: computation
      effect: "set_nested(state.computed, store_as, parse_patterns(text, patterns))"
    since: "1.0.0"

  match_3vl_rules:
    category: core/intent
    description:
      brief: Evaluate 3VL intent rules
      detail: Matches text against three-valued logic intent rules.
    parameters:
      - name: text
        type: string
        required: true
        description: User text to match
        interpolatable: true
      - name: rules
        type: array
        required: true
        description: 3VL rule definitions
      - name: store_as
        type: string
        required: true
        description: Field for matched rule
    payload:
      kind: computation
      effect: "set_nested(state.computed, store_as, match_3vl(text, rules))"
    since: "1.0.0"

  dynamic_route:
    category: core/intent
    description:
      brief: Route based on intent
      detail: Selects next node based on matched intent.
    parameters:
      - name: intent_field
        type: string
        required: true
        description: Field containing matched intent
      - name: route_map
        type: object
        required: true
        description: Intent to node mappings
      - name: default_node
        type: string
        required: true
        description: Default if no match
    payload:
      kind: state_mutation
      effect: "state.dynamic_next_node = route_map[get_nested(state, intent_field)] ?? default_node"
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Core: Logging (10)
  # ---------------------------------------------------------------------------
  init_log:
    category: core/logging
    description:
      brief: Initialize workflow log
      detail: Creates a new log session for the workflow execution.
    parameters:
      - name: workflow_name
        type: string
        required: true
        description: Name of workflow
      - name: log_level
        type: string
        required: false
        default: "info"
        description: Minimum log level
    payload:
      kind: state_mutation
      effect: "state.log = { workflow: workflow_name, level: log_level, entries: [], started_at: now() }"
    since: "1.0.0"

  log_node:
    category: core/logging
    description:
      brief: Log node execution
      detail: Records a node execution in the log.
    parameters:
      - name: node_id
        type: string
        required: true
        description: Node being executed
      - name: outcome
        type: object
        required: true
        description: Node outcome
        interpolatable: true
    payload:
      kind: state_mutation
      effect: "state.log.entries.push({ type: 'node', node: node_id, outcome: outcome, timestamp: now() })"
    since: "1.0.0"

  log_event:
    category: core/logging
    description:
      brief: Log custom event
      detail: Records a custom event in the log.
    parameters:
      - name: event
        type: string
        required: true
        description: Event name
      - name: data
        type: object
        required: false
        description: Event data
        interpolatable: true
    payload:
      kind: state_mutation
      effect: "state.log.entries.push({ type: 'event', event: event, data: data, timestamp: now() })"
    since: "1.0.0"

  log_warning:
    category: core/logging
    description:
      brief: Log warning message
      detail: Records a warning in the log.
    parameters:
      - name: message
        type: string
        required: true
        description: Warning message
        interpolatable: true
    payload:
      kind: state_mutation
      effect: "state.log.entries.push({ type: 'warning', message: interpolate(message), timestamp: now() })"
    since: "1.0.0"

  log_error:
    category: core/logging
    description:
      brief: Log error message
      detail: Records an error in the log.
    parameters:
      - name: message
        type: string
        required: true
        description: Error message
        interpolatable: true
      - name: error
        type: object
        required: false
        description: Error details
    payload:
      kind: state_mutation
      effect: "state.log.entries.push({ type: 'error', message: interpolate(message), error: error, timestamp: now() })"
    since: "1.0.0"

  log_session_snapshot:
    category: core/logging
    description:
      brief: Snapshot current state
      detail: Records a state snapshot in the log for debugging.
    parameters:
      - name: label
        type: string
        required: true
        description: Snapshot label
    payload:
      kind: state_mutation
      effect: "state.log.entries.push({ type: 'snapshot', label: label, state: copy(state), timestamp: now() })"
    since: "1.0.0"

  finalize_log:
    category: core/logging
    description:
      brief: Complete log session
      detail: Marks the log session as complete with final status.
    parameters:
      - name: status
        type: string
        required: true
        description: Final status (success, error, cancelled)
      - name: summary
        type: object
        required: false
        description: Summary data
        interpolatable: true
    payload:
      kind: state_mutation
      effect: "Object.assign(state.log, { status: status, summary: summary, ended_at: now() })"
    since: "1.0.0"

  write_log:
    category: core/logging
    description:
      brief: Persist log to file
      detail: Writes the log to a file.
    parameters:
      - name: path
        type: string
        required: true
        description: Output file path
        interpolatable: true
    payload:
      kind: tool_call
      tool: Write
      effect: "Write(file_path=interpolate(path), content=yaml_dump(state.log))"
    since: "1.0.0"

  apply_log_retention:
    category: core/logging
    description:
      brief: Clean old logs
      detail: Removes log files older than retention period.
    parameters:
      - name: log_dir
        type: string
        required: true
        description: Log directory
      - name: retention_days
        type: number
        required: true
        description: Days to retain
    payload:
      kind: tool_call
      tool: Bash
      effect: "find ${log_dir} -name '*.log' -mtime +${retention_days} -delete"
    since: "1.0.0"

  output_ci_summary:
    category: core/logging
    description:
      brief: Output CI summary
      detail: Writes summary to GitHub Actions job summary.
    parameters:
      - name: title
        type: string
        required: true
        description: Summary title
      - name: content
        type: string
        required: true
        description: Summary content (markdown)
        interpolatable: true
    payload:
      kind: tool_call
      tool: Bash
      effect: "echo '## ${title}\n${content}' >> $GITHUB_STEP_SUMMARY"
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Extensions: File System (4)
  # ---------------------------------------------------------------------------
  read_file:
    category: extensions/file-system
    description:
      brief: Read file contents
      detail: Reads file and optionally parses YAML/JSON.
    parameters:
      - name: path
        type: string
        required: true
        description: File path
        interpolatable: true
      - name: store_as
        type: string
        required: true
        description: Field to store content
      - name: parse
        type: string
        required: false
        description: Parse format (yaml, json, or null for raw)
    payload:
      kind: tool_call
      tool: Read
      requires:
        tools: []
      effect: |
        content = Read(file_path=interpolate(path))
        if parse == "yaml": content = parse_yaml(content)
        if parse == "json": content = parse_json(content)
        set_nested(state.computed, store_as, content)
    since: "1.0.0"

  write_file:
    category: extensions/file-system
    description:
      brief: Write file contents
      detail: Writes content to a file, with optional YAML/JSON serialization.
    parameters:
      - name: path
        type: string
        required: true
        description: File path
        interpolatable: true
      - name: content
        type: any
        required: true
        description: Content to write
        interpolatable: true
      - name: format
        type: string
        required: false
        description: Serialize format (yaml, json, or null for raw)
    payload:
      kind: tool_call
      tool: Write
      effect: |
        data = interpolate(content)
        if format == "yaml": data = yaml_dump(data)
        if format == "json": data = json_dump(data)
        Write(file_path=interpolate(path), content=data)
    since: "1.0.0"

  create_directory:
    category: extensions/file-system
    description:
      brief: Create directory
      detail: Creates a directory and any parent directories.
    parameters:
      - name: path
        type: string
        required: true
        description: Directory path
        interpolatable: true
    payload:
      kind: tool_call
      tool: Bash
      effect: "mkdir -p ${interpolate(path)}"
    since: "1.0.0"

  delete_file:
    category: extensions/file-system
    description:
      brief: Delete file or directory
      detail: Removes a file or directory.
    parameters:
      - name: path
        type: string
        required: true
        description: Path to delete
        interpolatable: true
      - name: recursive
        type: boolean
        required: false
        default: false
        description: Delete directories recursively
    payload:
      kind: tool_call
      tool: Bash
      effect: "rm ${recursive ? '-rf' : ''} ${interpolate(path)}"
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Extensions: Git (4)
  # ---------------------------------------------------------------------------
  clone_repo:
    category: extensions/git
    description:
      brief: Clone git repository
      detail: Clones a repository with optional shallow clone and branch selection.
    parameters:
      - name: url
        type: string
        required: true
        description: Repository URL
        interpolatable: true
      - name: dest
        type: string
        required: true
        description: Destination path
        interpolatable: true
      - name: branch
        type: string
        required: false
        description: Branch to clone
        interpolatable: true
      - name: depth
        type: number
        required: false
        default: 1
        description: Shallow clone depth
    payload:
      kind: tool_call
      tool: Bash
      requires:
        tools:
          - name: git
            min_version: "2.0"
        network: true
        timeout_seconds: 300
      effect: |
        cmd = "git clone"
        if depth: cmd += " --depth " + depth
        if branch: cmd += " --branch " + interpolate(branch)
        cmd += " " + interpolate(url) + " " + interpolate(dest)
        Bash(cmd)
    since: "1.0.0"

  get_sha:
    category: extensions/git
    description:
      brief: Get HEAD commit SHA
      detail: Retrieves the HEAD commit SHA from a git repository.
    parameters:
      - name: repo_path
        type: string
        required: true
        description: Path to repository
        interpolatable: true
      - name: store_as
        type: string
        required: true
        description: Field to store SHA
    payload:
      kind: tool_call
      tool: Bash
      requires:
        tools:
          - name: git
      effect: |
        sha = Bash("git -C " + interpolate(repo_path) + " rev-parse HEAD").trim()
        set_nested(state.computed, store_as, sha)
    since: "1.0.0"

  git_pull:
    category: extensions/git
    description:
      brief: Pull latest changes
      detail: Pulls the latest changes using fast-forward only.
    parameters:
      - name: repo_path
        type: string
        required: true
        description: Path to repository
        interpolatable: true
    payload:
      kind: tool_call
      tool: Bash
      requires:
        tools:
          - name: git
        network: true
        timeout_seconds: 120
      effect: "Bash('git -C ' + interpolate(repo_path) + ' pull --ff-only')"
    since: "1.0.0"

  git_fetch:
    category: extensions/git
    description:
      brief: Fetch remote refs
      detail: Fetches remote refs without modifying the working directory.
    parameters:
      - name: repo_path
        type: string
        required: true
        description: Path to repository
        interpolatable: true
    payload:
      kind: tool_call
      tool: Bash
      requires:
        tools:
          - name: git
        network: true
        timeout_seconds: 60
      effect: "Bash('git -C ' + interpolate(repo_path) + ' fetch')"
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Extensions: Web (2)
  # ---------------------------------------------------------------------------
  web_fetch:
    category: extensions/web
    description:
      brief: Fetch URL content
      detail: Fetches content from a URL using WebFetch tool.
    parameters:
      - name: url
        type: string
        required: true
        description: URL to fetch
        interpolatable: true
      - name: store_as
        type: string
        required: true
        description: Field to store result
      - name: prompt
        type: string
        required: false
        default: "Extract the main content"
        description: Processing prompt
      - name: allow_failure
        type: boolean
        required: false
        default: false
        description: Continue on failure
    payload:
      kind: tool_call
      tool: WebFetch
      requires:
        network: true
        timeout_seconds: 60
      effect: |
        result = WebFetch(url=interpolate(url), prompt=prompt)
        set_nested(state.computed, store_as, { status: result.status, content: result.content, url: url })
        if not allow_failure and result.status >= 400:
          throw "Fetch failed: " + result.status
    since: "1.0.0"

  cache_web_content:
    category: extensions/web
    description:
      brief: Cache fetched content
      detail: Stores web content to local cache file.
    parameters:
      - name: url
        type: string
        required: true
        description: Source URL
        interpolatable: true
      - name: content
        type: string
        required: true
        description: Content to cache
        interpolatable: true
      - name: cache_dir
        type: string
        required: true
        description: Cache directory
        interpolatable: true
    payload:
      kind: composite
      effect: |
        filename = sha256(url) + ".html"
        path = interpolate(cache_dir) + "/" + filename
        Write(file_path=path, content=interpolate(content))
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Extensions: Scripting (3)
  # ---------------------------------------------------------------------------
  run_script:
    category: extensions/scripting
    description:
      brief: Run script with auto-detection
      detail: Runs a script file, auto-detecting interpreter from shebang or extension.
    parameters:
      - name: path
        type: string
        required: true
        description: Script path
        interpolatable: true
      - name: args
        type: array
        required: false
        description: Script arguments
        interpolatable: true
      - name: store_as
        type: string
        required: false
        description: Field to store output
    payload:
      kind: tool_call
      tool: Bash
      requires:
        timeout_seconds: 300
      effect: |
        cmd = interpolate(path) + " " + (args ?? []).join(" ")
        result = Bash(cmd)
        if store_as: set_nested(state.computed, store_as, result)
    since: "1.0.0"

  run_python:
    category: extensions/scripting
    description:
      brief: Run Python code
      detail: Executes Python code or script.
    parameters:
      - name: code
        type: string
        required: false
        description: Python code to run
        interpolatable: true
      - name: script
        type: string
        required: false
        description: Python script path
        interpolatable: true
      - name: args
        type: array
        required: false
        description: Script arguments
      - name: store_as
        type: string
        required: false
        description: Field to store output
    payload:
      kind: tool_call
      tool: Bash
      requires:
        tools:
          - name: python3
        timeout_seconds: 300
      effect: |
        if code:
          cmd = "python3 -c '" + interpolate(code).replace("'", "'\\''") + "'"
        else:
          cmd = "python3 " + interpolate(script) + " " + (args ?? []).join(" ")
        result = Bash(cmd)
        if store_as: set_nested(state.computed, store_as, result)
    since: "1.0.0"

  run_bash:
    category: extensions/scripting
    description:
      brief: Run bash command
      detail: Executes a bash command or script.
    parameters:
      - name: command
        type: string
        required: true
        description: Command to run
        interpolatable: true
      - name: store_as
        type: string
        required: false
        description: Field to store output
      - name: allow_failure
        type: boolean
        required: false
        default: false
        description: Continue on non-zero exit
    payload:
      kind: tool_call
      tool: Bash
      requires:
        timeout_seconds: 120
      effect: |
        result = Bash(interpolate(command))
        if store_as: set_nested(state.computed, store_as, result)
    since: "1.0.0"

# =============================================================================
# PRECONDITIONS (27 types)
# =============================================================================

preconditions:
  # ---------------------------------------------------------------------------
  # Core: Filesystem (5)
  # ---------------------------------------------------------------------------
  config_exists:
    category: core/filesystem
    description:
      brief: Check config.yaml exists
      detail: Checks if data/config.yaml exists in the current directory.
    parameters: []
    evaluation:
      effect: "return file_exists('data/config.yaml')"
    since: "1.0.0"

  index_exists:
    category: core/filesystem
    description:
      brief: Check index.md exists
      detail: Checks if data/index.md exists.
    parameters: []
    evaluation:
      effect: "return file_exists('data/index.md')"
    since: "1.0.0"

  index_is_placeholder:
    category: core/filesystem
    description:
      brief: Check if index is placeholder
      detail: Checks if index.md contains placeholder content.
    parameters: []
    evaluation:
      effect: "return read_file('data/index.md').includes('<!-- PLACEHOLDER -->')"
    since: "1.0.0"

  file_exists:
    category: core/filesystem
    description:
      brief: Check file exists
      detail: Checks if a file exists at the given path.
    parameters:
      - name: path
        type: string
        required: true
        description: File path to check
        interpolatable: true
    evaluation:
      effect: "return file_exists(interpolate(path))"
    since: "1.0.0"

  directory_exists:
    category: core/filesystem
    description:
      brief: Check directory exists
      detail: Checks if a directory exists at the given path.
    parameters:
      - name: path
        type: string
        required: true
        description: Directory path to check
        interpolatable: true
    evaluation:
      effect: "return directory_exists(interpolate(path))"
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Core: State (8)
  # ---------------------------------------------------------------------------
  flag_set:
    category: core/state
    description:
      brief: Check flag is true
      detail: Evaluates to true if the flag is true.
    parameters:
      - name: flag
        type: string
        required: true
        description: Flag name
    evaluation:
      effect: "return state.flags[flag] == true"
    since: "1.0.0"

  flag_not_set:
    category: core/state
    description:
      brief: Check flag is false
      detail: Evaluates to true if the flag is false or undefined.
    parameters:
      - name: flag
        type: string
        required: true
        description: Flag name
    evaluation:
      effect: "return state.flags[flag] != true"
    since: "1.0.0"

  state_equals:
    category: core/state
    description:
      brief: Check field equals value
      detail: Checks if a state field equals a specific value.
    parameters:
      - name: field
        type: string
        required: true
        description: Field path
      - name: value
        type: any
        required: true
        description: Expected value
    evaluation:
      effect: "return get_nested(state, field) == value"
    since: "1.0.0"

  state_not_null:
    category: core/state
    description:
      brief: Check field has value
      detail: Checks if a state field is not null.
    parameters:
      - name: field
        type: string
        required: true
        description: Field path
    evaluation:
      effect: "return get_nested(state, field) != null"
    since: "1.0.0"

  state_is_null:
    category: core/state
    description:
      brief: Check field is null
      detail: Checks if a state field is null or undefined.
    parameters:
      - name: field
        type: string
        required: true
        description: Field path
    evaluation:
      effect: "return get_nested(state, field) == null"
    since: "1.0.0"

  count_equals:
    category: core/state
    description:
      brief: Check array length equals
      detail: Checks if an array has exactly the specified length.
    parameters:
      - name: field
        type: string
        required: true
        description: Array field path
      - name: count
        type: number
        required: true
        description: Expected length
    evaluation:
      effect: "return len(get_nested(state, field) ?? []) == count"
    since: "1.0.0"

  count_above:
    category: core/state
    description:
      brief: Check array length above
      detail: Checks if an array has more than the specified number of elements.
    parameters:
      - name: field
        type: string
        required: true
        description: Array field path
      - name: min
        type: number
        required: true
        description: Minimum length (exclusive)
    evaluation:
      effect: "return len(get_nested(state, field) ?? []) > min"
    since: "1.0.0"

  count_below:
    category: core/state
    description:
      brief: Check array length below
      detail: Checks if an array has fewer than the specified number of elements.
    parameters:
      - name: field
        type: string
        required: true
        description: Array field path
      - name: max
        type: number
        required: true
        description: Maximum length (exclusive)
    evaluation:
      effect: "return len(get_nested(state, field) ?? []) < max"
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Core: Tool Availability (2)
  # ---------------------------------------------------------------------------
  tool_available:
    category: core/tool
    description:
      brief: Check tool available
      detail: Checks if a command-line tool is available.
    parameters:
      - name: tool
        type: string
        required: true
        description: Tool name
      - name: min_version
        type: string
        required: false
        description: Minimum version
    evaluation:
      effect: "return command_exists(tool)"
    since: "1.0.0"

  python_module_available:
    category: core/tool
    description:
      brief: Check Python module
      detail: Checks if a Python module is importable.
    parameters:
      - name: module
        type: string
        required: true
        description: Module name
    evaluation:
      effect: "return Bash('python3 -c \"import ' + module + '\" 2>/dev/null').exit_code == 0"
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Core: Composite (3)
  # ---------------------------------------------------------------------------
  all_of:
    category: core/composite
    description:
      brief: All conditions true
      detail: Evaluates to true if ALL nested conditions are true.
    parameters:
      - name: conditions
        type: array
        required: true
        description: Conditions to evaluate
    evaluation:
      effect: |
        for cond in conditions:
          if not evaluate_precondition(cond): return false
        return true
    since: "1.0.0"

  any_of:
    category: core/composite
    description:
      brief: Any condition true
      detail: Evaluates to true if ANY nested condition is true.
    parameters:
      - name: conditions
        type: array
        required: true
        description: Conditions to evaluate
    evaluation:
      effect: |
        for cond in conditions:
          if evaluate_precondition(cond): return true
        return false
    since: "1.0.0"

  none_of:
    category: core/composite
    description:
      brief: No conditions true
      detail: Evaluates to true if NONE of the nested conditions are true.
    parameters:
      - name: conditions
        type: array
        required: true
        description: Conditions to evaluate
    evaluation:
      effect: |
        for cond in conditions:
          if evaluate_precondition(cond): return false
        return true
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Core: Expression (1)
  # ---------------------------------------------------------------------------
  evaluate_expression:
    category: core/expression
    description:
      brief: Evaluate expression
      detail: Evaluates an arbitrary boolean expression.
    parameters:
      - name: expression
        type: string
        required: true
        description: Boolean expression
        interpolatable: true
    evaluation:
      effect: "return evaluate_expression(interpolate(expression), state)"
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Core: Logging (3)
  # ---------------------------------------------------------------------------
  log_initialized:
    category: core/logging
    description:
      brief: Check log initialized
      detail: Checks if the log session has been initialized.
    parameters: []
    evaluation:
      effect: "return state.log != null"
    since: "1.0.0"

  log_level_enabled:
    category: core/logging
    description:
      brief: Check log level enabled
      detail: Checks if a log level is enabled based on current setting.
    parameters:
      - name: level
        type: string
        required: true
        description: Log level to check
    evaluation:
      effect: |
        levels = ['debug', 'info', 'warning', 'error']
        current_idx = levels.index(state.log.level ?? 'info')
        check_idx = levels.index(level)
        return check_idx >= current_idx
    since: "1.0.0"

  log_finalized:
    category: core/logging
    description:
      brief: Check log finalized
      detail: Checks if the log session has been finalized.
    parameters: []
    evaluation:
      effect: "return state.log?.status != null"
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Extensions: Source (3)
  # ---------------------------------------------------------------------------
  source_exists:
    category: extensions/source
    description:
      brief: Check source in config
      detail: Checks if a source ID exists in the config.
    parameters:
      - name: source_id
        type: string
        required: true
        description: Source ID to find
        interpolatable: true
    evaluation:
      effect: "return state.computed.config?.sources?.some(s => s.id == interpolate(source_id))"
    since: "1.0.0"

  source_cloned:
    category: extensions/source
    description:
      brief: Check source cloned
      detail: Checks if a source has been cloned to .source directory.
    parameters:
      - name: source_id
        type: string
        required: true
        description: Source ID
        interpolatable: true
    evaluation:
      effect: "return directory_exists('.source/' + interpolate(source_id))"
    since: "1.0.0"

  source_has_updates:
    category: extensions/source
    description:
      brief: Check for upstream updates
      detail: Checks if a source has updates available.
    parameters:
      - name: source_id
        type: string
        required: true
        description: Source ID
        interpolatable: true
    evaluation:
      effect: |
        # After git fetch, compare local HEAD to remote
        local_sha = state.computed.local_sha
        remote_sha = state.computed.remote_sha
        return local_sha != remote_sha
    since: "1.0.0"

  # ---------------------------------------------------------------------------
  # Extensions: Web (2)
  # ---------------------------------------------------------------------------
  fetch_succeeded:
    category: extensions/web
    description:
      brief: Check fetch succeeded
      detail: Checks if a web fetch operation succeeded.
    parameters:
      - name: result_field
        type: string
        required: true
        description: Field containing fetch result
    evaluation:
      effect: "return get_nested(state.computed, result_field)?.status < 400"
    since: "1.0.0"

  fetch_returned_content:
    category: extensions/web
    description:
      brief: Check fetch has content
      detail: Checks if a web fetch returned non-empty content.
    parameters:
      - name: result_field
        type: string
        required: true
        description: Field containing fetch result
    evaluation:
      effect: "return get_nested(state.computed, result_field)?.content?.length > 0"
    since: "1.0.0"

