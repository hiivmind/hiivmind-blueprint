# analyze-workflow-state.yaml
# Layer 0: Atomic Subflow
#
# Phase 2 of the upgrade workflow: Analyze a single workflow to determine
# its current schema version and identify issues requiring migration.
#
# This subflow reads the workflow.yaml, detects version from explicit field
# or inferred patterns, scans for deprecated patterns, and checks for
# legacy execution references in the SKILL.md file.

name: analyze-workflow-state
version: 1.0.0
description: Analyze workflow for version and migration issues

# Interface declaration for subflow composition
input_schema:
  workflow_path:
    type: string
    required: true
    description: "Path to the workflow.yaml file"
  skill_md_path:
    type: string
    required: true
    description: "Path to the SKILL.md file (or gateway .md)"
  target_type:
    type: string
    enum: ["skill", "gateway"]
    required: true
    description: "Type of workflow being analyzed"
  config:
    type: object
    required: true
    description: "Target-specific configuration from discover-and-target"

output_schema:
  detected_version:
    type: string
    description: "Detected schema version (e.g., '1.0.0', '2.0.0')"
  explicit_version:
    type: string
    description: "Explicit version field if present, null otherwise"
  issues:
    type: array
    description: "Array of issue objects found in workflow"
  deprecated_patterns:
    type: array
    description: "List of deprecated patterns found"
  has_legacy_refs:
    type: boolean
    description: "Whether SKILL.md has local engine.md references"
  needs_execution_migration:
    type: boolean
    description: "Whether execution refs need migration"
  skill_md_line_count:
    type: integer
    description: "Number of lines in SKILL.md file"
  skill_md_needs_normalization:
    type: boolean
    description: "Whether SKILL.md exceeds template size limits"

definitions:
  source: "hiivmind/hiivmind-blueprint-lib"
  version: "v2.1.0"

start_node: read_workflow

initial_state:
  workflow_content: null
  workflow_yaml: null
  detected_version: "1.0.0"
  explicit_version: null
  issues: []
  deprecated_patterns: []
  has_legacy_refs: false
  needs_execution_migration: false
  skill_md_content: null
  skill_md_line_count: 0
  skill_md_needs_normalization: false

nodes:
  read_workflow:
    type: action
    description: "Read and parse workflow.yaml"
    actions:
      - type: local_file_ops
        operation: read
        path: "${input.workflow_path}"
        store_in: workflow_content
    on_success: parse_workflow_yaml
    on_failure: error_read_workflow

  parse_workflow_yaml:
    type: action
    description: "Parse workflow YAML content"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          echo '${workflow_content}' | yq -o=json '.'
        store_in: workflow_json
    on_success: detect_explicit_version
    on_failure: error_parse_workflow

  detect_explicit_version:
    type: action
    description: "Check for explicit version field in workflow"
    actions:
      - type: run_command
        interpreter: bash
        command: echo '${workflow_json}' | jq -r '.version // "null"'
        store_in: explicit_version_str
    on_success: store_explicit_version
    on_failure: detect_version_from_patterns

  store_explicit_version:
    type: conditional
    description: "Store explicit version if found"
    condition:
      type: evaluate_expression
      expression: "explicit_version_str != 'null'"
    branches:
      on_true: set_explicit_version
      on_false: detect_version_from_patterns

  set_explicit_version:
    type: action
    description: "Set detected version from explicit field"
    actions:
      - type: mutate_state
        operation: set
        field: explicit_version
        value: "${explicit_version_str}"
      - type: mutate_state
        operation: set
        field: detected_version
        value: "${explicit_version_str}"
    on_success: scan_deprecated_patterns
    on_failure: scan_deprecated_patterns

  detect_version_from_patterns:
    type: action
    description: "Infer version from workflow patterns"
    effect: |
      Analyze workflow_json to infer schema version from patterns:

      # Check for 2.0+ patterns (field/value set_state format)
      has_new_set_state = workflow_json CONTAINS nodes with {type: "set_state", field: not null}

      # Check for old 1.x set_state format (state object)
      has_old_set_state = workflow_json CONTAINS nodes with {type: "set_state", state: not null}

      # Check for reference nodes (1.2.0+)
      has_reference = workflow_json.nodes CONTAINS any with {type: "reference"}

      # Check for validation_gate nodes (1.1.0+)
      has_validation_gate = workflow_json.nodes CONTAINS any with {type: "validation_gate"}

      # Determine version based on detected patterns
      IF has_new_set_state:
        SET state.inferred_version = "2.0.0"
      ELSE IF has_old_set_state:
        SET state.inferred_version = "1.0.0"
      ELSE IF has_reference:
        SET state.inferred_version = "1.2.0"
      ELSE IF has_validation_gate:
        SET state.inferred_version = "1.1.0"
      ELSE:
        SET state.inferred_version = "1.0.0"
    on_success: set_inferred_version
    on_failure: scan_deprecated_patterns

  set_inferred_version:
    type: action
    description: "Set detected version from inference"
    actions:
      - type: mutate_state
        operation: set
        field: detected_version
        value: "${inferred_version}"
    on_success: scan_deprecated_patterns
    on_failure: scan_deprecated_patterns

  scan_deprecated_patterns:
    type: action
    description: "Scan workflow for deprecated patterns"
    effect: |
      Scan workflow_json for deprecated patterns and missing fields:

      issues = []
      deprecated = []

      # Check for missing version field
      IF workflow_json NOT HAS "version":
        APPEND to issues: {
          type: "missing_field",
          location: "workflow",
          field: "version",
          severity: "info",
          auto_fixable: true
        }

      # Check for old set_state format
      old_set_state_count = COUNT nodes in workflow_json with {type: "set_state", state: not null}
      IF old_set_state_count > 0:
        APPEND to issues: {
          type: "deprecated_pattern",
          pattern: "old_set_state_format",
          location: "nodes.*.actions",
          count: old_set_state_count,
          severity: "warning",
          auto_fixable: true
        }
        APPEND to deprecated: "old_set_state_format"

      # Check for nodes missing descriptions
      nodes_without_desc = COUNT nodes in workflow_json.nodes WHERE description IS null OR empty
      IF nodes_without_desc > 0:
        APPEND to issues: {
          type: "missing_field",
          location: "nodes",
          field: "description",
          count: nodes_without_desc,
          severity: "info",
          auto_fixable: true
        }

      # Check for error endings without recovery
      error_endings_without_recovery = COUNT endings in workflow_json.endings
        WHERE type == "error" AND recovery IS null
      IF error_endings_without_recovery > 0:
        APPEND to issues: {
          type: "missing_field",
          location: "endings",
          field: "recovery",
          count: error_endings_without_recovery,
          severity: "info",
          auto_fixable: true
        }

      # Check for missing on_failure handlers
      nodes_without_on_failure = COUNT nodes in workflow_json.nodes
        WHERE type == "action" AND on_failure IS null
      IF nodes_without_on_failure > 0:
        APPEND to issues: {
          type: "missing_field",
          location: "nodes",
          field: "on_failure",
          count: nodes_without_on_failure,
          severity: "info",
          auto_fixable: false
        }

      SET state.issues_json = issues AS JSON
      SET state.deprecated_json = deprecated AS JSON
    on_success: store_issues
    on_failure: read_skill_md_file

  store_issues:
    type: action
    description: "Store issues and deprecated patterns in state"
    actions:
      - type: mutate_state
        operation: set
        field: issues
        value: "${issues_json | fromjson}"
      - type: mutate_state
        operation: set
        field: deprecated_patterns
        value: "${deprecated_json | fromjson}"
    on_success: read_skill_md_file
    on_failure: read_skill_md_file

  read_skill_md_file:
    type: action
    description: "Read SKILL.md file content"
    actions:
      - type: local_file_ops
        operation: read
        path: "${input.skill_md_path}"
        store_in: skill_md_content
    on_success: analyze_skill_md
    on_failure: error_read_skill_md

  analyze_skill_md:
    type: action
    description: "Analyze SKILL.md for legacy refs and line count"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          # Count lines
          echo '${skill_md_content}' | wc -l
        store_in: line_count_str
      - type: run_command
        interpreter: bash
        command: echo '${skill_md_content}' | grep -qE '\.hiivmind/blueprint/engine\.md|lib/workflow/engine\.md|\$\{CLAUDE_PLUGIN_ROOT\}/\.hiivmind/blueprint/engine\.md' && echo "true" || echo "false"
        store_in: has_legacy_str
    on_success: store_skill_md_analysis
    on_failure: store_skill_md_analysis

  store_skill_md_analysis:
    type: action
    description: "Store SKILL.md analysis results"
    actions:
      - type: mutate_state
        operation: set
        field: skill_md_line_count
        value: "${line_count_str | trim | tonumber}"
      - type: mutate_state
        operation: set
        field: has_legacy_refs
        value: "${has_legacy_str == 'true'}"
      - type: mutate_state
        operation: set
        field: needs_execution_migration
        value: "${has_legacy_str == 'true'}"
    on_success: check_normalization_needed
    on_failure: check_normalization_needed

  check_normalization_needed:
    type: action
    description: "Check if SKILL.md needs normalization based on line count and patterns"
    effect: |
      Check if skill_md_content needs normalization:

      line_count = state.skill_md_line_count
      threshold = input.config.line_threshold

      # Check if over threshold
      is_over_threshold = (line_count > threshold)

      # Check for non-compliant patterns that indicate oversized SKILL.md
      has_non_compliant_patterns = skill_md_content MATCHES ANY OF:
        - "### Phase [0-9]:" (pseudocode phase headers)
        - "LOOP:" (pseudocode loop markers)
        - "FOR each" (pseudocode iteration)
        - "CONTINUE" (pseudocode control flow)
        - "## Variable Interpolation" (framework docs)
        - "# Algorithm:" (algorithm documentation)
        - "## Execution Loop" (execution documentation)
        - "### Phase.*: Execution" (execution phase headers)
        - "## Context Types" (context type documentation)

      # Needs normalization only if BOTH over threshold AND has non-compliant patterns
      IF is_over_threshold AND has_non_compliant_patterns:
        SET state.needs_normalization_str = "true"
      ELSE:
        SET state.needs_normalization_str = "false"
    on_success: store_normalization_flag
    on_failure: success

  store_normalization_flag:
    type: action
    description: "Store whether SKILL.md needs normalization"
    actions:
      - type: mutate_state
        operation: set
        field: skill_md_needs_normalization
        value: "${needs_normalization_str == 'true'}"
    on_success: success
    on_failure: success

endings:
  success:
    type: success
    message: "Analysis complete for ${input.workflow_path}"
    summary:
      detected_version: "${detected_version}"
      explicit_version: "${explicit_version}"
      issues: "${issues}"
      deprecated_patterns: "${deprecated_patterns}"
      has_legacy_refs: "${has_legacy_refs}"
      needs_execution_migration: "${needs_execution_migration}"
      skill_md_line_count: "${skill_md_line_count}"
      skill_md_needs_normalization: "${skill_md_needs_normalization}"

  error_read_workflow:
    type: error
    code: "READ_WORKFLOW_FAILED"
    message: "Failed to read workflow file: ${input.workflow_path}"
    recovery:
      suggestion: "Check that the file exists and has read permissions"

  error_parse_workflow:
    type: error
    code: "PARSE_WORKFLOW_FAILED"
    message: "Failed to parse workflow YAML: ${input.workflow_path}"
    recovery:
      suggestion: "Check that the workflow.yaml has valid YAML syntax"

  error_read_skill_md:
    type: error
    code: "READ_SKILL_MD_FAILED"
    message: "Failed to read SKILL.md file: ${input.skill_md_path}"
    recovery:
      suggestion: "Check that the SKILL.md file exists and has read permissions"
