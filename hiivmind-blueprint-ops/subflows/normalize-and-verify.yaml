# normalize-and-verify.yaml
# Layer 0: Atomic Subflow
#
# Phases 6, 7 of the upgrade workflow: Normalize oversized SKILL.md files
# to match template standards, and verify the final results.
#
# This subflow extracts preserved sections from oversized SKILL.md files,
# applies the appropriate template, and runs verification checks
# on the upgraded workflow and SKILL.md files.

name: normalize-and-verify
version: 1.0.0
description: Normalize SKILL.md files and verify upgrade results

# Interface declaration for subflow composition
input_schema:
  skill_md_path:
    type: string
    required: true
    description: "Path to the SKILL.md file"
  workflow_path:
    type: string
    required: true
    description: "Path to the workflow.yaml file"
  intent_mapping_path:
    type: string
    required: false
    description: "Path to intent-mapping.yaml (gateway only)"
  target_type:
    type: string
    enum: ["skill", "gateway"]
    required: true
    description: "Type of workflow"
  config:
    type: object
    required: true
    description: "Target-specific configuration"
  lib_version:
    type: string
    required: true
    description: "Library version for templates"
  skip_normalize:
    type: boolean
    required: false
    default: false
    description: "Skip normalization step"
  applied_migrations:
    type: array
    required: true
    description: "Migrations that were applied"

output_schema:
  skill_md_normalized:
    type: boolean
    description: "Whether SKILL.md was normalized"
  normalization_result:
    type: object
    description: "Details of normalization (before/after lines, sections)"
  verification:
    type: object
    description: "Verification results"
  report:
    type: string
    description: "Final completion report"
  backup_path:
    type: string
    description: "Path to backup file if created"

definitions:
  source: "hiivmind/hiivmind-blueprint-lib"
  version: "v2.1.0"

composes:
  - ref: ../../hiivmind-blueprint-author/subflows/template-render.yaml
    as: renderer
  - ref: ../../hiivmind-blueprint-author/subflows/validate-yaml-structure.yaml
    as: validator

start_node: check_skip_normalize

initial_state:
  skill_md_normalized: false
  normalization_result:
    before_lines: 0
    after_lines: 0
    preserved_sections: []
    removed_sections: []
  verification:
    yaml_valid: false
    nodes_reachable: false
    transitions_valid: false
    execution_refs_present: false
  report: ""
  backup_path: null
  skill_md_content: ""
  preserved: {}

nodes:
  check_skip_normalize:
    type: conditional
    description: "Check if normalization should be skipped"
    condition:
      type: state_check
      field: input.skip_normalize
      operator: equals
      value: true
    branches:
      on_true: verify_yaml_syntax
      on_false: read_skill_md_content

  read_skill_md_content:
    type: action
    description: "Read current SKILL.md file content"
    actions:
      - type: local_file_ops
        operation: read
        path: "${input.skill_md_path}"
        store_in: skill_md_content
    on_success: count_skill_md_lines
    on_failure: verify_yaml_syntax

  count_skill_md_lines:
    type: action
    description: "Count lines in SKILL.md file"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          echo '${skill_md_content}' | wc -l | tr -d ' '
        store_in: line_count_str
      - type: mutate_state
        operation: set
        field: normalization_result.before_lines
        value: "${line_count_str | trim | tonumber}"
    on_success: check_normalization_needed
    on_failure: check_normalization_needed

  check_normalization_needed:
    type: conditional
    description: "Check if SKILL.md exceeds template threshold"
    condition:
      type: evaluate_expression
      expression: "normalization_result.before_lines > input.config.line_threshold"
    branches:
      on_true: extract_preserved_sections
      on_false: verify_yaml_syntax

  extract_preserved_sections:
    type: action
    description: "Extract sections to preserve from SKILL.md"
    effect: |
      Extract sections to preserve from skill_md_content:

      # Extract YAML frontmatter (content between first two "---" lines)
      frontmatter = EXTRACT content between first "---" and second "---"

      # Extract first H1 title (line starting with "# ")
      title = EXTRACT first line matching /^# / WITHOUT the "# " prefix

      # Extract workflow graph section
      workflow_graph = EXTRACT section from "## Workflow Graph" OR "## Graph" TO next "## "

      # Extract example usage section
      example_usage = EXTRACT section from "## Quick Examples" OR "## Example Usage" OR "## Examples" TO next "## "

      # Extract related skills section
      related_skills = EXTRACT section from "## Related Skills" TO next "## "

      SET state.preserved_common_json = {
        frontmatter: frontmatter,
        title: title,
        workflow_graph: workflow_graph,
        example_usage: example_usage,
        related_skills: related_skills
      } AS JSON
    on_success: extract_gateway_sections
    on_failure: extract_gateway_sections

  extract_gateway_sections:
    type: conditional
    description: "Check if gateway-specific sections need extraction"
    condition:
      type: state_check
      field: input.target_type
      operator: equals
      value: "gateway"
    branches:
      on_true: extract_gateway_specific_sections
      on_false: store_preserved_sections

  extract_gateway_specific_sections:
    type: action
    description: "Extract gateway-specific preserved sections"
    effect: |
      Extract gateway-specific sections from skill_md_content:

      skill_tables = ""

      # Extract each skill table section if present
      FOR EACH section_name IN ["Available Skills", "Build Skills", "Read Skills", "Shared Skills", "Available Operations"]:
        table = EXTRACT section from "## ${section_name}" TO next "## "
        IF table IS NOT EMPTY:
          APPEND table TO skill_tables
          APPEND newline TO skill_tables

      # Extract help commands section
      help_commands = EXTRACT section from "## Help Commands" TO next "## "

      # Merge with common preserved sections
      SET state.preserved_json = preserved_common_json MERGED WITH {
        skill_tables: skill_tables,
        help_commands: help_commands
      } AS JSON
    on_success: store_preserved_sections
    on_failure: store_preserved_sections

  store_preserved_sections:
    type: action
    description: "Store preserved sections in state"
    actions:
      - type: mutate_state
        operation: set
        field: preserved
        value: "${preserved_json | fromjson}"
    on_success: read_workflow_metadata
    on_failure: read_workflow_metadata

  read_workflow_metadata:
    type: action
    description: "Read workflow name and metadata"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          workflow_path='${input.workflow_path}'
          name=$(yq '.name' "$workflow_path" 2>/dev/null || basename "$(dirname "$workflow_path")")
          echo "$name"
        store_in: workflow_name
    on_success: present_normalization_plan
    on_failure: present_normalization_plan

  present_normalization_plan:
    type: action
    description: "Show normalization plan to user"
    effect: |
      Calculate and display normalization plan:

      before_lines = state.normalization_result.before_lines
      target_lines = input.config.target_lines
      template = input.config.template

      reduction = before_lines - target_lines
      reduction_pct = (reduction * 100) / before_lines

      plan = "## SKILL.md Normalization Plan: ${input.skill_md_path}

      **Target type:** ${input.target_type}
      **Current:** ${before_lines} lines
      **Target:** ~${target_lines} lines (${template})
      **Reduction:** ~${reduction_pct}%

      ### Sections to PRESERVE

      - Frontmatter (name, description, allowed-tools)
      - Title
      - Workflow Graph
      - Example Usage
      - Related Skills"

      IF input.target_type == "gateway":
        APPEND to plan:
          "- Skill Tables
          - Help Commands"

      APPEND to plan:
        "### Sections to REMOVE (duplicates blueprint-lib)

        - Execution pseudocode (### Phase N:, LOOP:, FOR each)
        - Variable Interpolation documentation
        - Context Types documentation
        - Execution Loop implementation

        ### Template to Apply

        `${template}` with lib_version: ${input.lib_version}"

      SET state.normalization_plan = plan

      EMIT TEXT: plan
    on_success: prompt_normalize_confirmation
    on_failure: prompt_normalize_confirmation

  prompt_normalize_confirmation:
    type: user_prompt
    description: "Ask user to confirm normalization"
    prompt:
      question: "Normalize this SKILL.md to match template?"
      header: "Normalize"
      options:
        - id: apply
          label: "Apply"
          description: "Normalize to template (~${input.config.target_lines} lines)"
        - id: preview
          label: "Preview"
          description: "Show what the normalized SKILL.md will look like"
        - id: skip
          label: "Skip"
          description: "Keep current SKILL.md"
    on_response:
      apply:
        next_node: create_normalize_backup
      preview:
        next_node: generate_preview
      skip:
        consequence:
          - type: mutate_state
            operation: set
            field: skill_md_normalized
            value: false
        next_node: verify_yaml_syntax

  generate_preview:
    type: action
    description: "Generate preview of normalized SKILL.md"
    effect: |
      Generate preview of normalized SKILL.md from preserved sections:

      # Get preserved values
      frontmatter = state.preserved.frontmatter
      title = state.preserved.title OR state.workflow_name
      workflow_graph = state.preserved.workflow_graph
      example_usage = state.preserved.example_usage
      related_skills = state.preserved.related_skills

      # Parse frontmatter for description and allowed-tools
      description = EXTRACT "description:" value FROM frontmatter
      allowed_tools = EXTRACT "allowed-tools:" value FROM frontmatter

      IF input.target_type == "skill":
        preview = RENDER skill template with:
          - frontmatter: name, description, allowed-tools
          - title (H1)
          - workflow_graph section
          - execution reference table (using input.lib_version)
          - example_usage section
          - related_skills section

      ELSE (gateway):
        skill_tables = state.preserved.skill_tables
        help_commands = state.preserved.help_commands

        preview = RENDER gateway template with:
          - frontmatter: name, description, allowed-tools
          - title (H1)
          - skill_tables section
          - workflow_graph section
          - execution reference table (using input.lib_version)
          - help_commands section
          - related_skills section

      SET state.preview_content = preview

      EMIT TEXT:
        "## Preview of Normalized SKILL.md

        ```markdown
        ${preview}
        ```"
    on_success: prompt_after_preview
    on_failure: prompt_normalize_confirmation

  prompt_after_preview:
    type: user_prompt
    description: "Ask user after preview"
    prompt:
      question: "Apply this normalization?"
      header: "Confirm"
      options:
        - id: apply
          label: "Apply"
          description: "Write normalized SKILL.md"
        - id: skip
          label: "Skip"
          description: "Keep current SKILL.md"
    on_response:
      apply:
        next_node: create_normalize_backup
      skip:
        consequence:
          - type: mutate_state
            operation: set
            field: skill_md_normalized
            value: false
        next_node: verify_yaml_syntax

  create_normalize_backup:
    type: action
    description: "Create backup before normalization"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          skill_md_path='${input.skill_md_path}'
          backup_path="${skill_md_path}.normalize-backup.$(date +%Y%m%d_%H%M%S)"
          cp "$skill_md_path" "$backup_path"
          echo "$backup_path"
        store_in: normalize_backup_path
      - type: mutate_state
        operation: set
        field: backup_path
        value: "${normalize_backup_path}"
    on_success: render_normalized_template
    on_failure: verify_yaml_syntax

  render_normalized_template:
    type: action
    description: "Render normalized SKILL.md from template"
    effect: |
      Render normalized SKILL.md from template and preserved sections:

      # Get preserved values
      frontmatter = state.preserved.frontmatter
      title = state.preserved.title OR state.workflow_name
      workflow_graph = state.preserved.workflow_graph OR ""
      example_usage = state.preserved.example_usage OR ""
      related_skills = state.preserved.related_skills OR ""

      # Parse description from frontmatter
      description = EXTRACT "description:" multiline value FROM frontmatter
      IF description IS EMPTY:
        description = "[Description needed]"

      # Parse allowed-tools from frontmatter
      allowed_tools = EXTRACT "allowed-tools:" value FROM frontmatter
      IF allowed_tools IS EMPTY:
        allowed_tools = "Read, Write, Edit, Glob, Grep, Bash"

      # Build normalized content using template structure:
      normalized_content = "---
      name: ${state.workflow_name}
      description: >
        ${description}
      allowed-tools: ${allowed_tools}
      ---

      # ${title}

      ${workflow_graph}

      ---

      ## Execution Reference

      Execution semantics from [hiivmind-blueprint-lib](https://github.com/hiivmind/hiivmind-blueprint-lib) (version: ${input.lib_version}):

      | Semantic | Source |
      |----------|--------|
      | Core loop | [traversal.yaml](.../${input.lib_version}/execution/traversal.yaml) |
      | State | [state.yaml](.../${input.lib_version}/execution/state.yaml) |
      | Consequences | [consequence-dispatch.yaml](.../${input.lib_version}/execution/consequence-dispatch.yaml) |
      | Preconditions | [precondition-dispatch.yaml](.../${input.lib_version}/execution/precondition-dispatch.yaml) |

      ---

      ${example_usage}

      ---

      ${related_skills}"

      SET state.normalized_content = normalized_content
    on_success: write_normalized_skill_md
    on_failure: verify_yaml_syntax

  write_normalized_skill_md:
    type: action
    description: "Write normalized SKILL.md to file"
    actions:
      - type: local_file_ops
        operation: write
        path: "${input.skill_md_path}"
        content: "${normalized_content}"
      - type: mutate_state
        operation: set
        field: skill_md_normalized
        value: true
    on_success: count_after_lines
    on_failure: error_write_normalized

  count_after_lines:
    type: action
    description: "Count lines after normalization"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          echo '${normalized_content}' | wc -l | tr -d ' '
        store_in: after_lines_str
      - type: mutate_state
        operation: set
        field: normalization_result.after_lines
        value: "${after_lines_str | trim | tonumber}"
    on_success: verify_yaml_syntax
    on_failure: verify_yaml_syntax

  verify_yaml_syntax:
    type: action
    description: "Verify workflow.yaml has valid YAML syntax"
    actions:
      - type: run_command
        interpreter: bash
        command: |
          workflow_path='${input.workflow_path}'
          if yq '.' "$workflow_path" > /dev/null 2>&1; then
            echo "true"
          else
            echo "false"
          fi
        store_in: yaml_valid_str
      - type: mutate_state
        operation: set
        field: verification.yaml_valid
        value: "${yaml_valid_str == 'true'}"
    on_success: verify_node_reachability
    on_failure: verify_node_reachability

  verify_node_reachability:
    type: action
    description: "Verify all nodes are reachable from start"
    effect: |
      Verify node reachability from start_node:

      # Read workflow structure
      start_node = READ "start_node" FROM input.workflow_path
      all_nodes = GET keys FROM workflow.nodes

      # Check if start_node is defined
      IF start_node IS null OR start_node IS EMPTY:
        SET state.verification.nodes_reachable = false
        RETURN

      # Check if start_node exists in nodes
      IF start_node NOT IN all_nodes:
        SET state.verification.nodes_reachable = false
        RETURN

      # Collect all referenced nodes from transitions
      referenced = COLLECT ALL values FROM:
        - on_success fields
        - on_failure fields
        - branches.* fields
        - next_node fields

      # Note: Full reachability analysis would traverse the graph
      # For now, basic check passes if start_node is valid
      SET state.verification.nodes_reachable = true
    on_success: verify_transition_validity
    on_failure: verify_transition_validity

  verify_transition_validity:
    type: action
    description: "Verify all transitions point to valid nodes or endings"
    effect: |
      Verify all transitions point to valid targets:

      # Get all valid targets (nodes + endings)
      all_nodes = GET keys FROM workflow.nodes
      all_endings = GET keys FROM workflow.endings
      valid_targets = UNION(all_nodes, all_endings)

      # Collect all transition targets
      transitions = COLLECT ALL values FROM:
        - on_success fields
        - on_failure fields
        - branches.* fields
        - next_node fields

      # Check each transition
      valid = true
      FOR EACH target IN transitions:
        IF target IS NOT EMPTY AND target != "null":
          IF target NOT IN valid_targets:
            valid = false
            BREAK

      SET state.verification.transitions_valid = valid
    on_success: verify_execution_refs
    on_failure: verify_execution_refs

  verify_execution_refs:
    type: action
    description: "Verify execution references are present"
    actions:
      - type: run_command
        interpreter: bash
        command: grep -q "## Execution Reference" '${input.skill_md_path}' 2>/dev/null && echo "true" || echo "false"
        store_in: exec_refs_str
      - type: mutate_state
        operation: set
        field: verification.execution_refs_present
        value: "${exec_refs_str == 'true'}"
    on_success: build_report
    on_failure: build_report

  build_report:
    type: action
    description: "Build final completion report"
    effect: |
      Build final completion report:

      migration_count = input.applied_migrations.length
      before_lines = state.normalization_result.before_lines
      after_lines = state.normalization_result.after_lines

      report = "## Upgrade Complete

      **Target type:** ${input.target_type}
      **Workflow:** ${input.workflow_path}

      ### Migrations Applied (${migration_count})
      "

      # List each migration with status
      FOR EACH migration IN input.applied_migrations:
        IF migration.success == true:
          APPEND to report: "- ${migration.name}: Applied"
        ELSE:
          APPEND to report: "- ${migration.name}: Failed"

      APPEND to report: "### SKILL.md Normalization"

      IF state.skill_md_normalized == true:
        reduction = before_lines - after_lines
        APPEND to report:
          "| SKILL.md | Before | After | Reduction |
          |----------|--------|-------|-----------|
          | `${input.skill_md_path}` | ${before_lines} | ${after_lines} | ${reduction} lines |"
      ELSE:
        APPEND to report: "- No normalization needed (SKILL.md within template limits)"

      APPEND to report:
        "### Verification
        - YAML syntax: ${state.verification.yaml_valid ? 'Valid' : 'Invalid'}
        - Node reachability: ${state.verification.nodes_reachable ? 'All nodes reachable' : 'Issues found'}
        - Transition validity: ${state.verification.transitions_valid ? 'All transitions valid' : 'Issues found'}
        - Execution refs: ${state.verification.execution_refs_present ? 'Present' : 'Missing'}

        ### Files Modified
        - `${input.workflow_path}`
        - `${input.skill_md_path}`"

      IF input.intent_mapping_path IS NOT EMPTY:
        APPEND to report: "- `${input.intent_mapping_path}`"

      APPEND to report:
        "### Next Steps
        1. Test the ${input.target_type} to verify behavior unchanged
        2. Review the backup if issues arise
        3. Commit changes to version control"

      SET state.report = report
    on_success: success
    on_failure: success

endings:
  success:
    type: success
    message: "Verification complete"
    summary:
      skill_md_normalized: "${skill_md_normalized}"
      normalization_result: "${normalization_result}"
      verification: "${verification}"
      report: "${report}"
      backup_path: "${backup_path}"

  error_write_normalized:
    type: error
    code: "WRITE_NORMALIZED_FAILED"
    message: "Failed to write normalized SKILL.md"
    recovery:
      suggestion: "Check file permissions. Backup available at ${backup_path}"
