# discover-and-target.yaml
# Layer 0: Atomic Subflow
#
# Phase 1 of the upgrade workflow: Discover workflows in the plugin
# and determine which target type (skills/gateway/both) to upgrade.
#
# This subflow scans for skill and gateway workflows, handles target
# selection based on explicit arguments or user prompts, and sets
# target-specific configuration like thresholds and templates.

name: discover-and-target
version: 1.0.0
description: Discover workflows and determine upgrade target

# Interface declaration for subflow composition
input_schema:
  explicit_target:
    type: string
    enum: ["skills", "gateway", "auto", null]
    required: false
    default: null
    description: "Explicit target from command arguments"
  search_root:
    type: string
    required: false
    default: "."
    description: "Root directory to search for workflows"
  mode_flags:
    type: object
    required: false
    default: {}
    description: "Mode flags (check_only, schema_only, refs_only, normalize_only, skip_normalize, intent_only)"

output_schema:
  target_type:
    type: string
    enum: ["skills", "gateway", "both"]
    description: "Determined target type"
  skill_workflows:
    type: array
    description: "Array of skill workflow info objects"
  gateway_workflows:
    type: array
    description: "Array of gateway workflow info objects"
  selected_workflows:
    type: array
    description: "Array of workflows selected for upgrade (based on user selection)"
  config:
    type: object
    description: "Target-specific config (line_threshold, template, preserved_sections)"
  has_legacy_engine:
    type: boolean
    description: "Whether plugin has obsolete .hiivmind/blueprint/engine.md"
  needs_execution_migration:
    type: boolean
    description: "Whether SKILL.md files need migration to remote execution refs"

definitions:
  source: "hiivmind/hiivmind-blueprint-lib"
  version: "v2.1.0"

start_node: check_legacy_engine

initial_state:
  has_legacy_engine: false
  needs_execution_migration: false
  skill_workflows: []
  gateway_workflows: []
  has_skills: false
  has_gateways: false
  target_type: null
  selected_workflows: []
  config:
    line_threshold: null
    template: null
    target_lines: null
    preserved_sections: []
    required_sections: []
    extra_verifications: []

nodes:
  check_legacy_engine:
    type: conditional
    description: "Check if plugin has obsolete local engine.md"
    condition:
      type: path_check
      path: "${input.search_root}/.hiivmind/blueprint/engine.md"
      check: exists
    branches:
      on_true: record_legacy_engine
      on_false: scan_skill_workflows

  record_legacy_engine:
    type: action
    description: "Record that plugin has legacy engine.md requiring migration"
    actions:
      - type: mutate_state
        operation: set
        field: has_legacy_engine
        value: true
      - type: mutate_state
        operation: set
        field: needs_execution_migration
        value: true
    on_success: scan_skill_workflows
    on_failure: scan_skill_workflows

  scan_skill_workflows:
    type: action
    description: "Scan for skill workflows in skills/ directory"
    effect: |
      Find all skill workflows in ${input.search_root}/skills:

      skill_workflows = []

      FOR EACH workflow_path MATCHING "${input.search_root}/skills/**/workflow.yaml":
        directory = DIRNAME(workflow_path)
        skill_md_path = directory + "/SKILL.md"

        IF skill_md_path EXISTS:
          skill_name = BASENAME(directory)

          APPEND to skill_workflows: {
            path: workflow_path,
            skill_md_path: skill_md_path,
            directory: directory,
            name: skill_name,
            type: "skill"
          }

      SET state.skill_workflows_json = skill_workflows AS JSON
    on_success: store_skill_workflows
    on_failure: scan_gateway_workflows

  store_skill_workflows:
    type: action
    description: "Store skill workflows in state"
    actions:
      - type: mutate_state
        operation: set
        field: skill_workflows
        value: "${skill_workflows_json | fromjson}"
      - type: mutate_state
        operation: set
        field: has_skills
        value: "${skill_workflows_json | fromjson | length > 0}"
    on_success: scan_gateway_workflows
    on_failure: scan_gateway_workflows

  scan_gateway_workflows:
    type: action
    description: "Scan for gateway workflows in commands/ directory"
    effect: |
      Find all gateway workflows in ${input.search_root}/commands:

      gateway_workflows = []

      FOR EACH workflow_path MATCHING "${input.search_root}/commands/**/workflow.yaml":
        directory = DIRNAME(workflow_path)
        intent_mapping_path = directory + "/intent-mapping.yaml"

        IF intent_mapping_path EXISTS:
          gateway_name = BASENAME(directory)
          gateway_md_path = directory + "/" + gateway_name + ".md"

          APPEND to gateway_workflows: {
            path: workflow_path,
            skill_md_path: gateway_md_path,
            intent_mapping_path: intent_mapping_path,
            directory: directory,
            name: gateway_name,
            type: "gateway"
          }

      SET state.gateway_workflows_json = gateway_workflows AS JSON
    on_success: store_gateway_workflows
    on_failure: determine_target

  store_gateway_workflows:
    type: action
    description: "Store gateway workflows in state"
    actions:
      - type: mutate_state
        operation: set
        field: gateway_workflows
        value: "${gateway_workflows_json | fromjson}"
      - type: mutate_state
        operation: set
        field: has_gateways
        value: "${gateway_workflows_json | fromjson | length > 0}"
    on_success: determine_target
    on_failure: determine_target

  determine_target:
    type: conditional
    description: "Route based on explicit target or detected workflows"
    condition:
      type: state_check
      field: input.explicit_target
      operator: not_null
    branches:
      on_true: validate_explicit_target
      on_false: auto_detect_target

  validate_explicit_target:
    type: conditional
    description: "Validate that requested target type has workflows"
    condition:
      type: evaluate_expression
      expression: |
        (input.explicit_target == 'skills' && has_skills) ||
        (input.explicit_target == 'gateway' && has_gateways) ||
        (input.explicit_target == 'auto')
    branches:
      on_true: set_explicit_target
      on_false: error_no_workflows_for_target

  set_explicit_target:
    type: conditional
    description: "Set target type from explicit argument"
    condition:
      type: state_check
      field: input.explicit_target
      operator: equals
      value: "auto"
    branches:
      on_true: auto_detect_target
      on_false: apply_explicit_target

  apply_explicit_target:
    type: action
    description: "Apply explicitly requested target type"
    actions:
      - type: mutate_state
        operation: set
        field: target_type
        value: "${input.explicit_target}"
    on_success: set_target_config
    on_failure: error_init

  auto_detect_target:
    type: conditional
    description: "Auto-detect target based on available workflows"
    condition:
      type: evaluate_expression
      expression: "has_skills && has_gateways"
    branches:
      on_true: prompt_target_selection
      on_false: check_skills_only

  check_skills_only:
    type: conditional
    description: "Check if only skills are available"
    condition:
      type: state_check
      field: has_skills
      operator: equals
      value: true
    branches:
      on_true: set_skills_target
      on_false: check_gateways_only

  check_gateways_only:
    type: conditional
    description: "Check if only gateways are available"
    condition:
      type: state_check
      field: has_gateways
      operator: equals
      value: true
    branches:
      on_true: set_gateway_target
      on_false: error_no_workflows

  set_skills_target:
    type: action
    description: "Set target to skills (only type available)"
    actions:
      - type: mutate_state
        operation: set
        field: target_type
        value: "skills"
    on_success: set_target_config
    on_failure: error_init

  set_gateway_target:
    type: action
    description: "Set target to gateway (only type available)"
    actions:
      - type: mutate_state
        operation: set
        field: target_type
        value: "gateway"
    on_success: set_target_config
    on_failure: error_init

  prompt_target_selection:
    type: user_prompt
    description: "Ask user which workflow type to upgrade"
    prompt:
      question: "Found both skill and gateway workflows. Which would you like to upgrade?"
      header: "Target"
      options:
        - id: skills
          label: "Skills"
          description: "Upgrade ${skill_workflows | length} skill workflows in skills/"
        - id: gateway
          label: "Gateways"
          description: "Upgrade ${gateway_workflows | length} gateway workflows in commands/"
        - id: both
          label: "Both"
          description: "Upgrade all workflows (skills first, then gateways)"
        - id: cancel
          label: "Cancel"
          description: "Exit without changes"
    on_response:
      skills:
        consequence:
          - type: mutate_state
            operation: set
            field: target_type
            value: "skills"
        next_node: set_target_config
      gateway:
        consequence:
          - type: mutate_state
            operation: set
            field: target_type
            value: "gateway"
        next_node: set_target_config
      both:
        consequence:
          - type: mutate_state
            operation: set
            field: target_type
            value: "both"
        next_node: set_target_config
      cancel:
        next_node: cancelled

  set_target_config:
    type: conditional
    description: "Route to config setting based on target type"
    condition:
      type: state_check
      field: target_type
      operator: equals
      value: "skills"
    branches:
      on_true: set_skills_config
      on_false: check_gateway_config

  check_gateway_config:
    type: conditional
    description: "Check if gateway config should be set"
    condition:
      type: state_check
      field: target_type
      operator: equals
      value: "gateway"
    branches:
      on_true: set_gateway_config
      on_false: set_both_config

  set_skills_config:
    type: action
    description: "Set skill-specific configuration"
    actions:
      - type: mutate_state
        operation: set
        field: config.line_threshold
        value: 120
      - type: mutate_state
        operation: set
        field: config.template
        value: "SKILL.md.template"
      - type: mutate_state
        operation: set
        field: config.target_lines
        value: 60
      - type: mutate_state
        operation: set
        field: config.preserved_sections
        value: ["frontmatter", "title", "workflow_graph", "example_usage", "related_skills"]
      - type: mutate_state
        operation: set
        field: config.required_sections
        value: ["## Execution Reference"]
      - type: mutate_state
        operation: set
        field: config.extra_verifications
        value: []
      - type: mutate_state
        operation: set
        field: selected_workflows
        value: "${skill_workflows}"
    on_success: check_multiple_workflows
    on_failure: error_init

  set_gateway_config:
    type: action
    description: "Set gateway-specific configuration"
    actions:
      - type: mutate_state
        operation: set
        field: config.line_threshold
        value: 200
      - type: mutate_state
        operation: set
        field: config.template
        value: "gateway-command.md.template"
      - type: mutate_state
        operation: set
        field: config.target_lines
        value: 160
      - type: mutate_state
        operation: set
        field: config.preserved_sections
        value: ["frontmatter", "title", "workflow_graph", "example_usage", "related_skills", "skill_tables", "help_commands"]
      - type: mutate_state
        operation: set
        field: config.required_sections
        value: ["## Usage", "## Execution Reference", "## Related Skills"]
      - type: mutate_state
        operation: set
        field: config.extra_verifications
        value: ["intent_mapping_unchanged"]
      - type: mutate_state
        operation: set
        field: selected_workflows
        value: "${gateway_workflows}"
    on_success: check_multiple_workflows
    on_failure: error_init

  set_both_config:
    type: action
    description: "Set config for processing both types (skills first)"
    actions:
      - type: mutate_state
        operation: set
        field: config.process_order
        value: ["skills", "gateway"]
      # Start with skills config, will be updated per batch
      - type: mutate_state
        operation: set
        field: config.line_threshold
        value: 120
      - type: mutate_state
        operation: set
        field: config.template
        value: "SKILL.md.template"
      - type: mutate_state
        operation: set
        field: config.target_lines
        value: 60
      - type: mutate_state
        operation: set
        field: config.preserved_sections
        value: ["frontmatter", "title", "workflow_graph", "example_usage", "related_skills"]
      - type: mutate_state
        operation: set
        field: config.required_sections
        value: ["## Execution Reference"]
      # Combine all workflows for processing
      - type: mutate_state
        operation: set
        field: selected_workflows
        value: "${skill_workflows + gateway_workflows}"
    on_success: check_multiple_workflows
    on_failure: error_init

  check_multiple_workflows:
    type: conditional
    description: "Check if there are multiple workflows to potentially select from"
    condition:
      type: evaluate_expression
      expression: "selected_workflows | length > 1"
    branches:
      on_true: prompt_workflow_selection
      on_false: success

  prompt_workflow_selection:
    type: user_prompt
    description: "Ask user which workflows to upgrade"
    prompt:
      question: "Which workflow(s) would you like to upgrade?"
      header: "Select"
      options:
        - id: all
          label: "All ${target_type}s"
          description: "Upgrade all ${selected_workflows | length} workflows"
        - id: specific
          label: "Select specific"
          description: "Choose which workflows to upgrade"
        - id: cancel
          label: "Cancel"
          description: "Exit without changes"
    on_response:
      all:
        next_node: success
      specific:
        next_node: prompt_specific_workflows
      cancel:
        next_node: cancelled

  prompt_specific_workflows:
    type: user_prompt
    description: "Let user select specific workflows"
    prompt:
      question: "Select workflows to upgrade:"
      header: "Workflows"
      multiSelect: true
      options_from_state: selected_workflows
      option_label: "${item.name}"
      option_description: "${item.path}"
      option_id: "${item.path}"
    on_response:
      default:
        consequence:
          - type: mutate_state
            operation: set
            field: selected_workflows
            value: "${response.selected}"
        next_node: success

endings:
  success:
    type: success
    message: "Discovered ${selected_workflows | length} workflow(s) for upgrade"
    summary:
      target_type: "${target_type}"
      skill_workflows: "${skill_workflows}"
      gateway_workflows: "${gateway_workflows}"
      selected_workflows: "${selected_workflows}"
      config: "${config}"
      has_legacy_engine: "${has_legacy_engine}"
      needs_execution_migration: "${needs_execution_migration}"

  cancelled:
    type: success
    message: "Upgrade cancelled by user"
    summary:
      target_type: null
      cancelled: true

  error_no_workflows:
    type: error
    code: "NO_WORKFLOWS_FOUND"
    message: "No workflows found in skills/ or commands/"
    recovery:
      suggestion: "Ensure the plugin has workflow.yaml files with proper sibling files (SKILL.md for skills, intent-mapping.yaml for gateways)"

  error_no_workflows_for_target:
    type: error
    code: "NO_WORKFLOWS_FOR_TARGET"
    message: "No ${input.explicit_target} workflows found"
    recovery:
      suggestion: "Check that the specified target type has workflow.yaml files in the expected directory"

  error_init:
    type: error
    code: "INIT_FAILED"
    message: "Failed to initialize workflow discovery"
    recovery:
      suggestion: "Check file permissions and directory structure"
