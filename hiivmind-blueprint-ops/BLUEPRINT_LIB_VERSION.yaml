# External Library Reference Configuration
# =========================================
# This file defines which version of the EXTERNAL hiivmind-blueprint-lib
# package this plugin references for type definitions and execution semantics.
#
# hiivmind-blueprint-lib is hosted at:
#   GitHub: https://github.com/hiivmind/hiivmind-blueprint-lib
#   Local:  /home/nathanielramm/git/hiivmind/hiivmind-blueprint-lib
#
# Update this file when upgrading to a new release of hiivmind-blueprint-lib.
# Then run: /hiivmind-blueprint-ops lib-version update
#
# This version is INDEPENDENT of the plugin's own version (defined in plugin.json).
# When we reference hiivmind/hiivmind-blueprint-lib@v2.1.0, we're pinning to a
# specific release of the external lib that provides:
#   - Type definitions (consequences, preconditions, nodes)
#   - Execution semantics (traversal, state, dispatch)
#   - Schema validation

# The version tag of hiivmind-blueprint-lib to reference
lib_version: "v2.1.0"

# Full GitHub reference string (owner/repo@version format)
# Used in workflow.yaml definitions.source
lib_ref: "hiivmind/hiivmind-blueprint-lib@v2.1.0"

# Raw GitHub URL base for fetching files
# Used in thin loaders and skills to fetch execution semantics
lib_raw_url: "https://raw.githubusercontent.com/hiivmind/hiivmind-blueprint-lib/v2.1.0"

# Workflow schema version (defined by the lib, not this plugin)
# This tracks compatibility with workflow.yaml structure
schema_version: "2.2"
