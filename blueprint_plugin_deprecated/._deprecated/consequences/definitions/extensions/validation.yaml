# Validation Extension Consequences
# Workflow validation operations for hiivmind-blueprint-validate

schema_version: "1.1"
category: extensions/validation
description: Workflow validation and report generation operations

consequences:
  # --------------------------------------------------------------------------
  # validate_yaml_schema
  # --------------------------------------------------------------------------
  - type: validate_yaml_schema
    description:
      brief: Validate workflow against JSON Schema
      detail: |
        Validates a workflow YAML file against the workflow JSON Schema definition.
        Reports all schema violations including missing required fields, type
        mismatches, and invalid enum values.
      notes:
        - Uses yq for YAML parsing and schema validation
        - Returns array of violation objects
        - Schema path is relative to plugin root

    parameters:
      - name: workflow_path
        type: string
        required: true
        description: Path to workflow.yaml file
        interpolatable: true

      - name: schema_path
        type: string
        required: false
        default: "lib/schema/workflow-schema.json"
        description: Path to JSON Schema file
        interpolatable: true

      - name: store_as
        type: string
        required: true
        description: State field for validation results
        pattern: "^[a-zA-Z_][a-zA-Z0-9_.\\[\\]]*$"
        interpolatable: false

    payload:
      kind: tool_call
      tool: Bash

      provides:
        outputs:
          - field: "${store_as}.valid"
            type: boolean
            description: "True if schema validation passed"
          - field: "${store_as}.errors"
            type: array
            description: "Array of schema violation objects"

      effect: |
        result = yq_validate(
          workflow: interpolate(workflow_path),
          schema: interpolate(schema_path)
        )
        stored_result = {
          valid: result.errors.length == 0,
          errors: result.errors.map(e => ({
            path: e.path,
            message: e.message,
            expected: e.expected,
            actual: e.actual
          }))
        }
        set_state_value(store_as, stored_result)
      state_writes:
        - "${store_as}"
      state_reads: []

    examples:
      - title: Validate workflow schema
        yaml: |
          - type: validate_yaml_schema
            workflow_path: "${workflow_path}"
            store_as: computed.schema_result
        state_after:
          computed:
            schema_result:
              valid: true
              errors: []

      - title: Validate with custom schema
        yaml: |
          - type: validate_yaml_schema
            workflow_path: "skills/my-skill/workflow.yaml"
            schema_path: "lib/schema/workflow-schema.json"
            store_as: computed.validation

    related:
      - validate_node_references
      - validate_type_existence
    since: "1.1.0"

  # --------------------------------------------------------------------------
  # validate_node_references
  # --------------------------------------------------------------------------
  - type: validate_node_references
    description:
      brief: Check all node transitions point to valid targets
      detail: |
        Validates that all node transition references (on_success, on_failure,
        branches, on_response.next_node) point to existing nodes or endings.
        Also validates that start_node exists.
      notes:
        - Checks start_node, on_success, on_failure, branches, on_response
        - Valid targets are node names and ending names
        - Returns array of invalid references with context

    parameters:
      - name: workflow_path
        type: string
        required: true
        description: Path to workflow.yaml file
        interpolatable: true

      - name: store_as
        type: string
        required: true
        description: State field for validation results
        pattern: "^[a-zA-Z_][a-zA-Z0-9_.\\[\\]]*$"
        interpolatable: false

    payload:
      kind: tool_call
      tool: Bash

      provides:
        outputs:
          - field: "${store_as}.valid"
            type: boolean
            description: "True if all references are valid"
          - field: "${store_as}.invalid_references"
            type: array
            description: "Array of invalid reference objects"

      effect: |
        workflow = yq_parse(interpolate(workflow_path))
        valid_targets = keys(workflow.nodes) + keys(workflow.endings)

        invalid_refs = []

        # Check start_node
        if workflow.start_node not in valid_targets:
          invalid_refs.push({
            source: "workflow",
            field: "start_node",
            reference: workflow.start_node,
            suggestion: "Add node or fix typo"
          })

        # Check each node's transitions
        for node_name, node in workflow.nodes:
          for ref_field in ["on_success", "on_failure"]:
            if node[ref_field] and node[ref_field] not in valid_targets:
              invalid_refs.push({
                source: node_name,
                field: ref_field,
                reference: node[ref_field],
                suggestion: "Add node/ending or fix typo"
              })

          if node.branches:
            for branch_value, target in node.branches:
              if target not in valid_targets:
                invalid_refs.push({
                  source: node_name,
                  field: "branches." + branch_value,
                  reference: target,
                  suggestion: "Add node/ending or fix typo"
                })

          if node.on_response:
            for option_id, handler in node.on_response:
              if handler.next_node not in valid_targets:
                invalid_refs.push({
                  source: node_name,
                  field: "on_response." + option_id + ".next_node",
                  reference: handler.next_node,
                  suggestion: "Add node/ending or fix typo"
                })

        stored_result = {
          valid: invalid_refs.length == 0,
          invalid_references: invalid_refs
        }
        set_state_value(store_as, stored_result)
      state_writes:
        - "${store_as}"
      state_reads: []

    examples:
      - title: Check references
        yaml: |
          - type: validate_node_references
            workflow_path: "${workflow_path}"
            store_as: computed.refs_result
        state_after:
          computed:
            refs_result:
              valid: false
              invalid_references:
                - source: "check_config"
                  field: "on_failure"
                  reference: "error_no_confg"
                  suggestion: "Add node/ending or fix typo"

    related:
      - validate_yaml_schema
      - check_graph_connectivity
    since: "1.1.0"

  # --------------------------------------------------------------------------
  # validate_type_existence
  # --------------------------------------------------------------------------
  - type: validate_type_existence
    description:
      brief: Verify all used types exist in type registry
      detail: |
        Validates that all consequence types and precondition types used in
        the workflow are defined in the type registry (either bundled or
        external definitions).
      notes:
        - Checks both consequence and precondition types
        - Validates against loaded type definitions
        - Reports unknown types with location context

    parameters:
      - name: workflow_path
        type: string
        required: true
        description: Path to workflow.yaml file
        interpolatable: true

      - name: type_bundle_path
        type: string
        required: false
        description: Path to type bundle (defaults to loaded definitions)
        interpolatable: true

      - name: store_as
        type: string
        required: true
        description: State field for validation results
        pattern: "^[a-zA-Z_][a-zA-Z0-9_.\\[\\]]*$"
        interpolatable: false

    payload:
      kind: composite
      tool: null

      provides:
        outputs:
          - field: "${store_as}.valid"
            type: boolean
            description: "True if all types exist"
          - field: "${store_as}.unknown_types"
            type: array
            description: "Array of unknown type references"

      effect: |
        workflow = yq_parse(interpolate(workflow_path))
        type_registry = load_type_registry(type_bundle_path)

        unknown_types = []

        # Check entry_preconditions
        for precond in workflow.entry_preconditions:
          if precond.type not in type_registry.preconditions:
            unknown_types.push({
              category: "precondition",
              type: precond.type,
              location: "entry_preconditions"
            })

        # Check each node
        for node_name, node in workflow.nodes:
          # Check condition in conditional nodes
          if node.condition and node.condition.type not in type_registry.preconditions:
            unknown_types.push({
              category: "precondition",
              type: node.condition.type,
              location: node_name + ".condition"
            })

          # Check validations in validation_gate nodes
          if node.validations:
            for validation in node.validations:
              if validation.type not in type_registry.preconditions:
                unknown_types.push({
                  category: "precondition",
                  type: validation.type,
                  location: node_name + ".validations"
                })

          # Check actions in action nodes
          if node.actions:
            for action in node.actions:
              if action.type not in type_registry.consequences:
                unknown_types.push({
                  category: "consequence",
                  type: action.type,
                  location: node_name + ".actions"
                })

          # Check on_response consequences
          if node.on_response:
            for option_id, handler in node.on_response:
              if handler.consequence:
                for conseq in handler.consequence:
                  if conseq.type not in type_registry.consequences:
                    unknown_types.push({
                      category: "consequence",
                      type: conseq.type,
                      location: node_name + ".on_response." + option_id
                    })

        stored_result = {
          valid: unknown_types.length == 0,
          unknown_types: unknown_types
        }
        set_state_value(store_as, stored_result)
      state_writes:
        - "${store_as}"
      state_reads: []

    examples:
      - title: Check type existence
        yaml: |
          - type: validate_type_existence
            workflow_path: "${workflow_path}"
            store_as: computed.types_result

    related:
      - validate_yaml_schema
      - validate_node_references
    since: "1.1.0"

  # --------------------------------------------------------------------------
  # check_graph_connectivity
  # --------------------------------------------------------------------------
  - type: check_graph_connectivity
    description:
      brief: Verify all nodes are reachable from start_node
      detail: |
        Performs graph analysis to identify orphan nodes that cannot be reached
        from start_node. Uses breadth-first traversal to find all reachable nodes.
      notes:
        - Uses BFS from start_node
        - Reports unreachable (orphan) nodes
        - Does not validate ending reachability

    parameters:
      - name: workflow_path
        type: string
        required: true
        description: Path to workflow.yaml file
        interpolatable: true

      - name: store_as
        type: string
        required: true
        description: State field for analysis results
        pattern: "^[a-zA-Z_][a-zA-Z0-9_.\\[\\]]*$"
        interpolatable: false

    payload:
      kind: computation
      tool: null

      provides:
        outputs:
          - field: "${store_as}.connected"
            type: boolean
            description: "True if all nodes are reachable"
          - field: "${store_as}.orphan_nodes"
            type: array
            description: "Array of unreachable node names"
          - field: "${store_as}.reachable_nodes"
            type: array
            description: "Array of reachable node names"

      effect: |
        workflow = yq_parse(interpolate(workflow_path))

        # Build adjacency list
        edges = {}
        for node_name, node in workflow.nodes:
          edges[node_name] = []
          for ref_field in ["on_success", "on_failure", "next_node"]:
            if node[ref_field] and node[ref_field] in workflow.nodes:
              edges[node_name].push(node[ref_field])
          if node.branches:
            for _, target in node.branches:
              if target in workflow.nodes:
                edges[node_name].push(target)
          if node.on_response:
            for _, handler in node.on_response:
              if handler.next_node in workflow.nodes:
                edges[node_name].push(handler.next_node)

        # BFS from start_node
        visited = set()
        queue = [workflow.start_node]
        while queue.length > 0:
          current = queue.shift()
          if current not in visited:
            visited.add(current)
            for neighbor in edges[current]:
              if neighbor not in visited:
                queue.push(neighbor)

        all_nodes = keys(workflow.nodes)
        orphan_nodes = all_nodes.filter(n => n not in visited)

        stored_result = {
          connected: orphan_nodes.length == 0,
          orphan_nodes: orphan_nodes,
          reachable_nodes: Array.from(visited)
        }
        set_state_value(store_as, stored_result)
      state_writes:
        - "${store_as}"
      state_reads: []

    examples:
      - title: Check graph connectivity
        yaml: |
          - type: check_graph_connectivity
            workflow_path: "${workflow_path}"
            store_as: computed.graph_result
        state_after:
          computed:
            graph_result:
              connected: false
              orphan_nodes: ["unused_node"]
              reachable_nodes: ["start", "check_config", "do_work"]

    related:
      - detect_dead_ends
      - validate_node_references
    since: "1.1.0"

  # --------------------------------------------------------------------------
  # detect_dead_ends
  # --------------------------------------------------------------------------
  - type: detect_dead_ends
    description:
      brief: Find nodes without outgoing transitions
      detail: |
        Identifies nodes that have no outgoing transitions and don't route to
        an ending. These represent potential logic errors where execution could
        get stuck.
      notes:
        - Checks for missing on_success/on_failure/branches/next_node
        - Nodes routing to endings are not dead ends
        - user_prompt nodes need at least one on_response handler

    parameters:
      - name: workflow_path
        type: string
        required: true
        description: Path to workflow.yaml file
        interpolatable: true

      - name: store_as
        type: string
        required: true
        description: State field for analysis results
        pattern: "^[a-zA-Z_][a-zA-Z0-9_.\\[\\]]*$"
        interpolatable: false

    payload:
      kind: computation
      tool: null

      provides:
        outputs:
          - field: "${store_as}.has_dead_ends"
            type: boolean
            description: "True if dead end nodes exist"
          - field: "${store_as}.dead_end_nodes"
            type: array
            description: "Array of dead end node info"

      effect: |
        workflow = yq_parse(interpolate(workflow_path))
        dead_ends = []

        for node_name, node in workflow.nodes:
          has_exit = false

          if node.on_success or node.on_failure:
            has_exit = true
          if node.branches and (node.branches.true or node.branches.false):
            has_exit = true
          if node.next_node:
            has_exit = true
          if node.on_response and keys(node.on_response).length > 0:
            has_exit = true

          if not has_exit:
            dead_ends.push({
              node: node_name,
              type: node.type,
              suggestion: get_suggestion_for_node_type(node.type)
            })

        stored_result = {
          has_dead_ends: dead_ends.length > 0,
          dead_end_nodes: dead_ends
        }
        set_state_value(store_as, stored_result)
      state_writes:
        - "${store_as}"
      state_reads: []

    examples:
      - title: Detect dead ends
        yaml: |
          - type: detect_dead_ends
            workflow_path: "${workflow_path}"
            store_as: computed.dead_ends_result

    related:
      - check_graph_connectivity
      - validate_node_references
    since: "1.1.0"

  # --------------------------------------------------------------------------
  # format_validation_report
  # --------------------------------------------------------------------------
  - type: format_validation_report
    description:
      brief: Generate formatted validation output
      detail: |
        Formats validation results into a human-readable report following the
        validation report format specification. Supports multiple output formats
        including terminal-friendly box-drawing characters.
      notes:
        - Aggregates results from multiple validation steps
        - Uses status icons (checkmark, warning, error)
        - Groups issues by category
        - Includes suggested fixes

    parameters:
      - name: results_field
        type: string
        required: true
        description: State field containing validation results object
        pattern: "^[a-zA-Z_][a-zA-Z0-9_.\\[\\]]*$"
        interpolatable: false

      - name: format
        type: string
        required: false
        default: "terminal"
        description: Output format (terminal, markdown, json)
        enum: ["terminal", "markdown", "json"]
        interpolatable: false

      - name: store_as
        type: string
        required: true
        description: State field for formatted report
        pattern: "^[a-zA-Z_][a-zA-Z0-9_.\\[\\]]*$"
        interpolatable: false

    payload:
      kind: computation
      tool: null

      provides:
        outputs:
          - field: "${store_as}"
            type: string
            description: "Formatted validation report"

      effect: |
        results = get_state_value(results_field)
        format = format ?? "terminal"

        report = format_report(results, format)
        # Report includes:
        # - Summary header with overall status
        # - Category sections (Schema, References, Graph, Types)
        # - Issue details with suggested fixes
        # - Statistics summary

        set_state_value(store_as, report)
      state_writes:
        - "${store_as}"
      state_reads:
        - "${results_field}"

    examples:
      - title: Generate terminal report
        yaml: |
          - type: format_validation_report
            results_field: computed.all_validation_results
            format: terminal
            store_as: computed.report

      - title: Generate markdown report
        yaml: |
          - type: format_validation_report
            results_field: computed.validation
            format: markdown
            store_as: computed.markdown_report

    related:
      - validate_yaml_schema
      - validate_node_references
      - display_message
    since: "1.1.0"
